<!DOCTYPE html>
<html>
<head>
<title>Month Wise Needle Stock Qty Report</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<style>
body{margin:0;background:#07111f;color:white;font-family:Arial,sans-serif}
.header{text-align:center;padding:12px}
.header h2,.header h3,.header h4{margin:2px}
.controls{text-align:center;margin:10px}
input,select{padding:8px;border-radius:6px;border:1px solid #999;font-weight:bold}
button{padding:10px 16px;border:0;border-radius:8px;color:white;font-weight:bold;cursor:pointer;margin:4px}
.show{background:#2563eb}.excel{background:#059669}.print{background:#7c3aed}.home{background:#0f766e}
.reportBox{width:98%;margin:10px auto;background:white;color:black;padding:8px;border-radius:6px}
table{width:100%;border-collapse:collapse;background:white;color:black;font-size:12px}
th,td{border:1px solid #000;padding:5px;text-align:center}
th{background:#b7c9df;font-weight:bold}
.monthCell{font-weight:bold;background:#f8fafc}
.totalRow{background:#eef6df;font-weight:bold;font-size:14px}
.grandRow{background:#e8f1dd;font-weight:bold;font-size:16px}
.chartBox{width:98%;height:300px;margin:10px auto;background:white;color:black;padding:10px;border-radius:8px}
.chartBox canvas{max-height:260px!important}
@page{size:A4 landscape;margin:6mm}
@media print{
  body{background:white;color:black}
  .controls{display:none!important}
  .header{padding:4px}
  .header h2{font-size:16px}
  .header h3,.header h4{font-size:11px}
  .reportBox{width:100%;margin:0;padding:0}
  table{font-size:9px}
  th,td{padding:2px}
  .chartBox{height:210px;margin:4px auto;padding:4px}
  .chartBox canvas{max-height:180px!important}
}
</style>
</head>

<body>

<div class="header">
  <h2>GMS Textiles Ltd</h2>
  <h4>Tansutrapur, Kaliakoir, Gazipur</h4>
  <h3>Month Wise Needle Stock Qty Report</h3>
</div>

<div class="controls">
  Year:
  <input type="number" id="reportYear" style="width:95px">

  From Month:
  <select id="fromMonth"></select>

  To Month:
  <select id="toMonth"></select>

  <button class="show" onclick="loadReport()">🔍 Show Report</button>
  <button class="excel" onclick="exportExcel()">📊 Excel</button>
  <button class="print" onclick="window.print()">🖨 PDF / Print</button>
  <button class="home" onclick="location.href='index.html'">🏠 Home</button>
</div>

<div class="reportBox">
<table id="reportTable">
<thead>
<tr>
  <th>Sl no</th>
  <th>Production<br>Floor Name</th>
  <th>Month</th>
  <th>Previous Balance</th>
  <th>Monthly<br>Received</th>
  <th>Total Qty</th>
  <th>Monthly Issue</th>
  <th>Present Stock</th>
  <th>Remarks</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
<tfoot>
<tr class="grandRow">
  <td colspan="3">Grand Total</td>
  <td id="gtPrevious">0</td>
  <td id="gtReceived">0</td>
  <td id="gtTotalQty">0</td>
  <td id="gtIssue">0</td>
  <td id="gtPresent">0</td>
  <td></td>
</tr>
</tfoot>
</table>
</div>

<div class="chartBox">
  <canvas id="stockChart"></canvas>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
  authDomain:"gms-warehouse-tracker-7f57e.firebaseapp.com",
  projectId:"gms-warehouse-tracker-7f57e",
  storageBucket:"gms-warehouse-tracker-7f57e.firebasestorage.app",
  messagingSenderId:"992250313291",
  appId:"1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let chart;

const monthNames=[
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

const floorGroups=[
  {name:"Shapla",floors:["Shapla R","Shapla N"]},
  {name:"Poddo",floors:["Poddo R","Poddo N"]},
  {name:"Sample",floors:["Sample R","Sample N"]},
  {name:"EMB",floors:["EMBROIDERY R","EMBROIDERY N"]},
  {name:"Belly",floors:["Belly R","Belly N"]},
  {name:"Kadom",floors:["Kadom R","Kadom N"]}
];

function init(){
  let y=new Date().getFullYear();
  document.getElementById("reportYear").value=y;

  let from=document.getElementById("fromMonth");
  let to=document.getElementById("toMonth");

  monthNames.forEach((m,i)=>{
    from.innerHTML+=`<option value="${i+1}">${m}</option>`;
    to.innerHTML+=`<option value="${i+1}">${m}</option>`;
  });

  from.value=1;
  to.value=new Date().getMonth()+1;
}

function fmt(n){
  return Number(n||0).toLocaleString("en-US");
}

function rowSum(rows,field){
  let total=0;
  (rows||[]).forEach(r=>{
    total+=Number(r[field])||0;
  });
  return total;
}

function ym(year,month){
  return year+"-"+String(month).padStart(2,"0");
}

async function getDailyPosting(){
  let snap=await getDocs(collection(db,"dailyPosting"));
  let data=[];

  snap.forEach(d=>{
    let x=d.data();
    if(x.date && x.floor && Array.isArray(x.rows)){
      data.push(x);
    }
  });

  return data;
}

function calcGroupMonth(allDocs,year,month,group,carryPrevious=null){
  let monthKey=ym(year,month);
  let docs=allDocs.filter(x=>x.month===monthKey && group.floors.includes(x.floor));

  let monthlyReceived=0;
  let monthlyIssue=0;
  let presentStock=0;
  let firstDayPrevious=0;

  group.floors.forEach(floor=>{
    let floorDocs=docs.filter(x=>x.floor===floor).sort((a,b)=>a.date.localeCompare(b.date));

    if(floorDocs.length){
      let first=floorDocs[0];
      let last=floorDocs[floorDocs.length-1];

      firstDayPrevious+=rowSum(first.rows,"previous");
      presentStock+=rowSum(last.rows,"present");

      floorDocs.forEach(day=>{
        monthlyReceived+=rowSum(day.rows,"receive");
        monthlyIssue+=rowSum(day.rows,"delivery");
      });
    }
  });

  // Important:
  // January ba first selected month e first day previous nibe.
  // Porer month gulo te previous = last month present stock.
  let previousBalance = carryPrevious!==null ? carryPrevious : firstDayPrevious;

  // Jodi oi month e kono data na thake, formula diye present carry korbe
  if(!docs.length){
    presentStock = previousBalance + monthlyReceived - monthlyIssue;
  }

  let totalQty=previousBalance+monthlyReceived;

  return{
    previousBalance,
    monthlyReceived,
    totalQty,
    monthlyIssue,
    presentStock
  };
}

window.loadReport=async function(){
  let year=Number(document.getElementById("reportYear").value);
  let from=Number(document.getElementById("fromMonth").value);
  let to=Number(document.getElementById("toMonth").value);

  if(from>to){
    alert("From Month To Month er cheye boro hote parbe na");
    return;
  }

  let allDocs=await getDailyPosting();

  let html="";
  let sl=1;

  let gtPrevious=0,gtReceived=0,gtTotalQty=0,gtIssue=0,gtPresent=0;
  let chartLabels=[],chartPresent=[];

  // Carry stock: ek month er present next month er previous hobe
  let carryByGroup={};

  for(let m=from;m<=to;m++){
    let monthTotal={previousBalance:0,monthlyReceived:0,totalQty:0,monthlyIssue:0,presentStock:0};

    floorGroups.forEach((g,idx)=>{
      let carryPrevious = carryByGroup[g.name]!==undefined ? carryByGroup[g.name] : null;
      let r=calcGroupMonth(allDocs,year,m,g,carryPrevious);

      // Next month er previous hisebe ei month er present save
      carryByGroup[g.name]=r.presentStock;

      monthTotal.previousBalance+=r.previousBalance;
      monthTotal.monthlyReceived+=r.monthlyReceived;
      monthTotal.totalQty+=r.totalQty;
      monthTotal.monthlyIssue+=r.monthlyIssue;
      monthTotal.presentStock+=r.presentStock;

      html+=`
      <tr>
        <td>${idx===0?sl:""}</td>
        <td>${g.name}</td>
        ${idx===0?`<td rowspan="${floorGroups.length}" class="monthCell">${monthNames[m-1]}</td>`:""}
        <td>${fmt(r.previousBalance)}</td>
        <td>${fmt(r.monthlyReceived)}</td>
        <td>${fmt(r.totalQty)}</td>
        <td>${fmt(r.monthlyIssue)}</td>
        <td>${fmt(r.presentStock)}</td>
        <td></td>
      </tr>`;
      sl++;
    });

    html+=`
    <tr class="totalRow">
      <td colspan="3">Total Qty</td>
      <td>${fmt(monthTotal.previousBalance)}</td>
      <td>${fmt(monthTotal.monthlyReceived)}</td>
      <td>${fmt(monthTotal.totalQty)}</td>
      <td>${fmt(monthTotal.monthlyIssue)}</td>
      <td>${fmt(monthTotal.presentStock)}</td>
      <td></td>
    </tr>`;

    gtPrevious+=monthTotal.previousBalance;
    gtReceived+=monthTotal.monthlyReceived;
    gtTotalQty+=monthTotal.totalQty;
    gtIssue+=monthTotal.monthlyIssue;
    gtPresent+=monthTotal.presentStock;

    chartLabels.push(monthNames[m-1]);
    chartPresent.push(monthTotal.presentStock);
  }

  document.getElementById("tbody").innerHTML=html || `<tr><td colspan="9">No data found</td></tr>`;

  document.getElementById("gtPrevious").innerText=fmt(gtPrevious);
  document.getElementById("gtReceived").innerText=fmt(gtReceived);
  document.getElementById("gtTotalQty").innerText=fmt(gtTotalQty);
  document.getElementById("gtIssue").innerText=fmt(gtIssue);
  document.getElementById("gtPresent").innerText=fmt(gtPresent);

  renderChart(chartLabels,chartPresent);
};

function renderChart(labels,data){
  if(chart) chart.destroy();

  const valuePlugin={
    id:"valuePlugin",
    afterDatasetsDraw(chart){
      const {ctx}=chart;
      ctx.save();
      ctx.textAlign="center";
      ctx.fillStyle="#111";
      ctx.font="bold 11px Arial";

      chart.data.datasets[0].data.forEach((value,index)=>{
        const bar=chart.getDatasetMeta(0).data[index];
        if(bar) ctx.fillText(Number(value||0).toLocaleString("en-US"),bar.x,bar.y-8);
      });

      ctx.restore();
    }
  };

  chart=new Chart(document.getElementById("stockChart"),{
    type:"bar",
    data:{
      labels:labels,
      datasets:[{
        label:"Month Wise Present Stock",
        data:data,
        borderWidth:1,
        borderRadius:8
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        title:{display:true,text:"Month Wise Needle Present Stock Chart"}
      },
      scales:{
        y:{beginAtZero:true},
        x:{grid:{display:false}}
      }
    },
    plugins:[valuePlugin]
  });
}

window.exportExcel=function(){
  let title=`
  <h2>GMS Textiles Ltd</h2>
  <h4>Tansutrapur, Kaliakoir, Gazipur</h4>
  <h3>Month Wise Needle Stock Qty Report</h3>
  `;
  let table=document.getElementById("reportTable").outerHTML;
  let file=new Blob([title+table],{type:"application/vnd.ms-excel"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(file);
  a.download="month-wise-needle-stock-report.xls";
  a.click();
};

init();
loadReport();
</script>

</body>
</html>
