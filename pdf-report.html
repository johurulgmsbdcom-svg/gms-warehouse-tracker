<!DOCTYPE html>
<html>
<head>
<title>PDF Report</title>

<style>
body{
  font-family:Arial,sans-serif;
  margin:0;
  background:#f1f5f9;
  padding:20px;
}
.report{
  background:white;
  padding:25px;
  max-width:900px;
  margin:auto;
  border:1px solid #ddd;
}
h1,h2,h3{

table{

}
th,td{

  padding:8px;
  text-align:center;
}
th{
  background:#e5e7eb;
}
.btn{
  padding:12px 20px;
  background:#2563eb;
  color:white;
  border:0;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  margin:10px;
}
@page{
  size:A4;
  margin:10mm;
}
@media print{
  .noPrint{
    display:none;
  }
  body{
    background:white;
    padding:0;
  }
  .report{
    border:0;
    max-width:100%;
  }
}
</style>
</head>
