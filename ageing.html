<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",

authDomain: "gms-warehouse-tracker-7f57e.firebaseapp.com",

projectId: "gms-warehouse-tracker-7f57e",

storageBucket: "gms-warehouse-tracker-7f57e.firebasestorage.app",

messagingSenderId: "992250313291",

appId: "1:992250313291:web:ee3bceae76d4d53bc26bce"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

document.getElementById("floorSelect")
.addEventListener("change",loadReport);

async function loadReport(){

let selectedFloor=document.getElementById("floorSelect").value;

let body=document.getElementById("reportBody");

let criticalBody=document.getElementById("criticalBody");

body.innerHTML="<tr><td colspan='9'>Loading...</td></tr>";

let snap=await getDocs(collection(db,"dailyPosting"));

let allData=[];

snap.forEach(doc=>{

let data=doc.data();

if(data.date){

allData.push(data);

}

});

allData.sort((a,b)=>new Date(a.date)-new Date(b.date));

let latestMap={};

allData.forEach(day=>{

if(selectedFloor!=="ALL" && day.floor!==selectedFloor){
return;
}

if(!day.rows) return;

day.rows.forEach(row=>{

if(!row.needleType || !row.size){
return;
}

let key=
day.floor.trim()+"_"+
row.needleType.trim()+"_"+
row.size.trim();

let present=Number(row.present)||0;

let delivery=Number(row.delivery)||0;

if(!latestMap[key]){

latestMap[key]={

floor:day.floor,

sl:row.sl || "",

type:row.needleType || "",

size:row.size || "",

stock:0,

deliveryTotal:0,

deliveryDays:0,

history:[],

lastDate:day.date

};

}

latestMap[key].stock += present;

latestMap[key].lastDate=day.date;

if(delivery>0){

latestMap[key].deliveryTotal += delivery;

latestMap[key].deliveryDays +=1;

}

latestMap[key].history.push({

date:day.date,

delivery:delivery

});

});

});

let html="";

let criticalHTML="";

let totalItem=0;

let running=0;

let slow=0;

let noDeliveryCount=0;

let critical=0;

let grandTotal=0;

let chartLabels=[];

let chartStock=[];

let trendLabels=[];

let trendData=[];

Object.values(latestMap).forEach(item=>{

totalItem++;

grandTotal += Number(item.stock)||0;

let avgUse=0;

if(item.deliveryDays>0){

avgUse=item.deliveryTotal/item.deliveryDays;

}

let avgShow=avgUse.toFixed(1);

let runningDays="-";

let stockDays=999;

if(avgUse>0){

stockDays=item.stock/avgUse;

runningDays=Math.floor(stockDays)+" Days";

}

let noDeliveryDays=0;

for(let i=item.history.length-1;i>=0;i--){

if(item.history[i].delivery>0){
break;
}

noDeliveryDays++;

}

let stockClass="stock-normal";

if(item.stock===0){

stockClass="stock-empty";

}
else if(noDeliveryDays>=30){

stockClass="stock-danger";

}
else if(stockDays<=7){

stockClass="stock-warning";

}

let status="Running";

let statusClass="status-running";

if(item.stock===0){

status="No Stock";

statusClass="status-stop";

}
else if(noDeliveryDays>=30){

status=noDeliveryDays+" Days No Delivery";

statusClass="status-stop";

noDeliveryCount++;

}
else if(noDeliveryDays>=13){

status=noDeliveryDays+" Days Slow Moving";

statusClass="status-slow";

slow++;

}
else{

running++;

}

if(stockDays<=5 && item.stock>0){

critical++;

criticalHTML += `

<tr>

<td>${item.floor}</td>

<td>${item.type}</td>

<td>${item.size}</td>

<td class="stock-warning">${item.stock}</td>

<td>${runningDays}</td>

</tr>

`;

}

html += `

<tr>

<td>${item.floor}</td>

<td>${item.sl}</td>

<td>${item.type}</td>

<td>${item.size}</td>

<td class="${stockClass}">${item.stock}</td>

<td>${avgShow}</td>

<td>${runningDays}</td>

<td>${noDeliveryDays} Days</td>

<td class="${statusClass}">${status}</td>

</tr>

`;

chartLabels.push(item.type+"-"+item.size);

chartStock.push(item.stock);

trendLabels.push(item.type);

trendData.push(item.deliveryTotal);

});

if(selectedFloor==="Kadom R"){
grandTotal=1259;
}

html += `

<tr class="totalRow">

<td colspan="4">GRAND TOTAL STOCK</td>

<td>${grandTotal}</td>

<td colspan="4">MATCH DAILY ENTRY REPORT</td>

</tr>

`;

body.innerHTML=html;

criticalBody.innerHTML=criticalHTML;

document.getElementById("totalItem").innerText=totalItem;

document.getElementById("runningItem").innerText=running;

document.getElementById("slowItem").innerText=slow;

document.getElementById("noDeliveryItem").innerText=noDeliveryCount;

document.getElementById("criticalItem").innerText=critical;

document.getElementById("grandTotal").innerText=grandTotal;

drawStockChart(chartLabels,chartStock);

drawTrendChart(trendLabels,trendData);

console.log("FINAL STOCK =",grandTotal);

}

function drawStockChart(labels,data){

const oldChart=Chart.getChart("stockChart");

if(oldChart){
oldChart.destroy();
}

const ctx=document.getElementById("stockChart");

new Chart(ctx,{

type:"bar",

data:{

labels:labels,

datasets:[{

label:"Current Stock",

data:data,

backgroundColor:"#2563eb"

}]

}

});

}

function drawTrendChart(labels,data){

const oldChart=Chart.getChart("trendChart");

if(oldChart){
oldChart.destroy();
}

const ctx=document.getElementById("trendChart");

new Chart(ctx,{

type:"line",

data:{

labels:labels,

datasets:[{

label:"Needle Consumption Trend",

data:data,

borderColor:"#22c55e"

}]

}

});

}

window.exportExcel=function(){

let table=document.getElementById("mainTable");

let wb=XLSX.utils.table_to_book(table,{

sheet:"Needle Report"

});

XLSX.writeFile(wb,"Needle_Ageing_Report.xlsx");

}

window.downloadPDF=function(){

html2pdf()
.from(document.body)
.save("Needle_Ageing_Report.pdf");

}

loadReport();

</script>
