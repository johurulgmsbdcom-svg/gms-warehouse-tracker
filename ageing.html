<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Needle Ageing Report</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#071229;
  color:white;
  font-family:Arial,sans-serif;
  padding:10px;
}

.header{
  text-align:center;
  margin-bottom:15px;
}

.header h1{
  font-size:28px;
}

.header h2{
  font-size:18px;
  margin-top:5px;
  color:#cbd5e1;
}

.topbar{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

select,button{
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  font-size:15px;
}

button{
  background:#2563eb;
  color:white;
}

.dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
  margin-bottom:15px;
}

.card{
  background:#0f172a;
  border:1px solid #334155;
  border-radius:12px;
  padding:15px;
  text-align:center;
}

.card h3{
  color:#94a3b8;
  margin-bottom:10px;
}

.card p{
  font-size:28px;
  font-weight:bold;
}

.tableWrap{
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#08112c;
}

th{
  background:#0f172a;
  color:white;
  border:2px solid #d1d5db;
  padding:12px 6px;
  font-size:14px;
}

td{
  border:2px solid #d1d5db;
  padding:10px 5px;
  text-align:center;
  font-size:13px;
  font-weight:bold;
}

.stock-green{
  background:green;
  color:white;
}

.stock-yellow{
  background:#facc15;
  color:black;
}

.stock-red{
  background:red;
  color:white;
}

.stock-white{
  background:white;
  color:black;
}

.age-green{
  color:#22c55e;
}

.age-yellow{
  color:#facc15;
}

.age-red{
  color:#ff4d4d;
}

@media(max-width:700px){

  th{
    font-size:10px;
    padding:7px 3px;
  }

  td{
    font-size:9px;
    padding:6px 3px;
  }

  .header h1{
    font-size:22px;
  }

}

</style>
</head>

<body>

<div class="header">
  <h1>GMS TEXTILES LTD</h1>
  <h2>Needle Ageing Report</h2>
</div>

<div class="topbar">

<select id="floorSelect">

<option value="ALL">ALL FLOOR</option>

<option value="Kadom R">Kadom R</option>
<option value="Kadom N">Kadom N</option>

<option value="Shapla R">Shapla R</option>
<option value="Shapla N">Shapla N</option>

<option value="Poddo R">Poddo R</option>
<option value="Poddo N">Poddo N</option>

<option value="Belly R">Belly R</option>
<option value="Belly N">Belly N</option>

<option value="Sample R">Sample R</option>
<option value="Sample N">Sample N</option>

<option value="EMBROIDERY R">EMBROIDERY R</option>
<option value="EMBROIDERY N">EMBROIDERY N</option>

</select>

<button onclick="window.print()">Print</button>

</div>

<div class="dashboard">

<div class="card">
<h3>Total Item</h3>
<p id="totalItem">0</p>
</div>

<div class="card">
<h3>Running</h3>
<p id="runningItem">0</p>
</div>

<div class="card">
<h3>Slow Moving</h3>
<p id="slowItem">0</p>
</div>

<div class="card">
<h3>Not Moving</h3>
<p id="notMoving">0</p>
</div>

</div>

<div class="tableWrap">

<table>

<thead>

<tr>
<th>Floor</th>
<th>SL</th>
<th>Needle Type</th>
<th>Size</th>
<th>Stock</th>
<th>Avg Use</th>
<th>Running Days</th>
<th>Status</th>
</tr>

</thead>

<tbody id="reportBody"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";


const firebaseConfig = {

  apiKey: "AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",

  authDomain: "gms-warehouse-tracker-7f57e.firebaseapp.com",

  projectId: "gms-warehouse-tracker-7f57e",

  storageBucket: "gms-warehouse-tracker-7f57e.firebasestorage.app",

  messagingSenderId: "992250313291",

  appId: "1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);



document.getElementById("floorSelect").addEventListener("change",loadReport);



async function loadReport(){

  let selectedFloor=document.getElementById("floorSelect").value;

  let body=document.getElementById("reportBody");

  body.innerHTML="<tr><td colspan='8'>Loading...</td></tr>";



  let snap=await getDocs(collection(db,"dailyPosting"));

  let allData=[];

  snap.forEach(doc=>{

    allData.push(doc.data());

  });



  allData.sort((a,b)=>a.date.localeCompare(b.date));



  let itemMap={};



  allData.forEach(day=>{

    if(selectedFloor!=="ALL" && day.floor!==selectedFloor){
      return;
    }

    if(!day.rows) return;



    day.rows.forEach(row=>{

      let key=day.floor+"_"+row.needleType+"_"+row.size;



      if(!itemMap[key]){

        itemMap[key]={

          floor:day.floor,
          sl:row.sl,
          type:row.needleType,
          size:row.size,

          stock:0,

          totalDelivery:0,

          totalDays:0,

          lastDeliveryDate:null

        };

      }



      itemMap[key].stock = Number(row.present)||0;

      itemMap[key].totalDelivery += Number(row.delivery)||0;

      itemMap[key].totalDays +=1;



      if(Number(row.delivery)>0){

        itemMap[key].lastDeliveryDate=day.date;

      }

    });

  });



  let html="";



  let total=0;
  let running=0;
  let slow=0;
  let notMoving=0;



  let today=new Date();



  Object.values(itemMap).forEach(item=>{

    total++;



    let avgUse=0;

    if(item.totalDays>0){

      avgUse=item.totalDelivery/item.totalDays;
    }



    let avgShow=avgUse.toFixed(1);



    let runningDays="-";



    if(item.stock>0 && avgUse>0){

      runningDays=Math.floor(item.stock/avgUse)+" Days";



      if(item.stock<=20){

        runningDays+=" Low Stock";
      }

    }



    let stockClass="stock-green";



    if(item.stock===0){

      stockClass="stock-white";
    }

    else if(item.stock<=20){

      stockClass="stock-red";
    }

    else if(item.stock<=50){

      stockClass="stock-yellow";
    }



    let status="";
    let ageClass="age-green";



    if(item.stock===0){

      status="";
      ageClass="";
    }

    else if(item.lastDeliveryDate){

      let lastDate=new Date(item.lastDeliveryDate);

      let diff=Math.floor((today-lastDate)/(1000*60*60*24));



      if(diff>=30){

        status=diff+" Days Not Moving";

        ageClass="age-red";

        notMoving++;

      }

      else if(diff>=5){

        status=diff+" Days Slow Moving";

        ageClass="age-yellow";

        slow++;

      }

      else{

        status=diff+" Days Running";

        ageClass="age-green";

        running++;

      }

    }



    html+=`

    <tr>

    <td>${item.floor}</td>

    <td>${item.sl}</td>

    <td>${item.type}</td>

    <td>${item.size}</td>

    <td class="${stockClass}">${item.stock}</td>

    <td>${avgShow}</td>

    <td>${runningDays}</td>

    <td class="${ageClass}">${status}</td>

    </tr>

    `;

  });



  body.innerHTML=html;



  document.getElementById("totalItem").innerText=total;

  document.getElementById("runningItem").innerText=running;

  document.getElementById("slowItem").innerText=slow;

  document.getElementById("notMoving").innerText=notMoving;

}



loadReport();

</script>

</body>
</html>
