<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Needle Ageing Report</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:#031433;
color:#fff;
padding:12px;
}

/* HEADER */
.header{
text-align:center;
margin-bottom:15px;
}

.header h1{
font-size:34px;
font-weight:900;
}

.header h2{
font-size:22px;
margin-top:5px;
color:#dbeafe;
}

.live{
margin-top:10px;
font-size:22px;
font-weight:bold;
color:#22c55e;
}

/* TOPBAR */
.topbar{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin:18px 0;
}

select,button{
padding:11px 18px;
border:none;
border-radius:10px;
font-weight:bold;
font-size:15px;
cursor:pointer;
}

button{
background:#2563eb;
color:#fff;
}

/* DASHBOARD */
.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:12px;
margin-top:10px;
}

.card{
background:#0b1a3c;
border:1px solid #334155;
border-radius:14px;
padding:18px;
text-align:center;
box-shadow:0 8px 18px rgba(0,0,0,.25);
}

.card h3{
color:#93c5fd;
font-size:17px;
margin-bottom:12px;
}

.card p{
font-size:38px;
font-weight:900;
}

/* TABLE */
h2.section{
margin-top:18px;
margin-bottom:10px;
font-size:28px;
}

.tableWrap{
overflow:auto;
margin-bottom:16px;
border-radius:14px;
}

table{
width:100%;
border-collapse:collapse;
background:#08112c;
}

th{
background:#0f172a;
padding:12px 8px;
font-size:14px;
border:1px solid #334155;
}

td{
padding:10px 8px;
font-size:13px;
text-align:center;
font-weight:bold;
border:1px solid #334155;
}

.totalRow{
background:#1e293b;
color:#22c55e;
font-size:16px;
}

/* COLORS */
.stock-normal{background:#2563eb}
.stock-warning{background:#fb923c}
.stock-danger{background:#dc2626}
.stock-empty{background:#fff;color:#000}

.status-running{color:#22c55e}
.status-slow{color:#facc15}
.status-stop{color:#ff4d4d}

/* CHART */
.chartGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:18px;
}

.chartBox{
background:#fff;
padding:14px;
border-radius:14px;
height:380px;
}

canvas{
width:100% !important;
height:100% !important;
}

/* MOBILE */
@media(max-width:900px){
.chartGrid{
grid-template-columns:1fr;
}
}

@media(max-width:700px){

.header h1{font-size:24px}
.header h2{font-size:16px}
.live{font-size:16px}

th{font-size:10px;padding:7px 4px}
td{font-size:10px;padding:7px 4px}

.card h3{font-size:14px}
.card p{font-size:28px}
}

@media print{
.topbar,.live,.chartGrid{display:none}
body{background:#fff;color:#000}
}
</style>
</head>

<body>

<div class="header">
<h1>GMS TEXTILES LTD</h1>
<h2>Needle Ageing Live Report</h2>
<div class="live">🟢 LIVE DATA CONNECTED</div>
</div>

<div class="topbar">
<select id="floorSelect">
<option value="ALL">ALL FLOOR</option>
<option>Kadom R</option>
<option>Kadom N</option>
<option>Shapla R</option>
<option>Shapla N</option>
<option>Poddo R</option>
<option>Poddo N</option>
<option>Belly R</option>
<option>Belly N</option>
<option>Sample R</option>
<option>Sample N</option>
<option>EMBROIDERY R</option>
<option>EMBROIDERY N</option>
</select>

<button onclick="window.print()">Print</button>
<button onclick="exportExcel()">Excel</button>
<button onclick="downloadPDF()">PDF</button>
</div>

<div class="dashboard">

<div class="card">
<h3>Total Item</h3>
<p id="totalItem">0</p>
</div>

<div class="card">
<h3>Running</h3>
<p id="runningItem">0</p>
</div>

<div class="card">
<h3>Slow Moving</h3>
<p id="slowItem">0</p>
</div>

<div class="card">
<h3>No Delivery</h3>
<p id="noDeliveryItem">0</p>
</div>

<div class="card">
<h3>Critical Stock</h3>
<p id="criticalItem">0</p>
</div>

<div class="card">
<h3>Total Stock</h3>
<p id="grandTotal">0</p>
</div>

</div>

<h2 class="section">Critical Stock Alert</h2>

<div class="tableWrap">
<table>
<thead>
<tr>
<th>Floor</th>
<th>Needle</th>
<th>Size</th>
<th>Stock</th>
<th>Running Days</th>
</tr>
</thead>
<tbody id="criticalBody"></tbody>
</table>
</div>

<div class="tableWrap">
<table id="mainTable">
<thead>
<tr>
<th>Floor</th>
<th>SL</th>
<th>Needle Type</th>
<th>Size</th>
<th>Stock</th>
<th>Avg Delivery</th>
<th>Running Days</th>
<th>No Delivery</th>
<th>Status</th>
</tr>
</thead>
<tbody id="reportBody"></tbody>
</table>
</div>

<div class="chartGrid">
<div class="chartBox">
<canvas id="stockChart"></canvas>
</div>

<div class="chartBox">
<canvas id="trendChart"></canvas>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* YOUR FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
authDomain: "gms-warehouse-tracker-7f57e.firebaseapp.com",
projectId: "gms-warehouse-tracker-7f57e",
storageBucket: "gms-warehouse-tracker-7f57e.firebasestorage.app",
messagingSenderId: "992250313291",
appId: "1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("floorSelect").addEventListener("change",loadReport);

function loadReport(){

const floor = document.getElementById("floorSelect").value;

onSnapshot(collection(db,"dailyPosting"),(snap)=>{

let allData=[];

snap.forEach(doc=>{
let data=doc.data();
if(data.date) allData.push(data);
});

renderData(allData,floor);

});

}

function renderData(allData,selectedFloor){

allData.sort((a,b)=>new Date(a.date)-new Date(b.date));

let latestMap={};

allData.forEach(day=>{

if(selectedFloor!=="ALL" && day.floor!==selectedFloor) return;
if(!day.rows) return;

day.rows.forEach(row=>{

if(!row.needleType || !row.size) return;

let key = day.floor+"_"+row.needleType+"_"+row.size;

let present = Number(row.present)||0;
let delivery = Number(row.delivery)||0;

if(!latestMap[key]){

latestMap[key]={
floor:day.floor,
sl:row.sl||"",
type:row.needleType,
size:row.size,
stock:0,
deliveryTotal:0,
deliveryDays:0,
history:[]
};

}

latestMap[key].stock = present;

if(delivery>0){
latestMap[key].deliveryTotal += delivery;
latestMap[key].deliveryDays++;
}

latestMap[key].history.push(delivery);

});

});

let html="";
let criticalHTML="";

let total=0;
let running=0;
let slow=0;
let stop=0;
let critical=0;
let grand=0;

let labels=[];
let stockData=[];
let trendLabels=[];
let trendData=[];

Object.values(latestMap).forEach(item=>{

total++;
grand += item.stock;

let avg = item.deliveryDays ? item.deliveryTotal/item.deliveryDays : 0;

let stockDays = avg>0 ? item.stock/avg : 999;

let runningDays = avg>0 ? Math.floor(stockDays)+" Days" : "-";

let noDelivery=0;

for(let i=item.history.length-1;i>=0;i--){
if(item.history[i]>0) break;
noDelivery++;
}

let stockClass="stock-normal";

if(item.stock===0) stockClass="stock-empty";
else if(stockDays<=5) stockClass="stock-warning";
else if(noDelivery>=30) stockClass="stock-danger";

let status="Running";
let statusClass="status-running";

if(item.stock===0){
status="No Stock";
statusClass="status-stop";
stop++;
}
else if(noDelivery>=30){
status="No Delivery";
statusClass="status-stop";
stop++;
}
else if(noDelivery>=13){
status="Slow Moving";
statusClass="status-slow";
slow++;
}
else{
running++;
}

if(stockDays<=5 && item.stock>0){

critical++;

criticalHTML += `
<tr>
<td>${item.floor}</td>
<td>${item.type}</td>
<td>${item.size}</td>
<td class="stock-warning">${item.stock}</td>
<td>${runningDays}</td>
</tr>
`;

}

html += `
<tr>
<td>${item.floor}</td>
<td>${item.sl}</td>
<td>${item.type}</td>
<td>${item.size}</td>
<td class="${stockClass}">${item.stock}</td>
<td>${avg.toFixed(1)}</td>
<td>${runningDays}</td>
<td>${noDelivery} Days</td>
<td class="${statusClass}">${status}</td>
</tr>
`;

labels.push(item.type+"-"+item.size);
stockData.push(item.stock);

trendLabels.push(item.type);
trendData.push(item.deliveryTotal);

});

html += `
<tr class="totalRow">
<td colspan="4">GRAND TOTAL STOCK</td>
<td>${grand}</td>
<td colspan="4">LIVE UPDATE</td>
</tr>
`;

document.getElementById("reportBody").innerHTML = html;
document.getElementById("criticalBody").innerHTML = criticalHTML;

document.getElementById("totalItem").innerText = total;
document.getElementById("runningItem").innerText = running;
document.getElementById("slowItem").innerText = slow;
document.getElementById("noDeliveryItem").innerText = stop;
document.getElementById("criticalItem").innerText = critical;
document.getElementById("grandTotal").innerText = grand;

drawStockChart(labels,stockData);
drawTrendChart(trendLabels,trendData);

}

/* CHART 1 */
function drawStockChart(labels,data){

let old = Chart.getChart("stockChart");
if(old) old.destroy();

new Chart(document.getElementById("stockChart"),{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Current Stock",
data:data,
backgroundColor:"#2563eb"
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});

}

/* CHART 2 */
function drawTrendChart(labels,data){

let old = Chart.getChart("trendChart");
if(old) old.destroy();

new Chart(document.getElementById("trendChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Needle Consumption",
data:data,
borderColor:"#22c55e",
fill:false,
tension:.3
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});

}

/* EXCEL */
window.exportExcel=function(){

let table=document.getElementById("mainTable");
let wb=XLSX.utils.table_to_book(table,{sheet:"Needle Report"});
XLSX.writeFile(wb,"Needle_Ageing_Report.xlsx");

}

/* PDF */
window.downloadPDF=function(){

html2pdf().from(document.body).save("Needle_Ageing_Report.pdf");

}

loadReport();

</script>

</body>
</html>
