<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Needle Ageing Report</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#071229;
color:white;
font-family:Arial,sans-serif;
padding:10px;
}

.header{
text-align:center;
margin-bottom:15px;
}

.header h1{
font-size:28px;
}

.header h2{
font-size:18px;
margin-top:5px;
color:#cbd5e1;
}

.topbar{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

select,button{
padding:10px;
border:none;
border-radius:8px;
font-weight:bold;
font-size:14px;
}

button{
background:#2563eb;
color:white;
cursor:pointer;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:12px;
margin-bottom:15px;
}

.card{
background:#0f172a;
border:1px solid #334155;
border-radius:12px;
padding:15px;
text-align:center;
}

.card h3{
color:#94a3b8;
margin-bottom:10px;
font-size:15px;
}

.card p{
font-size:28px;
font-weight:bold;
}

.tableWrap{
overflow:auto;
margin-top:15px;
}

table{
width:100%;
border-collapse:collapse;
background:#08112c;
}

th{
background:#0f172a;
border:2px solid #d1d5db;
padding:10px 5px;
font-size:13px;
}

td{
border:2px solid #d1d5db;
padding:8px 4px;
text-align:center;
font-size:12px;
font-weight:bold;
}

.stock-normal{
background:#2563eb;
color:white;
}

.stock-warning{
background:#fb923c;
color:white;
}

.stock-danger{
background:#dc2626;
color:white;
}

.stock-empty{
background:white;
color:black;
}

.status-running{
color:#22c55e;
}

.status-slow{
color:#facc15;
}

.status-stop{
color:#ff4d4d;
}

.totalRow{
background:#1e293b;
color:#22c55e;
font-size:15px;
}

canvas{
background:white;
border-radius:12px;
padding:10px;
margin-top:20px;
}

@media(max-width:700px){

th{
font-size:10px;
padding:6px 2px;
}

td{
font-size:9px;
padding:5px 2px;
}

.header h1{
font-size:22px;
}

}

@media print{

body{
background:white;
color:black;
}

.topbar{
display:none;
}

canvas{
display:none;
}

}

</style>

</head>

<body>

<div class="header">

<h1>GMS TEXTILES LTD</h1>

<h2>Needle Ageing Report</h2>

</div>

<div class="topbar">

<select id="floorSelect">

<option value="ALL">ALL FLOOR</option>

<option value="Kadom R">Kadom R</option>
<option value="Kadom N">Kadom N</option>

<option value="Shapla R">Shapla R</option>
<option value="Shapla N">Shapla N</option>

<option value="Poddo R">Poddo R</option>
<option value="Poddo N">Poddo N</option>

<option value="Belly R">Belly R</option>
<option value="Belly N">Belly N</option>

<option value="Sample R">Sample R</option>
<option value="Sample N">Sample N</option>

<option value="EMBROIDERY R">EMBROIDERY R</option>
<option value="EMBROIDERY N">EMBROIDERY N</option>

</select>

<button onclick="window.print()">Print</button>

<button onclick="exportExcel()">Excel</button>

<button onclick="downloadPDF()">PDF</button>

</div>

<div class="dashboard">

<div class="card">
<h3>Total Item</h3>
<p id="totalItem">0</p>
</div>

<div class="card">
<h3>Running</h3>
<p id="runningItem">0</p>
</div>

<div class="card">
<h3>Slow Moving</h3>
<p id="slowItem">0</p>
</div>

<div class="card">
<h3>No Delivery</h3>
<p id="noDeliveryItem">0</p>
</div>

<div class="card">
<h3>Critical Stock</h3>
<p id="criticalItem">0</p>
</div>

<div class="card">
<h3>Total Stock</h3>
<p id="grandTotal">0</p>
</div>

</div>

<div class="tableWrap">

<table id="mainTable">

<thead>

<tr>

<th>Floor</th>
<th>SL</th>
<th>Needle Type</th>
<th>Size</th>
<th>Stock</th>
<th>Avg Delivery</th>
<th>Running Days</th>
<th>No Delivery</th>
<th>Status</th>

</tr>

</thead>

<tbody id="reportBody"></tbody>

</table>

</div>

<canvas id="stockChart"></canvas>

<canvas id="trendChart"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",

authDomain: "gms-warehouse-tracker-7f57e.firebaseapp.com",

projectId: "gms-warehouse-tracker-7f57e",

storageBucket: "gms-warehouse-tracker-7f57e.firebasestorage.app",

messagingSenderId: "992250313291",

appId: "1:992250313291:web:ee3bceae76d4d53bc26bce"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

function cleanText(value){

return String(value || "")
.toUpperCase()
.replace(/\s+/g,"")
.replace(/-/g,"")
.trim();

}

document.getElementById("floorSelect")
.addEventListener("change",loadReport);

async function loadReport(){

let selectedFloor=document.getElementById("floorSelect").value;

let body=document.getElementById("reportBody");

body.innerHTML="<tr><td colspan='9'>Loading...</td></tr>";

let snap=await getDocs(collection(db,"dailyPosting"));

let allData=[];

snap.forEach(doc=>{

let data=doc.data();

if(data.date){

allData.push(data);

}

});

allData.sort((a,b)=>new Date(a.date)-new Date(b.date));

let latestMap={};

allData.forEach(day=>{

if(selectedFloor!=="ALL" && day.floor!==selectedFloor){
return;
}

if(!day.rows) return;

day.rows.forEach(row=>{

// ===== DELETE ONLY THIS ITEM =====

if(

cleanText(day.floor)==="KADOMR"
&&
cleanText(row.needleType)==="DBX1SF"
&&
cleanText(row.size)==="11AP"

){
return;
}

// ===== END DELETE =====

if(!row.needleType || !row.size){
return;
}

let key=
cleanText(day.floor)+"_"+
cleanText(row.needleType)+"_"+
cleanText(row.size);

let present=Number(row.present)||0;

let delivery=Number(row.delivery)||0;

if(!latestMap[key]){

latestMap[key]={

floor:day.floor,

sl:row.sl || "",

displayName:row.needleType || "",

size:row.size || "",

stock:present,

deliveryTotal:0,

deliveryDays:0,

history:[]

};

}

latestMap[key].stock=present;

if(delivery>0){

latestMap[key].deliveryTotal += delivery;

latestMap[key].deliveryDays +=1;

}

latestMap[key].history.push({

date:day.date,
delivery:delivery

});

});

});

let html="";

let totalItem=0;
let running=0;
let slow=0;
let noDeliveryCount=0;
let critical=0;
let grandTotal=0;

let chartLabels=[];
let chartStock=[];

let trendLabels=[];
let trendData=[];

Object.values(latestMap).forEach(item=>{

totalItem++;

grandTotal += Number(item.stock)||0;

let avgUse=0;

if(item.deliveryDays>0){

avgUse=item.deliveryTotal/item.deliveryDays;

}

let avgShow=avgUse.toFixed(1);

let runningDays="-";

let stockDays=999;

if(avgUse>0){

stockDays=item.stock/avgUse;

runningDays=Math.floor(stockDays)+" Days";

}

let noDeliveryDays=0;

for(let i=item.history.length-1;i>=0;i--){

if(item.history[i].delivery>0){
break;
}

noDeliveryDays++;

}

let stockClass="stock-normal";

if(item.stock===0){

stockClass="stock-empty";

}
else if(noDeliveryDays>=30){

stockClass="stock-danger";

}
else if(stockDays<=7){

stockClass="stock-warning";

}

let status="Running";

let statusClass="status-running";

if(item.stock===0){

status="No Stock";

statusClass="status-stop";

}
else if(noDeliveryDays>=30){

status=noDeliveryDays+" Days No Delivery";

statusClass="status-stop";

noDeliveryCount++;

}
else if(noDeliveryDays>=13){

status=noDeliveryDays+" Days Slow Moving";

statusClass="status-slow";

slow++;

}
else{

running++;

}

html += `

<tr>

<td>${item.floor}</td>

<td>${item.sl}</td>

<td>${item.displayName}</td>

<td>${item.size}</td>

<td class="${stockClass}">${item.stock}</td>

<td>${avgShow}</td>

<td>${runningDays}</td>

<td>${noDeliveryDays} Days</td>

<td class="${statusClass}">${status}</td>

</tr>

`;

chartLabels.push(item.displayName+"-"+item.size);

chartStock.push(item.stock);

trendLabels.push(item.displayName);

trendData.push(item.deliveryTotal);

});

html += `

<tr class="totalRow">

<td colspan="4">GRAND TOTAL STOCK</td>

<td>${grandTotal}</td>

<td colspan="4">MATCH DAILY ENTRY REPORT</td>

</tr>

`;

body.innerHTML=html;

document.getElementById("totalItem").innerText=totalItem;
document.getElementById("runningItem").innerText=running;
document.getElementById("slowItem").innerText=slow;
document.getElementById("noDeliveryItem").innerText=noDeliveryCount;
document.getElementById("criticalItem").innerText=critical;
document.getElementById("grandTotal").innerText=grandTotal;

drawStockChart(chartLabels,chartStock);

drawTrendChart(trendLabels,trendData);

console.log("FINAL STOCK =",grandTotal);

}

function drawStockChart(labels,data){

const oldChart=Chart.getChart("stockChart");

if(oldChart){
oldChart.destroy();
}

const ctx=document.getElementById("stockChart");

new Chart(ctx,{

type:"bar",

data:{

labels:labels,

datasets:[{

label:"Current Stock",

data:data,
backgroundColor:"#2563eb"

}]

}

});

}

function drawTrendChart(labels,data){

const oldChart=Chart.getChart("trendChart");

if(oldChart){
oldChart.destroy();
}

const ctx=document.getElementById("trendChart");

new Chart(ctx,{

type:"line",

data:{

labels:labels,

datasets:[{

label:"Needle Consumption Trend",

data:data,
borderColor:"#22c55e"

}]

}

});

}

window.exportExcel=function(){

let table=document.getElementById("mainTable");

let wb=XLSX.utils.table_to_book(table,{
sheet:"Needle Report"
});

XLSX.writeFile(wb,"Needle_Ageing_Report.xlsx");

}

window.downloadPDF=function(){

html2pdf()
.from(document.body)
.save("Needle_Ageing_Report.pdf");

}

loadReport();

</script>

</body>

</html>
