async function loadReport(){

let selectedFloor=document.getElementById("floorSelect").value;

let body=document.getElementById("reportBody");

let snap=await getDocs(collection(db,"dailyPosting"));

let allData=[];

snap.forEach(doc=>{
let data=doc.data();
if(data.date){
allData.push(data);
}
});

allData.sort((a,b)=>new Date(a.date)-new Date(b.date));

let latestMap={};

allData.forEach(day=>{

if(
selectedFloor !== "ALL" &&
day.floor.trim().toLowerCase() !== selectedFloor.trim().toLowerCase()
){
return;
}

if(!day.rows) return;

day.rows.forEach(row=>{

if(!row.needleType || !row.size){
return;
}

let key=
day.floor.trim()+"_"+
row.needleType.trim()+"_"+
row.size.trim();

let present=Number(row.present)||0;
let delivery=Number(row.delivery)||0;

if(!latestMap[key]){
latestMap[key]={
floor:day.floor,
sl:row.sl || "",
type:row.needleType || "",
size:row.size || "",
stock:0,
deliveryTotal:0,
deliveryDays:0,
history:[]
};
}

latestMap[key].stock += present;

if(delivery>0){
latestMap[key].deliveryTotal += delivery;
latestMap[key].deliveryDays +=1;
}

latestMap[key].history.push({
delivery:delivery
});

});
});

let html="";

let running=0;
let slow=0;
let noDeliveryCount=0;
let critical=0;
let grandTotal=0;

totalItem++;
grandTotal += Number(item.stock)||0;

let avgUse=0;

if(item.deliveryDays>0){
avgUse=item.deliveryTotal/item.deliveryDays;
}

let avgShow=avgUse.toFixed(1);

let runningDays="-";

runningDays=Math.floor(item.stock/avgUse)+" Days";
}

let noDeliveryDays=0;

for(let i=item.history.length-1;i>=0;i--){
if(item.history[i].delivery>0){

}

}

if(item.stock===0){
stockClass="stock-empty";
}
else if(item.stock<=5){
stockClass="stock-warning";

}
