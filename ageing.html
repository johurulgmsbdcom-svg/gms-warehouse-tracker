<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Needle Ageing Report</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#071229;
  color:white;
  font-family:Arial,sans-serif;
  padding:10px;
}

.header{
  text-align:center;
  margin-bottom:15px;
}

.header h1{
  font-size:28px;
}

.header h2{
  font-size:18px;
  margin-top:5px;
  color:#cbd5e1;
}

.topbar{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

select,button{
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  font-size:14px;
}

button{
  background:#2563eb;
  color:white;
  cursor:pointer;
}

.dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:12px;
  margin-bottom:15px;
}

.card{
  background:#0f172a;
  border:1px solid #334155;
  border-radius:12px;
  padding:15px;
  text-align:center;
}

.card h3{
  color:#94a3b8;
  margin-bottom:10px;
}

.card p{
  font-size:28px;
  font-weight:bold;
}

.tableWrap{
  overflow:auto;
  margin-top:15px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#08112c;
}

th{
  background:#0f172a;
  color:white;
  border:2px solid #d1d5db;
  padding:10px 5px;
  font-size:13px;
}

td{
  border:2px solid #d1d5db;
  padding:8px 4px;
  text-align:center;
  font-size:12px;
  font-weight:bold;
}

.stock-green{
  background:green;
  color:white;
}

.stock-yellow{
  background:#facc15;
  color:black;
}

.stock-red{
  background:red;
  color:white;
}

.stock-white{
  background:white;
  color:black;
}

.age-green{
  color:#22c55e;
}

.age-yellow{
  color:#facc15;
}

.age-red{
  color:#ff4d4d;
}

.totalRow{
  background:#1e293b;
  color:#22c55e;
}

canvas{
  background:white;
  border-radius:12px;
  padding:10px;
  margin-top:20px;
}

@media(max-width:700px){

  th{
    font-size:10px;
    padding:6px 2px;
  }

  td{
    font-size:9px;
    padding:5px 2px;
  }

  .header h1{
    font-size:22px;
  }

}

@media print{

  body{
    background:white;
    color:black;
  }

  .topbar{
    display:none;
  }

  canvas{
    display:none;
  }

}

</style>
</head>

<body>

<div class="header">

<h1>GMS TEXTILES LTD</h1>

<h2>Needle Ageing Report</h2>

</div>

<div class="topbar">

<select id="floorSelect">

<option value="ALL">ALL FLOOR</option>

<option value="Kadom R">Kadom R</option>
<option value="Kadom N">Kadom N</option>

<option value="Shapla R">Shapla R</option>
<option value="Shapla N">Shapla N</option>

<option value="Poddo R">Poddo R</option>
<option value="Poddo N">Poddo N</option>

<option value="Belly R">Belly R</option>
<option value="Belly N">Belly N</option>

<option value="Sample R">Sample R</option>
<option value="Sample N">Sample N</option>

<option value="EMBROIDERY R">EMBROIDERY R</option>
<option value="EMBROIDERY N">EMBROIDERY N</option>

</select>

<button onclick="window.print()">Print</button>

<button onclick="exportExcel()">Excel</button>

<button onclick="downloadPDF()">PDF</button>

</div>

<div class="dashboard">

<div class="card">
<h3>Total Item</h3>
<p id="totalItem">0</p>
</div>

<div class="card">
<h3>Running</h3>
<p id="runningItem">0</p>
</div>

<div class="card">
<h3>Slow Moving</h3>
<p id="slowItem">0</p>
</div>

<div class="card">
<h3>No Movement</h3>
<p id="notMoving">0</p>
</div>

<div class="card">
<h3>Critical Stock</h3>
<p id="criticalItem">0</p>
</div>

<div class="card">
<h3>Grand Total</h3>
<p id="grandTotal">0</p>
</div>

</div>

<h2 style="margin-top:20px;">Critical Stock Alert</h2>

<div class="tableWrap">

<table>

<thead>

<tr>

<th>Floor</th>
<th>Needle</th>
<th>Size</th>
<th>Stock</th>
<th>Running Days</th>

</tr>

</thead>

<tbody id="criticalBody"></tbody>

</table>

</div>

<div class="tableWrap">

<table id="mainTable">

<thead>

<tr>

<th>Floor</th>
<th>SL</th>
<th>Needle Type</th>
<th>Size</th>
<th>Stock</th>
<th>Avg Use</th>
<th>Running Days</th>
<th>Last Delivery</th>
<th>Status</th>

</tr>

</thead>

<tbody id="reportBody"></tbody>

</table>

</div>

<canvas id="stockChart"></canvas>

<canvas id="trendChart"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",

  authDomain: "gms-warehouse-tracker-7f57e.firebaseapp.com",

  projectId: "gms-warehouse-tracker-7f57e",

  storageBucket: "gms-warehouse-tracker-7f57e.firebasestorage.app",

  messagingSenderId: "992250313291",

  appId: "1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

document.getElementById("floorSelect")
.addEventListener("change",loadReport);

async function loadReport(){

  let selectedFloor=document.getElementById("floorSelect").value;

  let body=document.getElementById("reportBody");

  let criticalBody=document.getElementById("criticalBody");

  body.innerHTML="<tr><td colspan='9'>Loading...</td></tr>";

  const snap=await getDocs(collection(db,"dailyPosting"));

  let allData=[];

  snap.forEach(doc=>{

    let data=doc.data();

    if(data.date){

      allData.push(data);

    }

  });

  allData.sort((a,b)=>new Date(a.date)-new Date(b.date));

  let itemMap={};

  allData.forEach(day=>{

    if(selectedFloor!=="ALL" && day.floor!==selectedFloor){
      return;
    }

    if(!day.rows) return;

    day.rows.forEach(row=>{

      if(!row.needleType || !row.size){
        return;
      }

      let key=day.floor+"_"+row.needleType+"_"+row.size;

      if(!itemMap[key]){

        itemMap[key]={

          floor:day.floor,
          sl:row.sl || "",
          type:row.needleType || "",
          size:row.size || "",

          stock:0,

          totalDelivery:0,

          totalDays:0,

          deliveryHistory:[]

        };

      }

      let opening=Number(row.opening)||0;

      let receive=Number(row.receive)||0;

      let delivery=Number(row.delivery)||0;

      let present=opening+receive-delivery;

      itemMap[key].stock=present;

      itemMap[key].totalDelivery += delivery;

      itemMap[key].totalDays +=1;

      itemMap[key].deliveryHistory.push({

        date:day.date,
        delivery:delivery

      });

    });

  });

  let html="";

  let criticalHTML="";

  let total=0;

  let running=0;

  let slow=0;

  let notMoving=0;

  let critical=0;

  let grandTotal=0;

  let labels=[];

  let stockData=[];

  let trendLabels=[];

  let trendData=[];

  Object.values(itemMap).forEach(item=>{

    total++;

    grandTotal += Number(item.stock)||0;

    let avgUse=0;

    if(item.totalDays>0){

      avgUse=item.totalDelivery/item.totalDays;

    }

    let avgShow=avgUse.toFixed(1);

    let runningDays="-";

    let stockDays=999;

    if(item.stock>0 && avgUse>0){

      stockDays=item.stock/avgUse;

      runningDays=Math.floor(stockDays)+" Days";

    }

    let noDelivery=0;

    let lastDelivery="-";

    for(let i=item.deliveryHistory.length-1;i>=0;i--){

      if(item.deliveryHistory[i].delivery>0){

        lastDelivery=item.deliveryHistory[i].date;

        break;

      }

      noDelivery++;

    }

    let stockClass="stock-green";

    if(item.stock===0){

      stockClass="stock-white";

    }
    else if(stockDays<=7){

      stockClass="stock-red";

    }
    else if(stockDays<=20){

      stockClass="stock-yellow";

    }

    let status="";

    let ageClass="age-green";

    if(item.stock===0){

      status="Stock Empty";

      ageClass="age-red";

    }
    else if(noDelivery>=30){

      status=noDelivery+" Days No Movement";

      ageClass="age-red";

      notMoving++;

    }
    else if(noDelivery>=12){

      status=noDelivery+" Days Slow Moving";

      ageClass="age-yellow";

      slow++;

    }
    else{

      status="Running";

      ageClass="age-green";

      running++;

    }

    if(stockDays<=5){

      critical++;

      criticalHTML += `

      <tr>

      <td>${item.floor}</td>

      <td>${item.type}</td>

      <td>${item.size}</td>

      <td>${item.stock}</td>

      <td>${runningDays}</td>

      </tr>

      `;

    }

    html += `

    <tr>

    <td>${item.floor}</td>

    <td>${item.sl}</td>

    <td>${item.type}</td>

    <td>${item.size}</td>

    <td class="${stockClass}">${item.stock}</td>

    <td>${avgShow}</td>

    <td>${runningDays}</td>

    <td>${lastDelivery}</td>

    <td class="${ageClass}">${status}</td>

    </tr>

    `;

    labels.push(item.type+"-"+item.size);

    stockData.push(item.stock);

    trendLabels.push(item.type);

    trendData.push(item.totalDelivery);

  });

  html += `

  <tr class="totalRow">

  <td colspan="4">GRAND TOTAL STOCK</td>

  <td>${grandTotal}</td>

  <td colspan="4">MATCH DAILY ENTRY REPORT</td>

  </tr>

  `;

  body.innerHTML=html;

  criticalBody.innerHTML=criticalHTML;

  document.getElementById("totalItem").innerText=total;

  document.getElementById("runningItem").innerText=running;

  document.getElementById("slowItem").innerText=slow;

  document.getElementById("notMoving").innerText=notMoving;

  document.getElementById("criticalItem").innerText=critical;

  document.getElementById("grandTotal").innerText=grandTotal;

  drawStockChart(labels,stockData);

  drawTrendChart(trendLabels,trendData);

}

function drawStockChart(labels,data){

  const ctx=document.getElementById("stockChart");

  new Chart(ctx,{

    type:"bar",

    data:{

      labels:labels,

      datasets:[{

        label:"Current Stock",

        data:data

      }]

    }

  });

}

function drawTrendChart(labels,data){

  const ctx=document.getElementById("trendChart");

  new Chart(ctx,{

    type:"line",

    data:{

      labels:labels,

      datasets:[{

        label:"Needle Consumption",

        data:data

      }]

    }

  });

}

window.exportExcel=function(){

  let table=document.getElementById("mainTable");

  let wb=XLSX.utils.table_to_book(table,{sheet:"Report"});

  XLSX.writeFile(wb,"Needle_Ageing_Report.xlsx");

}

window.downloadPDF=function(){

  html2pdf().from(document.body).save("Needle_Report.pdf");

}

loadReport();

</script>

</body>
</html>
