<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Needle Ageing Report</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#07122b;
  color:#fff;
  padding:10px;
}

.header{
  text-align:center;
  margin-bottom:15px;
}

.header h1{
  font-size:26px;
  font-weight:bold;
}

.header h2{
  font-size:18px;
  margin-top:4px;
  color:#cbd5e1;
}

.topBar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  align-items:center;
  margin-bottom:15px;
}

select{
  padding:10px;
  border-radius:8px;
  border:none;
  font-size:15px;
  font-weight:bold;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
  margin-bottom:18px;
}

.card{
  background:#0f172a;
  border:1px solid #334155;
  border-radius:12px;
  padding:15px;
  text-align:center;
}

.card h3{
  font-size:15px;
  color:#94a3b8;
  margin-bottom:8px;
}

.card p{
  font-size:24px;
  font-weight:bold;
}

.tableWrap{
  overflow:auto;
  border-radius:12px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#08112c;
}

th{
  background:#0f172a;
  color:#fff;
  padding:14px 8px;
  border:2px solid #d1d5db;
  font-size:15px;
}

td{
  border:2px solid #d1d5db;
  padding:10px 6px;
  text-align:center;
  font-size:14px;
  font-weight:bold;
}

.stock-green{
  background:#008000;
  color:#fff;
}

.stock-yellow{
  background:#facc15;
  color:#000;
}

.stock-red{
  background:#ff0000;
  color:#fff;
}

.stock-white{
  background:#fff;
  color:#000;
}

.age-green{
  color:#22c55e;
}

.age-yellow{
  color:#facc15;
}

.age-red{
  color:#ff4d4d;
}

.lowStock{
  background:#ff9800;
  color:#000;
  padding:3px 6px;
  border-radius:6px;
  font-size:12px;
  margin-left:5px;
}

@media(max-width:700px){

  th{
    font-size:11px;
    padding:8px 4px;
  }

  td{
    font-size:10px;
    padding:7px 4px;
  }

  .header h1{
    font-size:20px;
  }

  .header h2{
    font-size:14px;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>GMS TEXTILES LTD</h1>
  <h2>Needle Ageing Report</h2>
</div>

<div class="topBar">

<select id="floorSelect" onchange="loadReport()">
<option value="ALL">All Floor</option>

<option>Kadom R</option>
<option>Kadom N</option>

<option>Shapla R</option>
<option>Shapla N</option>

<option>Poddo R</option>
<option>Poddo N</option>

<option>Belly R</option>
<option>Belly N</option>

<option>Sample R</option>
<option>Sample N</option>

<option>EMBROIDERY R</option>
<option>EMBROIDERY N</option>

</select>

<button onclick="window.print()">Print Report</button>

</div>

<div class="dashboard">

<div class="card">
<h3>Total Item</h3>
<p id="totalItem">0</p>
</div>

<div class="card">
<h3>Running Item</h3>
<p id="runningItem">0</p>
</div>

<div class="card">
<h3>Slow Moving</h3>
<p id="slowItem">0</p>
</div>

<div class="card">
<h3>Not Moving</h3>
<p id="notMoving">0</p>
</div>

</div>

<div class="tableWrap">

<table>

<thead>

<tr>
<th>Floor</th>
<th>Serial</th>
<th>Needle Type</th>
<th>Size</th>
<th>Stock</th>
<th>Avg Delivery</th>
<th>Running</th>
<th>Status</th>
</tr>

</thead>

<tbody id="reportBody"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";


const firebaseConfig = {

  apiKey: "AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",

  authDomain: "gms-warehouse-tracker-7f57e.firebaseapp.com",

  projectId: "gms-warehouse-tracker-7f57e",

  storageBucket: "gms-warehouse-tracker-7f57e.firebasestorage.app",

  messagingSenderId: "992250313291",

  appId: "1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);



async function loadReport(){

  let floorFilter=document.getElementById("floorSelect").value;

  let body=document.getElementById("reportBody");

  body.innerHTML="<tr><td colspan='8'>Loading...</td></tr>";

  let snap=await getDocs(collection(db,"dailyPosting"));

  let reports=[];

  snap.forEach(doc=>{

    reports.push(doc.data());

  });

  reports.sort((a,b)=>a.date.localeCompare(b.date));



  let map={};



  reports.forEach(day=>{

    if(floorFilter!=="ALL" && day.floor!==floorFilter) return;

    if(!day.rows) return;



    day.rows.forEach(row=>{

      let key=day.floor+"_"+row.needleType+"_"+row.size;

      if(!map[key]){

        map[key]={

          floor:day.floor,

          sl:row.sl,

          type:row.needleType,

          size:row.size,

          stock:0,

          totalDelivery:0,

          days:0,

          lastDeliveryDate:null

        };

      }



      map[key].stock=row.present || 0;

      map[key].totalDelivery += Number(row.delivery)||0;

      map[key].days +=1;



      if(Number(row.delivery)>0){

        map[key].lastDeliveryDate=day.date;

      }

    });

  });



  let html="";

  let total=0;
  let running=0;
  let slow=0;
  let notMoving=0;

  let today=new Date();



  Object.values(map).forEach(item=>{

    total++;



    let avg=item.days>0 ? (item.totalDelivery/item.days) : 0;

    avg=avg.toFixed(1);



    let runDays=0;

    if(avg>0){

      runDays=(item.stock/avg).toFixed(0);

    }



    let stockClass="stock-green";

    if(item.stock<=0){

      stockClass="stock-white";
    }
    else if(item.stock<=20){

      stockClass="stock-red";
    }
    else if(item.stock<=50){

      stockClass="stock-yellow";
    }



    let statusText="";

    let ageClass="age-green";



    if(!item.lastDeliveryDate){

      statusText="No Delivery";

      ageClass="age-red";

      notMoving++;
    }

    else{

      let last=new Date(item.lastDeliveryDate);

      let diff=Math.floor((today-last)/(1000*60*60*24));



      if(diff>=30){

        statusText=diff+" Days Not Moving";

        ageClass="age-red";

        notMoving++;

      }

      else if(diff>=5){

        statusText=diff+" Days Slow Moving";

        ageClass="age-yellow";

        slow++;

      }

      else{

        statusText=diff+" Days Running";

        ageClass="age-green";

        running++;

      }

    }



    let runningText="";

    if(item.stock<=0){

      runningText="-";
    }
    else if(avg<=0){

      runningText="No Use";
    }
    else{

      runningText=runDays+" Days";

      if(item.stock<=20){

        runningText += " 🔥 Low Stock";
      }

    }



    html+=`

    <tr>

    <td>${item.floor}</td>

    <td>${item.sl}</td>

    <td>${item.type}</td>

    <td>${item.size}</td>

    <td class="${stockClass}">${item.stock}</td>

    <td>${avg}</td>

    <td>${runningText}</td>

    <td class="${ageClass}">${statusText}</td>

    </tr>

    `;

  });



  body.innerHTML=html;



  document.getElementById("totalItem").innerText=total;

  document.getElementById("runningItem").innerText=running;

  document.getElementById("slowItem").innerText=slow;

  document.getElementById("notMoving").innerText=notMoving;

}



loadReport();

</script>

</body>
</html>
