<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Needle Ageing Report</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:#fff;
  padding:10px;
}

.header{
  text-align:center;
  margin-bottom:15px;
}

.header h1{
  font-size:24px;
  color:#38bdf8;
}

.header h2{
  font-size:18px;
  margin-top:4px;
}

.topbar{
  background:#1e293b;
  padding:12px;
  border-radius:10px;
  margin-bottom:15px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
  justify-content:center;
}

select,button{
  padding:10px;
  border-radius:8px;
  border:none;
  font-size:14px;
}

button{
  background:#2563eb;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.summary{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
  margin-bottom:18px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  text-align:center;
  border:1px solid #334155;
}

.card h3{
  font-size:15px;
  margin-bottom:8px;
  color:#cbd5e1;
}

.card p{
  font-size:24px;
  font-weight:bold;
  color:#38bdf8;
}

.tableWrap{
  overflow:auto;
  background:#fff;
  border-radius:12px;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:1300px;
  color:#000;
}

th,td{
  border:1px solid #cbd5e1;
  padding:6px;
  text-align:center;
  font-size:12px;
}

th{
  background:#0f172a;
  color:#fff;
  position:sticky;
  top:0;
}

.green{
  background:#dcfce7;
  color:#166534;
  font-weight:bold;
}

.yellow{
  background:#fef9c3;
  color:#854d0e;
  font-weight:bold;
}

.red{
  background:#fee2e2;
  color:#b91c1c;
  font-weight:bold;
}

.whiteStock{
  background:#fff !important;
  color:#000 !important;
}

.lowStock{
  background:#f97316;
  color:#fff;
  font-weight:bold;
}

tfoot td{
  background:#0f172a;
  color:#fff;
  font-weight:bold;
}

@media(max-width:768px){

  body{
    padding:5px;
  }

  .header h1{
    font-size:18px;
  }

  .header h2{
    font-size:14px;
  }

  th,td{
    font-size:10px;
    padding:4px;
  }

}
</style>
</head>

<body>

<div class="header">
  <h1>GMS TEXTILES LTD</h1>
  <h2>Needle Ageing Report</h2>
</div>

<div class="topbar">

<select id="floorSelect">
  <option value="ALL">All Floor</option>
  <option>Kadom R</option>
  <option>Kadom N</option>
  <option>Shapla R</option>
  <option>Shapla N</option>
  <option>Poddo R</option>
  <option>Poddo N</option>
  <option>Belly R</option>
  <option>Belly N</option>
  <option>Sample R</option>
  <option>Sample N</option>
  <option>EMBROIDERY R</option>
  <option>EMBROIDERY N</option>
</select>

<button onclick="loadAgeingReport()">Refresh Report</button>

</div>

<div class="summary">

<div class="card">
<h3>Total Stock</h3>
<p id="totalStock">0</p>
</div>

<div class="card">
<h3>Slow Moving</h3>
<p id="slowCount">0</p>
</div>

<div class="card">
<h3>Low Stock</h3>
<p id="lowCount">0</p>
</div>

<div class="card">
<h3>No Delivery</h3>
<p id="noDelivery">0</p>
</div>

</div>

<div class="tableWrap">

<table>

<thead>

<tr>
<th>SL</th>
<th>Floor</th>
<th>Needle Type</th>
<th>Size</th>
<th>Present Stock</th>
<th>Total Delivery</th>
<th>Avg Daily Use</th>
<th>Stock Days</th>
<th>Status</th>
</tr>

</thead>

<tbody id="reportBody"></tbody>

<tfoot>

<tr>
<td colspan="4">GRAND TOTAL</td>
<td id="grandStock">0</td>
<td id="grandDelivery">0</td>
<td>-</td>
<td>-</td>
<td>-</td>
</tr>

</tfoot>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
  authDomain: "gms-warehouse-tracker-7f57e.firebaseapp.com",
  projectId: "gms-warehouse-tracker-7f57e",
  storageBucket: "gms-warehouse-tracker-7f57e.firebasestorage.app",
  messagingSenderId: "992250313291",
  appId: "1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadAgeingReport(){

  const selectedFloor=document.getElementById("floorSelect").value;

  const snap=await getDocs(collection(db,"dailyPosting"));

  let allData=[];

  snap.forEach(doc=>{
    allData.push(doc.data());
  });

  let latestMap={};

  allData.forEach(data=>{

    if(selectedFloor!=="ALL" && data.floor!==selectedFloor){
      return;
    }

    if(
      !latestMap[data.floor] ||
      latestMap[data.floor].date < data.date
    ){
      latestMap[data.floor]=data;
    }

  });

  let html="";

  let totalStock=0;
  let totalDelivery=0;

  let slowCount=0;
  let lowCount=0;
  let noDeliveryCount=0;

  Object.values(latestMap).forEach(floorData=>{

    const daysRunning=getDaysFromStart(floorData.date);

    floorData.rows.forEach((row,index)=>{

      let stock=Number(row.present)||0;

      let delivery=Number(row.delivery)||0;

      let avgUse=0;
      let stockDays=0;

      if(daysRunning>0){
        avgUse=(delivery/daysRunning);
      }

      if(avgUse>0){
        stockDays=(stock/avgUse);
      }

      let status="";
      let cls="";

      if(stock===0){

        cls="whiteStock";
        status="";

      }else{

        if(delivery===0){

          if(daysRunning>=30){

            status="Slow Moving";
            cls="red";
            slowCount++;

          }else{

            status=daysRunning+" Days No Delivery";
            cls="yellow";
            noDeliveryCount++;

          }

        }else{

          if(stock<=20){

            status="Low Stock";
            cls="lowStock";
            lowCount++;

          }
          else if(stockDays<=2){

            status="Cholse Na";
            cls="red";

          }
          else if(stockDays<=10){

            status=Math.round(stockDays)+" Days";
            cls="yellow";

          }
          else{

            status=Math.round(stockDays)+" Days";
            cls="green";

          }

        }

      }

      totalStock+=stock;
      totalDelivery+=delivery;

      html+=`
      <tr class="${cls}">
        <td>${index+1}</td>
        <td>${floorData.floor}</td>
        <td>${row.needleType}</td>
        <td>${row.size}</td>
        <td>${stock}</td>
        <td>${delivery}</td>
        <td>${avgUse.toFixed(1)}</td>
        <td>${avgUse>0 ? Math.round(stockDays) : "-"}</td>
        <td>${status}</td>
      </tr>
      `;

    });

  });

  document.getElementById("reportBody").innerHTML=html;

  document.getElementById("grandStock").innerText=totalStock;
  document.getElementById("grandDelivery").innerText=totalDelivery;

  document.getElementById("totalStock").innerText=totalStock;
  document.getElementById("slowCount").innerText=slowCount;
  document.getElementById("lowCount").innerText=lowCount;
  document.getElementById("noDelivery").innerText=noDeliveryCount;

}

function getDaysFromStart(lastDate){

  const startDate=new Date("2026-05-01");

  const today=new Date(lastDate);

  const diff=today-startDate;

  const days=Math.floor(diff/(1000*60*60*24))+1;

  return days>0 ? days : 1;

}

window.loadAgeingReport=loadAgeingReport;

loadAgeingReport();

</script>

</body>
</html>
