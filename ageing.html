<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Needle Ageing Report</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#071028;
  font-family:Arial,sans-serif;
  color:#fff;
  padding:12px;
}

.container{
  max-width:1700px;
  margin:auto;
}

.header{
  text-align:center;
  margin-bottom:15px;
}

.header h1{
  font-size:30px;
  color:#fff;
  margin-bottom:5px;
}

.header h2{
  font-size:20px;
  color:#93c5fd;
  font-weight:normal;
}

.topBar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  align-items:center;
  margin:20px 0;
}

select,
button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  font-size:15px;
}

select{
  background:#fff;
}

button{
  background:#2563eb;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.summaryGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
  margin-bottom:20px;
}

.card{
  background:#0b1738;
  border:1px solid #1e3a8a;
  border-radius:14px;
  padding:18px;
  text-align:center;
  box-shadow:0 0 12px rgba(0,0,0,.3);
}

.card h3{
  color:#93c5fd;
  font-size:15px;
  margin-bottom:10px;
}

.card .number{
  font-size:34px;
  font-weight:bold;
}

.tableWrap{
  overflow:auto;
  border-radius:14px;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:1100px;
  overflow:hidden;
}

thead{
  background:#0b1738;
}

th{
  padding:16px 10px;
  border:2px solid #d1d5db;
  font-size:17px;
}

td{
  padding:12px 8px;
  border:2px solid #d1d5db;
  text-align:center;
  font-size:15px;
  background:#08122e;
}

.stockGreen{
  background:#008000;
  color:#fff;
  font-weight:bold;
}

.stockYellow{
  background:#facc15;
  color:#000;
  font-weight:bold;
}

.stockRed{
  background:#ef4444;
  color:#fff;
  font-weight:bold;
}

.stockWhite{
  background:#fff;
  color:#000;
  font-weight:bold;
}

.ageGreen{
  color:#4ade80;
  font-weight:bold;
}

.ageYellow{
  color:#facc15;
  font-weight:bold;
}

.ageRed{
  color:#ef4444;
  font-weight:bold;
}

.lowStock{
  color:#f97316;
  font-weight:bold;
}

.noMove{
  color:#ef4444;
  font-weight:bold;
}

.footerTotal{
  margin-top:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  color:#4ade80;
}

@media(max-width:700px){

  body{
    padding:6px;
  }

  .header h1{
    font-size:23px;
  }

  .header h2{
    font-size:16px;
  }

  th{
    font-size:12px;
    padding:10px 4px;
  }

  td{
    font-size:11px;
    padding:8px 3px;
  }

  .card .number{
    font-size:25px;
  }

}

@media print{
  body{
    background:#fff;
    color:#000;
  }

  .topBar button,
  .topBar select{
    display:none;
  }

  td{
    background:#fff !important;
    color:#000 !important;
  }

}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>GMS TEXTILES LTD</h1>
<h2>Needle Ageing Report</h2>
</div>

<div class="topBar">

<select id="floorSelect" onchange="loadAgeingReport()">
<option value="ALL">All Floor</option>

<option>Kadom R</option>
<option>Kadom N</option>

<option>Shapla R</option>
<option>Shapla N</option>

<option>Poddo R</option>
<option>Poddo N</option>

<option>Belly R</option>
<option>Belly N</option>

<option>Sample R</option>
<option>Sample N</option>

<option>EMBROIDERY R</option>
<option>EMBROIDERY N</option>

</select>

<button onclick="window.print()">Print Report</button>

</div>

<div class="summaryGrid">

<div class="card">
<h3>Total Stock</h3>
<div class="number" id="totalStock">0</div>
</div>

<div class="card">
<h3>Total Items</h3>
<div class="number" id="totalItems">0</div>
</div>

<div class="card">
<h3>Slow Moving</h3>
<div class="number" id="slowItems">0</div>
</div>

<div class="card">
<h3>Low Stock</h3>
<div class="number" id="lowStockItems">0</div>
</div>

</div>

<div class="tableWrap">

<table>

<thead>
<tr>
<th>Floor</th>
<th>Serial No</th>
<th>Needle Type</th>
<th>Size</th>
<th>Present Stock</th>
<th>Average Use</th>
<th>Stock Coverage</th>
<th>Status</th>
</tr>
</thead>

<tbody id="reportBody"></tbody>

</table>

</div>

<div class="footerTotal">
Grand Total Stock :
<span id="grandTotal">0</span>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",

  authDomain: "gms-warehouse-tracker-7f57e.firebaseapp.com",

  projectId: "gms-warehouse-tracker-7f57e",

  storageBucket: "gms-warehouse-tracker-7f57e.firebasestorage.app",

  messagingSenderId: "992250313291",

  appId: "1:992250313291:web:ee3bceae76d4d53bc26bce"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
   ALL FLOOR DATA
========================= */

const floorData = {

"Kadom R":[
[1,"DBX1","7",25],
[2,"DBX1","8",1],
[3,"DBX1","9",32],
[4,"DBX1","10",8],
[5,"DBX1","11",1]
],

"Kadom N":[
[1,"DBX1","7",16],
[2,"DBX1","9",30],
[3,"DCX1","7",20],
[4,"UYX128","10",10]
],

"Shapla R":[
[1,"DBX1","7",25],
[2,"DBX1","8",16],
[3,"DCX1","9",68],
[4,"UYX128","10",43]
],

"Shapla N":[
[1,"DBX1","7",16],
[2,"DBX1","9",27],
[3,"DCX1","9",79],
[4,"UYX128","10",47]
],

"Poddo R":[
[1,"DBX1","7",18],
[2,"DBX1","8",3],
[3,"DCX1","8",77],
[4,"UYX128","10",59]
],

"Poddo N":[
[1,"DBX1","9",3],
[2,"UY/UOX113","11",63],
[3,"DVX57","14",104]
],

"Belly R":[
[1,"DBX1","9",100],
[2,"DCX1","11",43],
[3,"UYX128","14",16]
],

"Belly N":[
[1,"DBX1","9",12],
[2,"UYX128","11",38],
[3,"DPX5","14",20]
],

"Sample R":[
[1,"DBX1","8",51],
[2,"UYX128","10",48],
[3,"DPX17","11",60]
],

"Sample N":[
[1,"DBX1","9",23],
[2,"UYX128","11",20],
[3,"DPX5","11",20]
],

"EMBROIDERY R":[
[1,"DBX1","8",214],
[2,"DBX1","9",234],
[3,"PHXC70","14",65]
],

"EMBROIDERY N":[
[1,"DBX1","8",37],
[2,"DCX1","11",68],
[3,"PHXC70","16",20]
]

};

/* ========================= */

async function loadAgeingReport(){

  let selectedFloor = document.getElementById("floorSelect").value;

  let body = document.getElementById("reportBody");

  body.innerHTML = "";

  let totalStock = 0;
  let totalItems = 0;
  let slowItems = 0;
  let lowStockItems = 0;

  const snap = await getDocs(collection(db,"dailyPosting"));

  let reports = [];

  snap.forEach(doc=>{

    reports.push(doc.data());

  });

  let floors = [];

  if(selectedFloor === "ALL"){

    floors = Object.keys(floorData);

  }else{

    floors = [selectedFloor];

  }

  floors.forEach(floor=>{

    let items = floorData[floor] || [];

    items.forEach(item=>{

      let sl = item[0];
      let type = item[1];
      let size = item[2];
      let opening = Number(item[3]) || 0;

      let receive = 0;
      let delivery = 0;

      reports.forEach(rep=>{

        if(rep.floor === floor){

          rep.rows.forEach(r=>{

            if(
              r.needleType === type &&
              r.size === size
            ){

              receive += Number(r.receive)||0;
              delivery += Number(r.delivery)||0;

            }

          });

        }

      });

      let present = opening + receive - delivery;

      if(present < 0){
        present = 0;
      }

      let avgUse = Math.ceil(delivery / 7);

      if(avgUse <= 0){
        avgUse = 0;
      }

      let coverage = 0;

      if(avgUse > 0){

        coverage = Math.floor(present / avgUse);

      }

      let status = "";
      let ageClass = "";

      if(delivery === 0){

        let days = 13;

        if(days >= 30){

          status = "30+ Days Slow Moving";
          ageClass = "ageRed";
          slowItems++;

        }else{

          status = days + " Days No Delivery";
          ageClass = "ageYellow";

        }

      }else{

        if(coverage >= 30){

          status = coverage + " Days Slow Moving";
          ageClass = "ageRed";
          slowItems++;

        }
        else if(coverage >= 10){

          status = coverage + " Days";
          ageClass = "ageGreen";

        }
        else if(coverage >= 5){

          status = coverage + " Days";
          ageClass = "ageYellow";

        }
        else{

          status = coverage + " Days";
          ageClass = "ageRed";

        }

      }

      let stockClass = "";

      if(present === 0){

        stockClass = "stockWhite";

      }
      else if(present <= 5){

        stockClass = "stockRed";

      }
      else if(present <= 20){

        stockClass = "stockYellow";

      }
      else{

        stockClass = "stockGreen";

      }

      let lowText = "";

      if(
        present > 0 &&
        present <= 20 &&
        delivery > 0
      ){

        lowText = "<div class='lowStock'>Low Stock</div>";
        lowStockItems++;

      }

      totalStock += present;
      totalItems++;

      body.innerHTML += `

      <tr>

      <td>${floor}</td>

      <td>${sl}</td>

      <td>${type}</td>

      <td>${size}</td>

      <td class="${stockClass}">
      ${present}
      </td>

      <td>
      ${avgUse}
      </td>

      <td class="${ageClass}">
      ${coverage > 0 ? coverage + " Days" : "-"}
      </td>

      <td class="${ageClass}">
      ${status}
      ${lowText}
      </td>

      </tr>

      `;

    });

  });

  document.getElementById("totalStock").innerText = totalStock;

  document.getElementById("totalItems").innerText = totalItems;

  document.getElementById("slowItems").innerText = slowItems;

  document.getElementById("lowStockItems").innerText = lowStockItems;

  document.getElementById("grandTotal").innerText = totalStock;

}

loadAgeingReport();

</script>

</body>
</html>
