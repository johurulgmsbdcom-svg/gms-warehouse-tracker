<!DOCTYPE html>
<html>
<head>
    <title>GMS Textiles Ltd - Needle Ageing Report</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        /* Basic styling for the page */
        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
            font-size: 24px;
        }

        h3 {
            text-align: center;
            font-size: 18px;
        }

        .dropdown {
            width: 200px;
            margin: 10px;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #999;
        }

        .btn {
            padding: 8px 12px;
            margin: 10px;
            background-color: #2563eb;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .tableWrap {
            overflow-x: auto;
        }

        #reportTable {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        #reportTable th, #reportTable td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        .lowStock {
            background-color: red;
            color: white;
        }

        .normalStock {
            background-color: green;
            color: white;
        }

        .warningStock {
            background-color: yellow;
            color: black;
        }

        .serialNo {
            font-weight: bold;
        }

        /* Responsive Design */
        @media(max-width: 768px) {
            .dropdown {
                width: 150px;
            }

            #reportTable th, #reportTable td {
                font-size: 12px;
                padding: 6px;
            }
        }
    </style>
</head>
<body>

<h2>GMS Textiles Ltd</h2>
<h3>Needle Ageing Report</h3>

<!-- Dropdown for selecting floor -->
<select id="floor" class="dropdown" onchange="loadTable();">
    <option value="Kadom R">Kadom R</option>
    <option value="Kadom N">Kadom N</option>
    <option value="Shapla R">Shapla R</option>
    <option value="Shapla N">Shapla N</option>
    <option value="Poddo R">Poddo R</option>
    <option value="Poddo N">Poddo N</option>
    <option value="Belly R">Belly R</option>
    <option value="Belly N">Belly N</option>
    <option value="Sample R">Sample R</option>
    <option value="Sample N">Sample N</option>
    <option value="EMBROIDERY R">EMBROIDERY R</option>
    <option value="EMBROIDERY N">EMBROIDERY N</option>
</select>

<!-- Button for generating report -->
<button class="btn" onclick="generateReport()">Generate Report</button>

<!-- Table to display the data -->
<div class="tableWrap">
    <table id="reportTable">
        <thead>
            <tr>
                <th>Serial No</th>
                <th>Needle Type</th>
                <th>Size</th>
                <th>Stock</th>
                <th>Ageing</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Data will be populated here -->
        </tbody>
    </table>
</div>

<script>
// Sample data for testing
const floorData = {
    "Kadom R": [
        { serialNo: 1, needleType: "DBX1", size: "7", stock: 50, lastMovement: 5 },
        { serialNo: 2, needleType: "DBX1", size: "8", stock: 10, lastMovement: 3 },
        { serialNo: 3, needleType: "DBX1-KN", size: "9", stock: 0, lastMovement: 1 },
        // Add more data...
    ],
    "Kadom N": [
        { serialNo: 1, needleType: "DBX1", size: "7", stock: 30, lastMovement: 8 },
        { serialNo: 2, needleType: "DBX1", size: "8", stock: 0, lastMovement: 0 },
        { serialNo: 3, needleType: "DBX1-KN", size: "9", stock: 15, lastMovement: 4 },
        // Add more data...
    ],
    // Other floors' data...
};

// Function to calculate the ageing of the needles
function getAgeing(lastMovement) {
    if (lastMovement <= 1) {
        return "🔴 0-7 Days";
    } else if (lastMovement <= 3) {
        return "🟡 8-15 Days";
    } else if (lastMovement <= 7) {
        return "🟢 16-30 Days";
    } else {
        return "🟢 30+ Days";
    }
}

// Function to load the table based on selected floor
function loadTable() {
    const floor = document.getElementById("floor").value;
    const items = floorData[floor];

    let tableBodyHTML = "";
    items.forEach(item => {
        const ageing = getAgeing(item.lastMovement);
        let stockClass = "";

        // Set stock color based on stock count
        if (item.stock === 0) {
            stockClass = "lowStock"; // Red color for low stock
        } else if (item.stock <= 5) {
            stockClass = "warningStock"; // Yellow for warning stock
        } else {
            stockClass = "normalStock"; // Green for normal stock
        }

        tableBodyHTML += `
            <tr>
                <td class="serialNo">${item.serialNo}</td>
                <td>${item.needleType}</td>
                <td>${item.size}</td>
                <td class="${stockClass}">${item.stock}</td>
                <td>${ageing}</td>
            </tr>
        `;
    });

    document.getElementById("tableBody").innerHTML = tableBodyHTML;
}

// Function to generate the full report (or do additional actions)
function generateReport() {
    alert("Report generated for floor: " + document.getElementById("floor").value);
}

// Load table when the page is loaded
loadTable();
</script>

</body>
</html>
