<body>

<div class="header noPrint">
  <h2>GMS Textiles Ltd.</h2>
  <h4>Tansutrapur, Kaliakair, Gazipur.</h4>
  <h4>Daily Goods Delivery Plan</h4>
  <h3>Gate Plan Report</h3>
</div>

<div class="controls noPrint">
  From: <input type="date" id="fromDate">
  To: <input type="date" id="toDate">
  Gate Plan No: <input id="gateSearch" placeholder="GP-2026-0001" style="width:150px">
  Company:
  <select id="companyFilter"><option value="">All</option><option>GMS Textiles Ltd.</option><option>GMS Composite Knitting Ind Ltd.</option><option>Other's Factory</option></select>
  MCD:
  <select id="mcdFilter"><option value="">All</option></select>
  <br>
  <button class="show" onclick="showReport()">🔍 Show Report</button>
  <button class="excel" onclick="exportExcel()">📊 Excel</button>
  <button class="print" onclick="window.print()">🖨 PDF / Print</button>
  <button class="show" onclick="location.href='gate-plan.html'">➕ New Gate Plan</button>
  <button class="home" onclick="location.href='index.html'">🏠 Home</button>
</div>

<div id="reportArea"></div>

<script>
const ALL_MCD=["ACCESSORIES MCD","GREY FABRIC MCD","BILLING SECTION","NEEDLE MCD","SHIPMENT MCD","OUTER WEAR MCD","YARN MCD","PRINTING MCD","JHUT MCD","GENERAL MCD","LEFTOVER MCD","FINISH FABRIC MCD","YARN DYEING MCD","CHEMICAL MCD"];

function today(){return new Date().toISOString().slice(0,10);}
function fmt(v){return Number(v||0).toLocaleString("en-US");}
function plans(){return JSON.parse(localStorage.getItem("gatePlans")||"[]");}
function savePlans(arr){localStorage.setItem("gatePlans",JSON.stringify(arr));}

document.getElementById("fromDate").value=today();
document.getElementById("toDate").value=today();
document.getElementById("mcdFilter").innerHTML='<option value="">All</option>'+ALL_MCD.map(x=>`<option>${x}</option>`).join("");

function planNo(p){return p.gatePlanNo || p.gatePassNo || "";}
function totalDelivery(p){return (p.rows||[]).reduce((a,r)=>a+(Number(r.deliveryQty)||0),0);}
function totalCtn(p){return (p.rows||[]).reduce((a,r)=>a+(Number(r.ctnQty)||0),0);}

function showReport(){
  let from=document.getElementById("fromDate").value;
  let to=document.getElementById("toDate").value;
  let gate=document.getElementById("gateSearch").value.trim();
  let company=document.getElementById("companyFilter").value;
  let mcd=document.getElementById("mcdFilter").value;

  let data=plans().filter(p=>{
    if(from && p.date<from) return false;
    if(to && p.date>to) return false;
    if(gate && planNo(p)!==gate) return false;
    if(company && p.toCompany!==company && p.company!==company) return false;
    if(mcd && p.mcd!==mcd) return false;
    return true;
  });

  data.sort((a,b)=>(planNo(a)).localeCompare(planNo(b)));

  let box=document.getElementById("reportArea");
  if(data.length===0){box.innerHTML='<div class="planCard noData">No Gate Plan Found</div>';return;}

  box.innerHTML=data.map((p,i)=>renderPlan(p,i)).join("");
}

function renderPlan(p,index){
  if(p.mcd==="GREY FABRIC MCD") return renderGrey(p,index);

  let rows=(p.rows||[]).map((r,i)=>`
    <tr>
      <td class="slCol">${i+1}</td>
      <td class="buyerCol">${r.buyerName||""}</td>
      <td class="srCol">${r.srGtNo||""}</td>
      <td class="styleCol">${r.styleName||""}</td>
      <td class="orderCol">${r.orderNo||""}</td>
      <td class="itemCol">${r.itemName||""}</td>
      <td class="colorCol">${r.color||""}</td>
      <td class="unitCol">${r.unit||""}</td>
      <td class="qtyCol">${r.deliveryQty||""}</td>
      <td class="ctnCol">${r.ctnQty||""}</td>
      <td class="partyCol">${r.toParty||""}</td>
      <td class="vehicleCol">${r.vehicleNo||""}</td>
      <td class="remarksCol">${r.remarks||""}</td>
    </tr>
  `).join("");

  return `
  <div class="planCard" id="plan-${index}">
    <div class="topLine">${p.company||""} To ${p.toCompany||""}</div>
    <div class="meta">
      <div>Gate Plan No: ${planNo(p)}</div>
      <div>Date: ${p.date||""}</div>
      <div>Time: ${p.time||""}</div>
      <div>MCD: ${p.mcd||""}</div>
      <div>Prepared By: ${p.preparedBy||""}</div>
    </div>
    <div class="actionBar noPrint">
      <button class="print" onclick="printSingle(${index})">🖨 Print This</button>
      <button class="edit" onclick="editPlan('${planNo(p)}')">✏ Edit</button>
      <button class="del" onclick="deletePlan('${planNo(p)}')">🗑 Delete</button>
    </div>
    <div class="tableWrap">
      <table>
        <thead><tr><th class="slCol">SL No</th><th class="buyerCol">Buyer Name</th><th class="srCol">SR/GT No</th><th class="styleCol">Style Name</th><th class="orderCol">Order No/PO No</th><th class="itemCol">Name of Item</th><th class="colorCol">Color</th><th class="unitCol">Unit</th><th class="qtyCol">Delivery Qty</th><th class="ctnCol">CTN/PKG Qty</th><th class="partyCol">To Party Name</th><th class="vehicleCol">Vehicle No</th><th class="remarksCol">Remarks</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr class="totalRow"><td colspan="8">Grand Total</td><td>${totalDelivery(p)}</td><td>${totalCtn(p)}</td><td colspan="3"></td></tr></tfoot>
      </table>
    </div>
    <div class="sign">
      <div>Prepared By<br>${p.preparedBy||""}</div><div>Security Dept.</div><div>Checked By<br>Sr. Officer ( MCD )</div><div>Asst. Manager<br>(MCD)</div><div>AGM (MCD)</div><div>Verify By<br>Merchant Dept.</div><div>Verify By<br>HR & Admin Dept.</div><div>Approved By</div>
    </div>
  </div>`;
}

function renderGrey(p,index){
  let r=(p.rows||[])[0]||{};
  let reason=r.itemName||"For Dyeing";
  let qty=totalDelivery(p);
  let company=r.toParty || p.toCompany || "";
  let remarks=r.remarks||"";

  return `
  <div class="greyReport" id="plan-${index}">
    <div class="greyHeader">
      <h2>GMS TEXTILES LTD.</h2>
      <h4>Tansutrapur, Kaliakoir, Gazipur</h4>
      <h1>Grey Fabric-MCD</h1>
      <div class="greyTitle">Daily GMS Textiles to GMS Composite Delivery Status</div>
    </div>
    <div class="actionBar noPrint">
      <button class="print" onclick="printSingle(${index})">🖨 Print This</button>
      <button class="edit" onclick="editPlan('${planNo(p)}')">✏ Edit</button>
      <button class="del" onclick="deletePlan('${planNo(p)}')">🗑 Delete</button>
    </div>
    <table class="greyTable">
      <thead><tr><th>Date</th><th>Company Name</th><th>Delivery Reason</th><th>Total Qty</th><th>Remarks</th></tr></thead>
      <tbody>
        <tr><td>${p.date||""}</td><td>${company}</td><td>${reason}</td><td>${Number(qty).toFixed(1)}</td><td>${remarks}</td></tr>
        <tr class="totalRow"><td colspan="3">Total-</td><td>${Number(qty).toFixed(1)}</td><td></td></tr>
      </tbody>
    </table>
    <div class="greySign">
      <div>Prepared By<br>${p.preparedBy||""}</div><div>Security Dept.</div><div>Checked By Officer - MCD</div><div>Asst. Manager - MCD</div><div>Knitting Manager/DGM</div><div>Dyeing Manager/DGM</div>
    </div>
  </div>`;
}

function printSingle(index){
  document.querySelectorAll(".planCard,.greyReport").forEach((el,i)=>{
    el.style.display = (i===index) ? "block" : "none";
  });
  window.print();
  setTimeout(showReport,500);
}

function deletePlan(no){
  if(!confirm("Delete this Gate Plan?")) return;
  let arr=plans().filter(p=>planNo(p)!==no);
  savePlans(arr);
  showReport();
}


function editPlan(no){
  localStorage.setItem("editGatePlanNo", no);
  location.href = "gate-plan.html?edit=" + encodeURIComponent(no);
}

function exportExcel(){
  let html=document.getElementById("reportArea").innerHTML;
  let file=new Blob([html],{type:"application/vnd.ms-excel"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(file);
  a.download="gate-plan-report.xls";
  a.click();
}

showReport();
</script>
</body>
</html>
