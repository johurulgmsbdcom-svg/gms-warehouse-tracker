<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gate Plan Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<style>
body{
  margin:0;
  background:#07111f;
  color:#fff;
  font-family:"Segoe UI Emoji","Apple Color Emoji","Segoe UI",Arial,sans-serif;
}
.header{
  text-align:center;
  padding:14px 8px;
}
.header h2,.header h3,.header h4{
  margin:3px;
}
.controls{
  text-align:center;
  padding:10px;
}
input,select{
  padding:8px;
  border-radius:7px;
  border:1px solid #999;
  font-size:15px;
}
button{
  padding:10px 15px;
  border:0;
  border-radius:8px;
  color:white;
  font-weight:900;
  margin:4px;
  cursor:pointer;
}
.search{background:#2563eb}
.excel{background:#16a34a}
.print{background:#7c3aed}
.new{background:#2563eb}
.home{background:#0f766e}
.delete{background:#dc2626}
.edit{background:#f59e0b}

#reportArea{
  width:98%;
  margin:10px auto 40px;
}
.reportCard{
  background:#fff;
  color:#000;
  margin:14px 0;
  border:1px solid #000;
  page-break-inside:avoid;
}
.reportPrintHeader{
  text-align:center;
  line-height:1.15;
  padding:7px 0 5px;
  border-bottom:1px solid #000;
}
.reportPrintHeader h2{
  margin:0;
  font-size:22px;
  font-weight:900;
}
.reportPrintHeader h4{
  margin:1px 0;
  font-size:12px;
  font-weight:800;
}
.reportPrintHeader h3{
  margin:2px 0 0;
  font-size:16px;
  font-weight:900;
}
.companyLine{
  text-align:center;
  font-weight:900;
  border-bottom:1px solid #000;
  padding:5px;
  font-size:16px;
}
.meta{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  border-bottom:1px solid #000;
}
.meta div{
  border-right:1px solid #000;
  padding:6px;
  font-weight:900;
  text-align:center;
}
.actionBar{
  text-align:center;
  padding:10px;
  border-bottom:1px solid #000;
}
.tableWrap{
  overflow-x:auto;
}
table{
  width:100%;
  min-width:1450px;
  border-collapse:collapse;
  table-layout:fixed;
  font-size:12px;
}
th,td{
  border:1px solid #000;
  padding:5px;
  text-align:center;
  vertical-align:middle;
  word-break:break-word;
}
.totalRow{
  font-weight:900;
  background:#f3f4f6;
}
.sign{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:0;
  margin-top:80px;
}
.sign div{
  text-align:center;
  font-weight:900;
  border-top:1px solid #000;
  padding:6px;
  font-size:12px;
}
.greyCard{
  background:#fff;
  color:#000;
  margin:14px 0;
  border:1px solid #000;
  padding:8px;
  page-break-inside:avoid;
}
.greyHeader{
  text-align:center;
  line-height:1.2;
}
.greyHeader h2{margin:0;font-size:24px;font-weight:900}
.greyHeader h4{margin:1px 0;font-size:12px}
.greyHeader h1{margin:2px 0;font-size:32px;font-weight:900;color:#555}
.greyTitle{font-size:18px;font-weight:900;margin:7px 0;text-align:center}
.greyTable{
  width:65%;
  margin:8px auto 0;
  border-collapse:collapse;
  table-layout:fixed;
}
.greyTable th,.greyTable td{
  border:1px solid #000;
  padding:7px;
  text-align:center;
}
.greySign{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:25px;
  margin-top:105px;
}
.greySign div{
  text-align:center;
  font-weight:900;
  border-top:1px solid #000;
  padding-top:6px;
  font-size:12px;
}
.noData{
  text-align:center;
  color:#fff;
  font-size:20px;
  font-weight:900;
  padding:30px;
}
@page{
  size:A4 landscape;
  margin:4mm;
}
@media print{
  html,body{
    background:#fff!important;
    color:#000!important;
    margin:0!important;
    padding:0!important;
  }
  .header,.controls,.actionBar,.noPrint{
    display:none!important;
  }
  #reportArea{
    width:100%!important;
    margin:0!important;
  }
  .reportCard,.greyCard{
    width:100%!important;
    margin:0!important;
    border:1px solid #000!important;
    page-break-after:always;
    page-break-inside:avoid!important;
  }
  .reportCard:last-child,.greyCard:last-child{
    page-break-after:avoid!important;
  }
  .reportPrintHeader{
    padding:1mm 0!important;
  }
  .reportPrintHeader h2{font-size:16px!important}
  .reportPrintHeader h4{font-size:8px!important}
  .reportPrintHeader h3{font-size:11px!important}
  .companyLine{font-size:10px!important;padding:2px!important}
  .meta div{font-size:8px!important;padding:2px!important}
  .tableWrap{overflow:visible!important}
  table{
    min-width:0!important;
    width:100%!important;
    font-size:7px!important;
  }
  th,td{
    padding:1px!important;
    font-size:7px!important;
    line-height:1.05!important;
  }
  .sign{
    margin-top:22mm!important;
  }
  .sign div{
    font-size:7px!important;
    padding:2px!important;
    line-height:1!important;
  }
  .greyHeader h2{font-size:18px!important}
  .greyHeader h4{font-size:9px!important}
  .greyHeader h1{font-size:26px!important}
  .greyTitle{font-size:13px!important}
  .greyTable{
    width:70%!important;
    font-size:9px!important;
  }
  .greyTable th,.greyTable td{
    font-size:9px!important;
    padding:3px!important;
  }
  .greySign{
    margin-top:34mm!important;
    gap:12px!important;
  }
  .greySign div{
    font-size:8px!important;
    padding-top:3px!important;
  }
}
</style>
</head>

<body>

<div class="header">
  <h2>GMS Textiles Ltd.</h2>
  <h4>Tansutrapur, Kaliakair, Gazipur.</h4>
  <h4>Daily Goods Delivery Plan</h4>
  <h3>Gate Plan Report</h3>
</div>

<div class="controls">
  From: <input type="date" id="fromDate">
  To: <input type="date" id="toDate">
  Gate Plan No: <input id="gateNoSearch" placeholder="GP-2026-0001" style="width:145px">
  Company:
  <select id="companyFilter">
    <option>All</option>
    <option>GMS Textiles Ltd.</option>
    <option>GMS Composite Knitting Ind Ltd.</option>
  </select>
  MCD:
  <select id="mcdFilter">
    <option>All</option>
    <option>ACCESSORIES MCD</option>
    <option>GREY FABRIC MCD</option>
    <option>BILLING SECTION</option>
    <option>NEEDLE MCD</option>
    <option>SHIPMENT MCD</option>
    <option>OUTER WEAR MCD</option>
    <option>YARN MCD</option>
    <option>PRINTING MCD</option>
    <option>JHUT MCD</option>
    <option>GENERAL MCD</option>
    <option>LEFTOVER MCD</option>
    <option>FINISH FABRIC MCD</option>
    <option>YARN DYEING MCD</option>
    <option>CHEMICAL MCD</option>
    <option>GENERAL TECHNICAL MCD</option>
  </select>
  <br>
  <button class="search" onclick="showReport()">🔍 Search</button>
  <button class="excel" onclick="exportExcel()">📊 Excel</button>
  <button class="print" onclick="window.print()">🖨 PDF / Print</button>
  <button class="new" onclick="location.href='gate-plan.html'">➕ New Gate Plan</button>
  <button class="home" onclick="location.href='index.html'">🏠 Home</button>
</div>

<div id="reportArea"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
  authDomain:"gms-warehouse-tracker-7f57e.firebaseapp.com",
  projectId:"gms-warehouse-tracker-7f57e",
  storageBucket:"gms-warehouse-tracker-7f57e.firebasestorage.app",
  messagingSenderId:"992250313291",
  appId:"1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let allPlans=[];

function today(){
  return new Date().toISOString().slice(0,10);
}

function fmt(n){
  return Number(n||0).toLocaleString("en-US");
}

function num(v){
  return Number(v)||0;
}

function esc(v){
  return String(v??"").replace(/[&<>"']/g,m=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[m]));
}

function planNo(p){
  return p.gatePlanNo || p.gatePassNo || "";
}

function makeId(no){
  return String(no).replaceAll("/","-").replaceAll(" ","-");
}

async function loadPlans(){
  let snap=await getDocs(collection(db,"gatePlans"));
  allPlans=[];
  snap.forEach(d=>{
    allPlans.push({...d.data(),_id:d.id});
  });
  allPlans.sort((a,b)=>{
    let da=(b.date||"").localeCompare(a.date||"");
    if(da!==0) return da;
    return (b.time||"").localeCompare(a.time||"");
  });
}

function normalHeader(p){
  return `
    <div class="reportPrintHeader">
      <h2>GMS Textiles Ltd.</h2>
      <h4>Tansutrapur, Kaliakair, Gazipur.</h4>
      <h4>Daily Goods Delivery Plan</h4>
      <h3>${esc(p.mcd || "ACCESSORIES MCD")}</h3>
    </div>
  `;
}

function renderNormal(p,index){
  let rows=p.rows||[];
  let deliveryTotal=0;
  let ctnTotal=0;

  rows.forEach(r=>{
    deliveryTotal+=num(r.deliveryQty);
    ctnTotal+=num(r.ctnQty);
  });

  let body=rows.map((r,i)=>`
    <tr>
      <td>${i+1}</td>
      <td>${esc(r.buyerName)}</td>
      <td>${esc(r.srGtNo)}</td>
      <td>${esc(r.styleName)}</td>
      <td>${esc(r.orderNo)}</td>
      <td>${esc(r.itemName)}</td>
      <td>${esc(r.color)}</td>
      <td>${esc(r.unit)}</td>
      <td>${esc(r.deliveryQty)}</td>
      <td>${esc(r.ctnQty)}</td>
      <td>${esc(r.toParty)}</td>
      <td>${esc(r.vehicleNo)}</td>
      <td>${esc(r.remarks)}</td>
    </tr>
  `).join("");

  return `
    <div class="reportCard">
      ${normalHeader(p)}
      <div class="companyLine">${esc(p.company || "GMS Textiles Ltd.")} To ${esc(p.toCompany || "")}</div>
      <div class="meta">
        <div>Gate Plan No: ${esc(planNo(p))}</div>
        <div>Date: ${esc(p.date)}</div>
        <div>Time: ${esc(p.time)}</div>
        <div>MCD: ${esc(p.mcd)}</div>
        <div>Prepared By: ${esc(p.preparedBy)}</div>
      </div>
      <div class="actionBar noPrint">
        <button class="print" onclick="printSingle(${index})">🖨 Print This</button>
        <button class="edit" onclick="editPlan('${esc(planNo(p))}')">✏ Edit</button>
        <button class="delete" onclick="deletePlan('${esc(planNo(p))}')">🗑 Delete</button>
      </div>
      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>SL No</th>
              <th>Buyer Name</th>
              <th>SR/GT No</th>
              <th>Style Name</th>
              <th>Order No/PO No</th>
              <th>Name of Item</th>
              <th>Color</th>
              <th>Unit</th>
              <th>Delivery Qty</th>
              <th>CTN/PKG Qty</th>
              <th>To Party Name</th>
              <th>Vehicle No</th>
              <th>Remarks</th>
            </tr>
          </thead>
          <tbody>${body}</tbody>
          <tfoot>
            <tr class="totalRow">
              <td colspan="8">Grand Total</td>
              <td>${fmt(deliveryTotal)}</td>
              <td>${fmt(ctnTotal)}</td>
              <td colspan="3"></td>
            </tr>
          </tfoot>
        </table>
      </div>
      <div class="sign">
        <div>Prepared By<br>${esc(p.preparedBy)}</div>
        <div>Security Dept.</div>
        <div>Checked By<br>Sr. Officer ( MCD )</div>
        <div>Asst. Manager<br>(MCD)</div>
        <div>AGM (MCD)</div>
        <div>Verify By<br>Merchant Dept.</div>
        <div>Verify By<br>HR & Admin Dept.</div>
        <div>Approved By</div>
      </div>
    </div>
  `;
}

function renderGrey(p,index){
  let rows=p.rows||[];
  let r=rows[0]||{};
  let qty=0;
  rows.forEach(x=>qty+=num(x.deliveryQty));

  return `
    <div class="greyCard">
      <div class="greyHeader">
        <h2>GMS TEXTILES LTD.</h2>
        <h4>Tansutrapur, Kaliakoir, Gazipur</h4>
        <h1>Grey Fabric-MCD</h1>
        <div class="greyTitle">Daily GMS Textiles to GMS Composite Delivery Status</div>
      </div>

      <div class="actionBar noPrint">
        <button class="print" onclick="printSingle(${index})">🖨 Print This</button>
        <button class="edit" onclick="editPlan('${esc(planNo(p))}')">✏ Edit</button>
        <button class="delete" onclick="deletePlan('${esc(planNo(p))}')">🗑 Delete</button>
      </div>

      <table class="greyTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Company Name</th>
            <th>Delivery Reason</th>
            <th>Total Qty</th>
            <th>Remarks</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>${esc(p.date)}</td>
            <td>${esc(r.toParty || p.toCompany || "")}</td>
            <td>${esc(r.itemName || "For Dyeing")}</td>
            <td>${fmt(qty)}</td>
            <td>${esc(r.remarks)}</td>
          </tr>
          <tr class="totalRow">
            <td colspan="3">Total-</td>
            <td>${fmt(qty)}</td>
            <td></td>
          </tr>
        </tbody>
      </table>

      <div class="greySign">
        <div>Prepared By<br>${esc(p.preparedBy)}</div>
        <div>Security Dept.</div>
        <div>Checked By Officer - MCD</div>
        <div>Asst. Manager - MCD</div>
        <div>Knitting Manager/DGM</div>
        <div>Dyeing Manager/DGM</div>
      </div>
    </div>
  `;
}

function filterPlans(){
  let from=document.getElementById("fromDate").value;
  let to=document.getElementById("toDate").value;
  let no=document.getElementById("gateNoSearch").value.trim();
  let company=document.getElementById("companyFilter").value;
  let mcd=document.getElementById("mcdFilter").value;

  return allPlans.filter(p=>{
    if(from && (p.date||"")<from) return false;
    if(to && (p.date||"")>to) return false;
    if(no && !planNo(p).toLowerCase().includes(no.toLowerCase())) return false;
    if(company!=="All" && p.company!==company) return false;
    if(mcd!=="All" && p.mcd!==mcd) return false;
    return true;
  });
}

window.showReport=async function(){
  await loadPlans();

  let list=filterPlans();
  let area=document.getElementById("reportArea");

  if(list.length===0){
    area.innerHTML=`<div class="noData">No saved Gate Plan found</div>`;
    return;
  }

  area.innerHTML=list.map((p,i)=>{
    return (p.mcd==="GREY FABRIC MCD") ? renderGrey(p,i) : renderNormal(p,i);
  }).join("");

  window.currentFilteredPlans=list;
};

window.printSingle=function(index){
  let cards=document.querySelectorAll(".reportCard,.greyCard");
  let card=cards[index];
  if(!card) return;

  let win=window.open("","_blank");
  win.document.write(`
    <html>
    <head>
      <meta charset="UTF-8">
      <title>Gate Plan Print</title>
      <style>${document.querySelector("style").innerHTML}</style>
    </head>
    <body>
      <div id="reportArea">${card.outerHTML}</div>
      <script>
        document.querySelectorAll(".noPrint,.actionBar").forEach(x=>x.remove());
        setTimeout(()=>{window.print();},300);
      <\/script>
    </body>
    </html>
  `);
  win.document.close();
};

window.editPlan=function(no){
  localStorage.setItem("editGatePlanNo",no);
  location.href="gate-plan.html?edit="+encodeURIComponent(no);
};

window.deletePlan=async function(no){
  if(!confirm("Delete this Gate Plan?")) return;
  await deleteDoc(doc(db,"gatePlans",makeId(no)));
  await showReport();
};

window.exportExcel=function(){
  let html=document.getElementById("reportArea").innerHTML;
  let file=new Blob([html],{type:"application/vnd.ms-excel"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(file);
  a.download="gate-plan-report.xls";
  a.click();
};

document.getElementById("fromDate").value=today();
document.getElementById("toDate").value=today();

showReport();
</script>

</body>
</html>
