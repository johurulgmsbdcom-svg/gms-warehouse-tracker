<body>

<div class="header">
  <h2>GMS Textiles Ltd.</h2>
  <h4>Tansutrapur, Kaliakair, Gazipur.</h4>
  <h4>Daily Goods Delivery Plan</h4>
  <h3>Gate Plan Report</h3>
</div>

<div class="controls">
  From: <input type="date" id="fromDate">
  To: <input type="date" id="toDate">
  Gate Plan No: <input id="gateNoSearch" placeholder="GP-2026-0001" style="width:145px">
  Company:
  <select id="companyFilter">
    <option>All</option>
    <option>GMS Textiles Ltd.</option>
    <option>GMS Composite Knitting Ind Ltd.</option>
  </select>
  MCD:
  <select id="mcdFilter">
    <option>All</option>
    <option>ACCESSORIES MCD</option>
    <option>GREY FABRIC MCD</option>
    <option>BILLING SECTION</option>
    <option>NEEDLE MCD</option>
    <option>SHIPMENT MCD</option>
    <option>OUTER WEAR MCD</option>
    <option>YARN MCD</option>
    <option>PRINTING MCD</option>
    <option>JHUT MCD</option>
    <option>GENERAL MCD</option>
    <option>LEFTOVER MCD</option>
    <option>FINISH FABRIC MCD</option>
    <option>YARN DYEING MCD</option>
    <option>CHEMICAL MCD</option>
    <option>GENERAL TECHNICAL MCD</option>
  </select>
  <br>
  <button class="search" onclick="showReport()">🔍 Search</button>
  <button class="clear" onclick="clearFilters()">♻ Clear Filter</button>
  <button class="excel" onclick="exportExcel()">📊 Excel</button>
  <button class="print" onclick="window.print()">🖨 PDF / Print</button>
  <button class="new" onclick="location.href='gate-plan.html'">➕ New Gate Plan</button>
  <button class="home" onclick="location.href='index.html'">🏠 Home</button>
</div>

<div id="loadStatus">Loading saved Gate Plans...</div>
<div id="reportArea"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
  authDomain:"gms-warehouse-tracker-7f57e.firebaseapp.com",
  projectId:"gms-warehouse-tracker-7f57e",
  storageBucket:"gms-warehouse-tracker-7f57e.firebasestorage.app",
  messagingSenderId:"992250313291",
  appId:"1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let allPlans=[];
let currentFilteredPlans=[];

function today(){return new Date().toISOString().slice(0,10)}
function fmt(n){return Number(n||0).toLocaleString("en-US")}
function num(v){return Number(v)||0}
function esc(v){
  return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));
}
function planNo(p){return p.gatePlanNo || p.gatePassNo || p.no || ""}
function makeId(no){return String(no).replaceAll("/","-").replaceAll(" ","-")}

function reportLink(no){
  let base=location.origin + location.pathname;
  return base + "?gatePlanNo=" + encodeURIComponent(no || "");
}

function renderQRCodes(){
  document.querySelectorAll("[data-qr-no]").forEach(el=>{
    let no=el.getAttribute("data-qr-no")||"";
    el.innerHTML="";
    new QRCode(el,{text:reportLink(no),width:65,height:65,correctLevel:QRCode.CorrectLevel.M});
  });
}

async function loadPlans(){
  let map={};

  try{
    let snap=await getDocs(collection(db,"gatePlans"));
    snap.forEach(d=>{
      let p={...d.data(),_id:d.id,_source:"Firebase"};
      let no=planNo(p)||d.id;
      map[no]=p;
    });
  }catch(e){
    console.log("Firebase load error",e);
  }

  // fallback localStorage old data, jodi kono old page local save kore thake
  try{
    let local=JSON.parse(localStorage.getItem("gatePlans")||"[]");
    local.forEach(p=>{
      let no=planNo(p);
      if(no && !map[no]) map[no]={...p,_source:"Local"};
    });
  }catch(e){}

  allPlans=Object.values(map);

  allPlans.sort((a,b)=>{
    let da=(b.date||"").localeCompare(a.date||"");
    if(da!==0)return da;
    let ta=(b.time||"").localeCompare(a.time||"");
    if(ta!==0)return ta;
    return planNo(b).localeCompare(planNo(a));
  });

  document.getElementById("loadStatus").innerText="Loaded: "+allPlans.length+" Gate Plan";
}

function normalHeader(p){
  return `
    <div class="reportPrintHeader">
      <h2>GMS Textiles Ltd.</h2>
      <h4>Tansutrapur, Kaliakair, Gazipur.</h4>
      <h4>Daily Goods Delivery Plan</h4>
      <h3>${esc(p.mcd || "ACCESSORIES MCD")}</h3>
    </div>
  `;
}

function renderNormal(p,index){
  let rows=p.rows||[];
  let deliveryTotal=0;
  let ctnTotal=0;

  rows.forEach(r=>{
    deliveryTotal+=num(r.deliveryQty);
    ctnTotal+=num(r.ctnQty);
  });

  let body=rows.map((r,i)=>`
    <tr>
      <td>${i+1}</td>
      <td>${esc(r.buyerName)}</td>
      <td>${esc(r.srGtNo)}</td>
      <td>${esc(r.styleName)}</td>
      <td>${esc(r.orderNo)}</td>
      <td>${esc(r.itemName)}</td>
      <td>${esc(r.color)}</td>
      <td>${esc(r.unit)}</td>
      <td>${esc(r.deliveryQty)}</td>
      <td>${esc(r.ctnQty)}</td>
      <td>${esc(r.toParty)}</td>
      <td>${esc(r.vehicleNo)}</td>
      <td>${esc(r.remarks)}</td>
    </tr>
  `).join("");

  return `
    <div class="reportCard" data-plan-no="${esc(planNo(p))}">
      ${normalHeader(p)}
      <div class="reportQrCenter">
        <div class="qrMini" data-qr-no="${esc(planNo(p))}"></div>
        <div class="qrText">Scan QR: ${esc(planNo(p))}</div>
      </div>
      <div class="companyLine">${esc(p.company || "GMS Textiles Ltd.")} To ${esc(p.toCompany || "")}</div>
      <div class="meta">
        <div>Gate Plan No: ${esc(planNo(p))}</div>
        <div>Date: ${esc(p.date)}</div>
        <div>Time: ${esc(p.time)}</div>
        <div>MCD: ${esc(p.mcd)}</div>
        <div>Prepared By: ${esc(p.preparedBy)}</div>
      </div>
      <div class="actionBar noPrint">
        <button class="print" onclick="printSingle(${index})">🖨 Print This</button>
        <button class="edit" onclick="editPlan('${esc(planNo(p))}')">✏ Edit</button>
        <button class="delete" onclick="deletePlan('${esc(planNo(p))}')">🗑 Delete</button>
      </div>
      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>SL No</th><th>Buyer Name</th><th>SR/GT No</th><th>Style Name</th>
              <th>Order No/PO No</th><th>Name of Item</th><th>Color</th><th>Unit</th>
              <th>Delivery Qty</th><th>CTN/PKG Qty</th><th>To Party Name</th>
              <th>Vehicle No</th><th>Remarks</th>
            </tr>
          </thead>
          <tbody>${body}</tbody>
          <tfoot>

function filterPlans(){
  let from=document.getElementById("fromDate").value;
  let to=document.getElementById("toDate").value;
  let no=document.getElementById("gateNoSearch").value.trim();
  let company=document.getElementById("companyFilter").value;
  let mcd=document.getElementById("mcdFilter").value;

  return allPlans.filter(p=>{
    let pn=planNo(p);
    if(from && (p.date||"")<from)return false;
    if(to && (p.date||"")>to)return false;
    if(no && pn.toLowerCase()!==no.toLowerCase())return false;
    if(company!=="All" && p.company!==company)return false;
    if(mcd!=="All" && p.mcd!==mcd)return false;
    return true;
  });
}

window.showReport=async function(){
  await loadPlans();

  let list=filterPlans();
  let area=document.getElementById("reportArea");

  if(list.length===0){
    area.innerHTML=`<div class="noData">No saved Gate Plan found<br><small>Filter clear kore Search korun</small></div>`;
    return;
  }

  currentFilteredPlans=list;
  area.innerHTML=list.map((p,i)=>(p.mcd==="GREY FABRIC MCD") ? renderGrey(p,i) : renderNormal(p,i)).join("");
  setTimeout(renderQRCodes,100);
};

window.editPlan=function(no){
  localStorage.setItem("editGatePlanNo",no);
  location.href="gate-plan.html?edit="+encodeURIComponent(no);
};

window.deletePlan=async function(no){
  if(!confirm("Delete this Gate Plan?"))return;
  try{
    await deleteDoc(doc(db,"gatePlans",makeId(no)));
  }catch(e){console.log(e)}
  try{
    let local=JSON.parse(localStorage.getItem("gatePlans")||"[]");
    local=local.filter(p=>planNo(p)!==no);
    localStorage.setItem("gatePlans",JSON.stringify(local));
  }catch(e){}
  await showReport();
};

  let a=document.createElement("a");
  a.href=URL.createObjectURL(file);
  a.download="gate-plan-report.xls";
  a.click();
};
