<!DOCTYPE html>
<html>
<head>
<title>Needle Monthly Report</title>
<style>
body{margin:0;background:#0f172a;color:white;font-family:Arial}
.box{padding:18px}
h2,h3{text-align:center;margin:4px}
.top{text-align:center;margin:15px}
select,input,button{padding:9px;margin:4px;border-radius:6px;border:0}
button{background:#2563eb;color:white;font-weight:bold;cursor:pointer}
.excelBtn{background:#16a34a}
.pdfBtn{background:#7c3aed}
.homeBtn{background:#2563eb}
.reportPage{background:white;color:black;width:210mm;min-height:297mm;margin:15px auto;padding:10mm;box-sizing:border-box}
table{width:100%;border-collapse:collapse;color:black;text-align:center;font-size:11px;margin-top:10px}
th,td{border:1px solid #000;padding:4px}
th{background:#e5e7eb}
.total{background:#92d050;font-weight:bold}
.sectionTitle{background:#1e293b;color:white;font-weight:bold;font-size:14px}
.grand{background:#ffff00;font-weight:bold;font-size:15px}

@page{size:A4 portrait;margin:8mm}

@media print{
  body{background:white;color:black}
  .top,button{display:none!important}
  .box{padding:0}
  .reportPage{width:auto;min-height:auto;margin:0;padding:0;box-shadow:none}
  table{font-size:10px}
  h2,h3{color:black}
}
</style>
</head>

<body>
<div class="box">

<h2>GMS TEXTILES LTD</h2>
<h3>Needle Range Report</h3>

<div class="top">
Floor:
<select id="floorSelect">
  <option value="ALL">ALL FLOOR</option>
  <option>Kadom R</option>
  <option>Kadom N</option>
  <option>Shapla R</option>
  <option>Shapla N</option>
  <option>Poddo R</option>
  <option>Poddo N</option>
  <option>Belly R</option>
  <option>Belly N</option>
  <option>Sample R</option>
  <option>Sample N</option>
  <option>EMBROIDERY R</option>
  <option>EMBROIDERY N</option>
</select>

From:
<input type="date" id="fromDate">

To:
<input type="date" id="toDate">

<button onclick="loadReport()">Show Report</button>
<button class="excelBtn" onclick="exportExcel()">Export Excel</button>
<button class="pdfBtn" onclick="window.print()">PDF / Print</button>
<button class="homeBtn" onclick="location.href='index.html'">Back Home</button>
</div>

<div id="reportArea"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
  authDomain: "gms-warehouse-tracker-7f57e.firebaseapp.com",
  projectId: "gms-warehouse-tracker-7f57e",
  storageBucket: "gms-warehouse-tracker-7f57e.firebasestorage.app",
  messagingSenderId: "992250313291",
  appId: "1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const FLOORS = [
  "Kadom R","Kadom N",
  "Shapla R","Shapla N",
  "Poddo R","Poddo N",
  "Belly R","Belly N",
  "Sample R","Sample N",
  "EMBROIDERY R","EMBROIDERY N"
];

async function loadReport(){
  let selectedFloor=document.getElementById("floorSelect").value;
  let from=document.getElementById("fromDate").value;
  let to=document.getElementById("toDate").value;

  if(!from || !to){
    alert("From date and To date select koro");
    return;
  }

  let snap=await getDocs(collection(db,"dailyPosting"));

  let floors = selectedFloor==="ALL" ? FLOORS : [selectedFloor];

  let floorMap={};
  floors.forEach(f=>floorMap[f]={});

  snap.forEach(docSnap=>{
    let data=docSnap.data();

    if(!data.date || !data.floor || !data.rows) return;
    if(!floors.includes(data.floor)) return;
    if(data.date < from || data.date > to) return;

    data.rows.forEach(row=>{
      let key=(row.needleType||"")+"___"+(row.size||"");

      if(!floorMap[data.floor][key]){
        floorMap[data.floor][key]={
          sl:row.sl || "",
          needleType:row.needleType || "",
          size:row.size || "",
          firstDate:data.date,
          previous:Number(row.previous)||0,
          receive:0,
          delivery:0
        };
      }

      if(data.date < floorMap[data.floor][key].firstDate){
        floorMap[data.floor][key].firstDate=data.date;
        floorMap[data.floor][key].previous=Number(row.previous)||0;
      }

      floorMap[data.floor][key].receive += Number(row.receive)||0;
      floorMap[data.floor][key].delivery += Number(row.delivery)||0;
    });
  });

  let grandPrevious=0;
  let grandReceive=0;
  let grandDelivery=0;
  let grandPresent=0;

  let html=`
  <div class="reportPage">
    <h2>GMS TEXTILES LTD</h2>
    <h3>Tansutrapur, Kaliakair, Gazipur.</h3>
    <h3>Needle Report</h3>
    <h3>${from} to ${to}</h3>
  `;

  floors.forEach(floor=>{
    let rows=Object.values(floorMap[floor]).sort((a,b)=>Number(a.sl)-Number(b.sl));

    let floorPrevious=0;
    let floorReceive=0;
    let floorDelivery=0;
    let floorPresent=0;

    html+=`
    <table>
      <tr class="sectionTitle">
        <td colspan="7">${floor}</td>
      </tr>
      <tr>
        <th>SL</th>
        <th>Needle Type</th>
        <th>Size</th>
        <th>Previous</th>
        <th>Total Receive</th>
        <th>Total Delivery</th>
        <th>Present Stock</th>
      </tr>
    `;

    if(rows.length===0){
      html+=`<tr><td colspan="7">No Data</td></tr>`;
    }else{
      rows.forEach(r=>{
        let present = r.previous + r.receive - r.delivery;

        floorPrevious += r.previous;
        floorReceive += r.receive;
        floorDelivery += r.delivery;
        floorPresent += present;

        html+=`
        <tr>
          <td>${r.sl}</td>
          <td>${r.needleType}</td>
          <td>${r.size}</td>
          <td>${r.previous}</td>
          <td>${r.receive}</td>
          <td>${r.delivery}</td>
          <td>${present}</td>
        </tr>`;
      });
    }

    grandPrevious += floorPrevious;
    grandReceive += floorReceive;
    grandDelivery += floorDelivery;
    grandPresent += floorPresent;

    html+=`
      <tr class="total">
        <td colspan="3">${floor} TOTAL</td>
        <td>${floorPrevious}</td>
        <td>${floorReceive}</td>
        <td>${floorDelivery}</td>
        <td>${floorPresent}</td>
      </tr>
    </table>`;
  });

  html+=`
    <table>
      <tr class="grand">
        <td>ALL TOTAL</td>
        <td>Previous: ${grandPrevious}</td>
        <td>Receive: ${grandReceive}</td>
        <td>Delivery: ${grandDelivery}</td>
        <td>Present: ${grandPresent}</td>
      </tr>
    </table>
  </div>`;

  document.getElementById("reportArea").innerHTML=html;
}

function exportExcel(){
  let html=document.getElementById("reportArea").innerHTML;

  let file=new Blob([html],{
    type:"application/vnd.ms-excel"
  });

  let a=document.createElement("a");
  a.href=URL.createObjectURL(file);
  a.download="needle-range-report.xls";
  a.click();
}

window.loadReport=loadReport;
window.exportExcel=exportExcel;
</script>

</body>
</html>
