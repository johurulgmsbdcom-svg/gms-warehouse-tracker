function getItems(){
  let floorName=document.getElementById("floor").value;
  return floorData[floorName] || [];
}

function setCurrentMonth(){
  let now=new Date();
  let m=String(now.getMonth()+1).padStart(2,"0");
  document.getElementById("reportMonth").value=now.getFullYear()+"-"+m;
}

async function loadMonthlyReport(){
  let month=document.getElementById("reportMonth").value;
  let floorName=document.getElementById("floor").value;
  let items=getItems();

  if(!month){
    alert("Month select koro");
    return;
  }

  let monthlyReceive=Array(items.length).fill(0);
  let monthlyDelivery=Array(items.length).fill(0);

  let snap=await getDocs(collection(db,"dailyPosting"));

  snap.forEach(docSnap=>{
    let data=docSnap.data();

    if(data.floor===floorName && data.month===month && data.rows){
      data.rows.forEach((row,i)=>{
        monthlyReceive[i]+=Number(row.receive)||0;
        monthlyDelivery[i]+=Number(row.delivery)||0;
      });
    }
  });

  let html="";
  let totalPrevious=0;
  let totalReceive=0;
  let totalDelivery=0;
  let totalPresent=0;

  items.forEach((item,i)=>{
    let previous=Number(item[3])||0;
    let receive=Number(monthlyReceive[i])||0;
    let delivery=Number(monthlyDelivery[i])||0;
    let present=previous+receive-delivery;

    totalPrevious+=previous;
    totalReceive+=receive;
    totalDelivery+=delivery;
    totalPresent+=present;

    html+=`
    <tr>
      <td>${item[0]}</td>
      <td>${item[1]}</td>
      <td>${item[2]}</td>
      <td>${previous}</td>
      <td>${receive}</td>
      <td>${delivery}</td>
      <td>${present}</td>
    </tr>`;
  });

  document.getElementById("tableBody").innerHTML=html;

  document.getElementById("totalPrevious").innerText=totalPrevious;
  document.getElementById("totalReceive").innerText=totalReceive;
  document.getElementById("totalDelivery").innerText=totalDelivery;
  document.getElementById("totalPresent").innerText=totalPresent;

  document.getElementById("monthOpening").innerText=totalPrevious;
  document.getElementById("monthReceive").innerText=totalReceive;
  document.getElementById("monthDelivery").innerText=totalDelivery;
  document.getElementById("monthPresent").innerText=totalPresent;
}

function exportExcel(){
  let month=document.getElementById("reportMonth").value;
  let floorName=document.getElementById("floor").value;

  let title=`
    <h2>GMS TEXTILES LTD</h2>
    <h3>Needle Monthly Report</h3>
    <h3>Floor: ${floorName}</h3>
    <h3>Month: ${month}</h3>
  `;

  let table1=document.getElementById("reportTable").outerHTML;
  let table2=document.getElementById("summaryTable").outerHTML;

  let file=new Blob([title+table1+"<br>"+table2],{type:"application/vnd.ms-excel"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(file);
  a.download="needle-monthly-report.xls";
  a.click();
}

function exportPDF(){
  window.print();
}

document.getElementById("floor").addEventListener("change",loadMonthlyReport);
document.getElementById("reportMonth").addEventListener("change",loadMonthlyReport);

window.loadMonthlyReport=loadMonthlyReport;
window.exportExcel=exportExcel;
window.exportPDF=exportPDF;

setCurrentMonth();
loadMonthlyReport();
</script>
