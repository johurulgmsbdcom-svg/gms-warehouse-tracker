<script>
monthlyChart=new Chart(document.getElementById("monthlyChart"),{
  type:"doughnut",

  data:{
    labels:["Receive","Delivery"],

    datasets:[{
      data:[receiveTotal,deliveryTotal],

      backgroundColor:[
        "#22c55e",
        "#ef4444"
      ],

      borderColor:[
        "#22c55e",
        "#ef4444"
      ],

      borderWidth:2,

      hoverOffset:15
    }]
  },

  options:{
    responsive:true,

    maintainAspectRatio:false,

    cutout:"65%",

    plugins:{
      legend:{
        position:"bottom",

        labels:{
          color:chartTextColor(),

          font:{
            family:"Segoe UI",
            size:13,
            weight:"bold"
          },

          boxWidth:14
        }
      },

      tooltip:{
        backgroundColor:"rgba(15,23,42,.95)",

        titleColor:"#fff",

        bodyColor:"#fff",

        borderColor:"#ffffff30",

        borderWidth:1
      }
    }
  },

  plugins:[{

    id:"doughnutText",

    afterDraw(chart){

      const {ctx}=chart;

      const meta=chart.getDatasetMeta(0);

      meta.data.forEach((arc,index)=>{

        const value=chart.data.datasets[0].data[index];

        const label=chart.data.labels[index];

        const angle=(arc.startAngle+arc.endAngle)/2;

        const x=arc.x + Math.cos(angle)*(arc.outerRadius+45);

        const y=arc.y + Math.sin(angle)*(arc.outerRadius+45);

        ctx.save();

        ctx.fillStyle=chartTextColor();

        ctx.textAlign="center";

        ctx.font="900 14px Segoe UI";

        ctx.fillText(label,x,y-10);

        ctx.font="bold 13px Segoe UI";

        ctx.fillText(
          Number(value).toLocaleString(),
          x,
          y+10
        );

        ctx.restore();
      });

      const total=
        Number(receiveTotal)+
        Number(deliveryTotal);

      ctx.save();

      ctx.fillStyle=chartTextColor();

      ctx.textAlign="center";

      ctx.font="900 24px Segoe UI";

      ctx.fillText(
        total.toLocaleString(),
        chart.width/2,
        chart.height/2
      );

      ctx.font="900 12px Segoe UI";

      ctx.fillText(
        "TOTAL",
        chart.width/2,
        chart.height/2+22
      );

      ctx.restore();
    }

  }]
});
</script>
