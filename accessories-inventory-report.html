<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Report</title>
  <script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js"></script>
  <style>
    /* Add your CSS styles here */
  </style>
</head>
<body>
  <div>
    <h2>Inventory Report</h2>

    <!-- Date Filter -->
    <label for="fromDate">From:</label>
    <input type="date" id="fromDate">
    <label for="toDate">To:</label>
    <input type="date" id="toDate">
    <button onclick="loadReport()">Show Report</button>

    <table>
      <thead>
        <tr>
          <th>Posting Date</th>
          <th>Challan No</th>
          <th>Buyer Name</th>
          <th>Item Name</th>
          <th>Quantity</th>
          <th>Received</th>
          <th>Due</th>
        </tr>
      </thead>
      <tbody id="reportBody"></tbody>
    </table>
  </div>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
      authDomain: "gms-warehouse-tracker-7f57e.firebaseapp.com",
      projectId: "gms-warehouse-tracker-7f57e",
      storageBucket: "gms-warehouse-tracker-7f57e.firebasestorage.app",
      messagingSenderId: "992250313291",
      appId: "1:992250313291:web:ee3bceae76d4d53bc26bce"
    };

    // Initialize Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Function to save data to Firebase
    async function saveToFirebase(inventoryData) {
      try {
        const docRef = await db.collection("accessoriesInventory").add(inventoryData);
        console.log("Document written with ID: ", docRef.id);
      } catch (e) {
        console.error("Error adding document: ", e);
      }
    }

    // Example inventory data
    const inventoryData = {
      postingDate: '2026-05-11',
      challanNo: '14214',
      buyerName: 'Kariban',
      itemName: 'Elastic',
      unit: 'Yds',
      challanQty: 2020,
      receiveQty: 2020,
      dueQty: 0,
      short: 0,
      excess: 0,
      reportedBy: 'Md. Ariful Islam'
    };

    // Save example data
    saveToFirebase(inventoryData);

    // Function to load and display the report based on date filter
    async function loadReport() {
      const fromDate = document.getElementById("fromDate").value;
      const toDate = document.getElementById("toDate").value;

      const querySnapshot = await db.collection("accessoriesInventory").get();
      let reportRows = [];
      
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        if (data.postingDate >= fromDate && data.postingDate <= toDate) {
          reportRows.push({
            postingDate: data.postingDate,
            challanNo: data.challanNo,
            buyerName: data.buyerName,
            itemName: data.itemName,
            challanQty: data.challanQty,
            receiveQty: data.receiveQty,
            dueQty: data.dueQty
          });
        }
      });

      renderReport(reportRows);
    }

    // Function to render the report data in the table
    function renderReport(rows) {
      const tbody = document.getElementById("reportBody");
      tbody.innerHTML = "";
      
      if (rows.length === 0) {
        tbody.innerHTML = "<tr><td colspan='7'>No data found</td></tr>";
        return;
      }

      rows.forEach((row) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row.postingDate}</td>
          <td>${row.challanNo}</td>
          <td>${row.buyerName}</td>
          <td>${row.itemName}</td>
          <td>${row.challanQty}</td>
          <td>${row.receiveQty}</td>
          <td>${row.dueQty}</td>
        `;
        tbody.appendChild(tr);
      });
    }
  </script>
</body>
</html>
