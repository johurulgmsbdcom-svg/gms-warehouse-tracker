<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Challan & Gate Pass Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#07111f;color:#fff;font-family:Arial,sans-serif}
.wrap{max-width:1400px;margin:auto;padding:14px}
.header{text-align:center;margin-bottom:16px}
.controls{text-align:center;margin:12px 0}
input,select,button{padding:10px;margin:4px;border-radius:8px;border:1px solid #94a3b8;font-size:14px}
button{background:#2563eb;color:#fff;border:0;cursor:pointer;font-weight:900}
.green{background:#16a34a!important}.orange{background:#f59e0b!important}.red{background:#dc2626!important}
.tableWrap{overflow-x:auto;background:#fff;border-radius:10px}
table{width:100%;border-collapse:collapse;color:#000;font-size:12px}
th,td{border:1px solid #000;padding:6px;text-align:center}
th{background:#e5e7eb;font-weight:900}
.totalRow{background:#f3f4f6;font-weight:900}
.badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:700}
.badge-online{background:#22c55e;color:#fff}
.badge-offline{background:#f59e0b;color:#000}
.toast{position:fixed;right:18px;top:18px;background:#16a34a;color:#fff;padding:14px 22px;border-radius:12px;font-weight:900;display:none;z-index:9999}
@media print{.controls,.noPrint{display:none!important}body{background:#fff}}
@media(max-width:900px){.controls{display:flex;flex-direction:column}}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div class="wrap">
  <div class="header">
    <h1>Delivery Challan & Gate Pass Report</h1>
    <div style="color:#facc15;margin-top:8px">📡 Firebase + 📦 Offline Data</div>
  </div>

  <div class="controls noPrint">
    <input type="date" id="filterDate" onchange="loadReport()">
    <select id="filterMcd" onchange="loadReport()">
      <option value="">All MCD</option>
      <option>ACCESSORIES MCD</option>
      <option>GREY FABRIC MCD</option>
      <option>SHIPMENT MCD</option>
      <option>BILLING SECTION</option>
      <option>NEEDLE MCD</option>
      <option>OUTER WEAR MCD</option>
      <option>YARN MCD</option>
      <option>PRINTING MCD</option>
      <option>JHUT MCD</option>
      <option>GENERAL MCD</option>
      <option>LEFTOVER MCD</option>
      <option>FINISH FABRIC MCD</option>
      <option>YARN DYEING MCD</option>
      <option>CHEMICAL MCD</option>
      <option>GENERAL TECHNICAL MCD</option>
    </select>
    <input type="text" id="searchBox" placeholder="Search Challan No..." oninput="loadReport()">
    <br>
    <button class="green" onclick="loadReport()">🔄 Refresh</button>
    <button class="orange" onclick="syncAllOfflineData()">📤 Sync All Offline Data</button>
    <button onclick="window.print()">🖨 Print</button>
    <button onclick="location.href='challan-entry.html'">➕ New Entry</button>
    <button onclick="location.href='index.html'">🏠 Home</button>
  </div>

  <div class="tableWrap">
    <table>
      <thead>
        <tr>
          <th>SL</th>
          <th>Challan No</th>
          <th>Gate Pass No</th>
          <th>Date</th>
          <th>MCD</th>
          <th>Company</th>
          <th>To Company</th>
          <th>Buyer</th>
          <th>Total Qty</th>
          <th>Total Pkgs</th>
          <th>Status</th>
          <th class="noPrint">Action</th>
        </tr>
      </thead>
      <tbody id="reportBody"></tbody>
      <tfoot>
        <tr class="totalRow">
          <td colspan="8">Grand Total</td>
          <td id="totalQty">0</td>
          <td id="totalPkg">0</td>
          <td colspan="2"></td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
  authDomain:"gms-warehouse-tracker-7f57e.firebaseapp.com",
  projectId:"gms-warehouse-tracker-7f57e",
  storageBucket:"gms-warehouse-tracker-7f57e.firebasestorage.app",
  messagingSenderId:"992250313291",
  appId:"1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let allChallans=[];

function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2500);
}

// 🔥 Load from BOTH Firebase AND Offline Queue
async function loadReport(){
  const filterDate=document.getElementById("filterDate").value;
  const filterMcd=document.getElementById("filterMcd").value;
  const searchText=document.getElementById("searchBox").value.toLowerCase();
  
  allChallans=[];
  
  // 1️⃣ Load from Firebase
  try{
    const snap=await getDocs(collection(db,"challanGatePass"));
    snap.forEach(d=>{
      let c=d.data();
      c._id=d.id;
      c._source="firebase";
      allChallans.push(c);
    });
    console.log("✅ Firebase data loaded:",allChallans.length);
  }catch(e){
    console.log("⚠️ Firebase load error:",e);
  }
  
  // 2️⃣ Load from ALL Offline Queues (all devices)
  for(let i=0;i<localStorage.length;i++){
    const key=localStorage.key(i);
    if(key && key.startsWith("GMS_CHALLAN_OFFLINE_")){
      try{
        const queue=JSON.parse(localStorage.getItem(key)||"[]");
        const offlineChallans=queue.filter(x=>x.collection==="challanGatePass" || !x.collection);
        
        offlineChallans.forEach(item=>{
          let c=item.data;
          c._id=item.id;
          c._source="offline";
          c._status=item.status||"pending";
          c._deviceId=key.replace("GMS_CHALLAN_OFFLINE_","");
          allChallans.push(c);
        });
        console.log(`✅ Loaded ${offlineChallans.length} from ${key}`);
      }catch(e){
        console.log("Error loading offline queue:",key,e);
      }
    }
  }
  
  // 3️⃣ Apply filters
  let filtered=allChallans.filter(c=>{
    if(filterDate && c.date!==filterDate) return false;
    if(filterMcd && c.mcd!==filterMcd) return false;
    if(searchText && !c.challanNo.toLowerCase().includes(searchText)) return false;
    return true;
  });
  
  // 4️⃣ Sort by date (newest first)
  filtered.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  
  // 5️⃣ Display
  displayReport(filtered);
}

function displayReport(data){
  const tbody=document.getElementById("reportBody");
  let html="";
  let totalQty=0,totalPkg=0;
  
  if(data.length===0){
    tbody.innerHTML="<tr><td colspan='12' style='padding:40px;text-align:center;color:#64748b;font-size:16px'>📭 No challan found<br><small>Try: Save data → Click Report, or Click 'Sync All Offline Data'</small></td></tr>";
    document.getElementById("totalQty").innerText="0";
    document.getElementById("totalPkg").innerText="0";
    return;
  }
  
  data.forEach((c,i)=>{
    const qty=Number(c.grandTotalQty)||0;
    const pkg=Number(c.totalPkg)||0;
    totalQty+=qty;
    totalPkg+=pkg;
    
    const statusBadge=c._source==="offline" 
      ? `<span class="badge badge-offline">📦 Offline (${c._status||"pending"})</span>`
      : `<span class="badge badge-online">📡 Synced</span>`;
    
    html+=`<tr>
      <td>${i+1}</td>
      <td><b>${c.challanNo||""}</b></td>
      <td>${c.gatePassNo||""}</td>
      <td>${c.date||""}</td>
      <td>${c.mcd||""}</td>
      <td>${c.company||""}</td>
      <td>${c.toCompany||""}</td>
      <td>${c.buyer||""}</td>
      <td style="text-align:right">${qty.toLocaleString()}</td>
      <td style="text-align:right">${pkg.toLocaleString()}</td>
      <td>${statusBadge}</td>
      <td class="noPrint">
        <button class="orange" onclick="viewChallan('${c.challanNo}')" style="padding:4px 8px;font-size:11px">👁 View</button>
        ${c._source==="offline" && c._status==="pending" ? `<button class="green" onclick="syncSingle('${c._id}')" style="padding:4px 8px;font-size:11px;margin-left:4px">📤 Sync</button>` : ""}
      </td>
    </tr>`;
  });
  
  tbody.innerHTML=html;
  document.getElementById("totalQty").innerText=totalQty.toLocaleString();
  document.getElementById("totalPkg").innerText=totalPkg.toLocaleString();
  
  toast(`Loaded ${data.length} challan(s)`);
}

// 🔥 Sync ALL offline data to Firebase
window.syncAllOfflineData=async function(){
  let totalSynced=0;
  let totalFailed=0;
  
  // Find all offline queues
  for(let i=0;i<localStorage.length;i++){
    const key=localStorage.key(i);
    if(key && key.startsWith("GMS_CHALLAN_OFFLINE_")){
      try{
        const queue=JSON.parse(localStorage.getItem(key)||"[]");
        const pending=queue.filter(x=>x.status==="pending");
        
        console.log(`🔄 Syncing ${pending.length} from ${key}...`);
        
        for(let item of pending){
          try{
            await setDoc(doc(db,"challanGatePass",item.id),item.data,{merge:true});
            item.status="synced";
            item.syncedAt=new Date().toISOString();
            totalSynced++;
          }catch(e){
            console.log("Failed:",item.id,e);
            totalFailed++;
          }
        }
        
        localStorage.setItem(key,JSON.stringify(queue));
      }catch(e){
        console.log("Error processing queue:",key,e);
      }
    }
  }
  
  if(totalSynced>0 || totalFailed>0){
    toast(`✅ Synced: ${totalSynced} | Failed: ${totalFailed}`);
    loadReport();
  }else{
    toast("✅ No offline data to sync");
  }
};

// View single challan
window.viewChallan=function(no){
  location.href="challan-entry.html?challanNo="+encodeURIComponent(no);
};

// Sync single challan
window.syncSingle=async function(id){
  try{
    // Find in offline queues
    for(let i=0;i<localStorage.length;i++){
      const key=localStorage.key(i);
      if(key && key.startsWith("GMS_CHALLAN_OFFLINE_")){
        const queue=JSON.parse(localStorage.getItem(key)||"[]");
        const item=queue.find(x=>x.id===id);
        
        if(item){
          await setDoc(doc(db,"challanGatePass",id),item.data,{merge:true});
          item.status="synced";
          item.syncedAt=new Date().toISOString();
          localStorage.setItem(key,JSON.stringify(queue));
          toast("✅ Synced to Firebase");
          loadReport();
          return;
        }
      }
    }
    toast("❌ Not found in offline queue");
  }catch(e){
    toast("❌ Sync failed: "+e.message);
  }
};

// Initial load
loadReport();
</script>
</body>
</html>
