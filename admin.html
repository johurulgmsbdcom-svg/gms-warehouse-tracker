<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manpower - GMS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
  --bg:#0a1628;--card:#1e293b;--text:#f1f5f9;--muted:#cbd5e1;
  --border:#475569;--blue:#3b82f6;--green:#10b981;--red:#ef4444;
}
body.light{
  --bg:#f8fafc;--card:#ffffff;--text:#1e293b;--muted:#64748b;--border:#cbd5e1;
}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;}
.header{
  background:var(--card);padding:15px 20px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.logo{font-size:20px;font-weight:700}
.btn{
  background:var(--blue);color:#fff;border:none;padding:8px 16px;
  border-radius:8px;cursor:pointer;font-weight:600;margin-left:10px;
}
.btn.red{background:var(--red)}
.container{padding:20px;max-width:1200px;margin:0 auto;}
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:20px;margin-bottom:20px;
}
h2{margin:0 0 15px 0;font-size:20px;}
.formGroup{margin-bottom:15px;}
.formGroup label{display:block;margin-bottom:5px;font-weight:600;color:var(--muted);}
.formGroup input,.formGroup select{
  width:100%;padding:10px;border:1px solid var(--border);
  border-radius:8px;background:var(--bg);color:var(--text);
}
.btn-save{
  background:var(--green);color:#fff;border:none;padding:12px 24px;
  border-radius:8px;cursor:pointer;font-weight:700;font-size:16px;width:100%;
}
</style>
</head>
<body>

<!-- 🔐 PERMISSION CHECK - MUST BE AT TOP -->
<script>
const mpUser = JSON.parse(localStorage.getItem("gmsUser") || "null");
if(!mpUser){window.location.href="login.html";}

const userRole = mpUser.role || "user";
const manpowerAccess = mpUser.manpowerAccess || "none";
const userCompanies = mpUser.userCompanies || [];

// ✅ FIXED PERMISSION LOGIC
const isAdmin = (userRole === "admin");
const isFull = (userRole === "full");
const hasManpowerAll = (manpowerAccess === "all");
const hasManpowerSelected = (manpowerAccess === "selected");

// Block if no permission
if(!isAdmin && !isFull && !hasManpowerAll && !hasManpowerSelected){
  alert("Manpower Access nai. Admin theke permission nite hobe.");
  window.location.href = "index.html";
}
</script>

<div class="header">
  <div class="logo">👨‍💼 Manpower Management</div>
  <div>
    <span id="userInfo" style="color:var(--muted);margin-right:10px;"></span>
    <button class="btn" onclick="location.href='index.html'">🏠 Dashboard</button>
    <button class="btn red" onclick="logout()">🚪 Logout</button>
  </div>
</div>

<div class="container">
  <div class="card">
    <h2>➕ Add Manpower Entry</h2>
    
    <div class="formGroup">
      <label>🏢 Company</label>
      <select id="company">
        <option value="GMS TEXTILES LTD">GMS TEXTILES LTD</option>
        <option value="GMS COMPOSITE KNITTING">GMS COMPOSITE KNITTING</option>
      </select>
    </div>

    <div class="formGroup">
      <label>📂 MCD / Department</label>
      <select id="mcd">
        <option value="ACCESSORIES MCD">ACCESSORIES MCD</option>
        <option value="GREY FABRIC MCD">GREY FABRIC MCD</option>
        <option value="BILLING SECTION">BILLING SECTION</option>
        <option value="SHIPMENT MCD">SHIPMENT MCD</option>
        <option value="OUTER WEAR MCD">OUTER WEAR MCD</option>
        <option value="YARN MCD">YARN MCD</option>
        <option value="PRINTING MCD">PRINTING MCD</option>
        <option value="JHUT MCD">JHUT MCD</option>
        <option value="GENERAL MCD">GENERAL MCD</option>
        <option value="LEFTOVER MCD">LEFTOVER MCD</option>
        <option value="FINISH FABRIC MCD">FINISH FABRIC MCD</option>
        <option value="YARN DYEING MCD">YARN DYEING MCD</option>
        <option value="CHEMICAL MCD">CHEMICAL MCD</option>
        <option value="GENERAL TECHNICAL MCD">GENERAL TECHNICAL MCD</option>
      </select>
    </div>

    <div class="formGroup">
      <label>👤 Employee Name</label>
      <input type="text" id="empName" placeholder="Enter employee name">
    </div>

    <div class="formGroup">
      <label> Employee ID</label>
      <input type="text" id="empId" placeholder="Enter employee ID">
    </div>

    <div class="formGroup">
      <label>💰 Salary</label>
      <input type="number" id="salary" placeholder="Enter salary">
    </div>

    <div class="formGroup">
      <label>📅 Date</label>
      <input type="date" id="entryDate">
    </div>

    <button class="btn-save" onclick="saveManpower()">💾 Save Entry</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
  authDomain:"gms-warehouse-tracker-7f57e.firebaseapp.com",
  projectId:"gms-warehouse-tracker-7f57e",
  storageBucket:"gms-warehouse-tracker-7f57e.firebasestorage.app",
  messagingSenderId:"992250313291",
  appId:"1:992250313291:web:ee3bceae76d4d53bc26bce"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Set today's date
document.getElementById('entryDate').valueAsDate = new Date();

// Show user info
const mpUser = JSON.parse(localStorage.getItem("gmsUser"));
document.getElementById('userInfo').innerText = `${mpUser.name} (${mpUser.role})`;

// Filter MCD based on company permission
const userCompanies = mpUser.userCompanies || [];
const mcdSelect = document.getElementById('mcd');
const companySelect = document.getElementById('company');

// If user has only one company, set it as default and disable selection
if(userCompanies.length === 1){
  companySelect.value = userCompanies[0];
  companySelect.disabled = true;
} else if(userCompanies.length === 0){
  // No company access
  alert("No company access!");
  window.location.href = "index.html";
}

// Filter MCDs based on company
function filterMCDsByCompany(company){
  const mcdCompanyMap = {
    "GREY FABRIC MCD": "textile",
    "YARN MCD": "textile",
    "SHIPMENT MCD": "composite",
    "BILLING SECTION": "composite",
    "OUTER WEAR MCD": "composite",
    "PRINTING MCD": "both",
    "JHUT MCD": "both",
    "GENERAL MCD": "both",
    "ACCESSORIES MCD": "both",
    "LEFTOVER MCD": "both",
    "FINISH FABRIC MCD": "both",
    "YARN DYEING MCD": "both",
    "CHEMICAL MCD": "both",
    "GENERAL TECHNICAL MCD": "both"
  };

  const allOptions = Array.from(mcdSelect.options);
  allOptions.forEach(opt => {
    const mcdType = mcdCompanyMap[opt.value] || "both";
    const isTextile = company.includes("TEXTILES");
    const isComposite = company.includes("COMPOSITE");
    
    if(mcdType === "both" || 
       (isTextile && mcdType === "textile") || 
       (isComposite && mcdType === "composite")){
      opt.style.display = "block";
    } else {
      opt.style.display = "none";
    }
  });
  
  // Select first visible option
  const visibleOptions = Array.from(mcdSelect.options).filter(opt => opt.style.display !== "none");
  if(visibleOptions.length > 0){
    mcdSelect.value = visibleOptions[0].value;
  }
}

companySelect.addEventListener('change', () => filterMCDsByCompany(companySelect.value));
filterMCDsByCompany(companySelect.value);

window.saveManpower = async () => {
  const company = companySelect.value;
  const mcd = mcdSelect.value;
  const empName = document.getElementById('empName').value.trim();
  const empId = document.getElementById('empId').value.trim();
  const salary = document.getElementById('salary').value;
  const entryDate = document.getElementById('entryDate').value;

  if(!empName || !empId || !salary || !entryDate){
    alert("সব ফিল্ড পূরণ করুন!");
    return;
  }

  try {
    await addDoc(collection(db, "manpower"), {
      company,
      mcd,
      empName,
      empId,
      salary: parseFloat(salary),
      entryDate,
      createdAt: new Date().toISOString(),
      createdBy: mpUser.email || mpUser.name
    });
    
    alert("✅ Manpower entry saved successfully!");
    document.getElementById('empName').value = '';
    document.getElementById('empId').value = '';
    document.getElementById('salary').value = '';
  } catch(err) {
    console.error(err);
    alert("❌ Error: " + err.message);
  }
};

window.logout = () => {
  localStorage.removeItem("gmsUser");
  window.location.href = "login.html";
};
</script>

</body>
</html>
