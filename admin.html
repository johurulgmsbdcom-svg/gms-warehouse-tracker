<!DOCTYPE html>
<html>
<head>
<title>GMS Admin Panel</title>

<style>
:root{
  --bg:#07111f;--card:#101b2d;--card2:#14233a;
  --text:#fff;--muted:#9fb0c7;--border:#263855;
  --blue:#2563eb;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;
}
body.light{
  --bg:#eef3f9;--card:#fff;--card2:#f8fafc;
  --text:#0f172a;--muted:#64748b;--border:#cbd5e1;
}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Segoe UI,Arial,sans-serif;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 22px;
  background:var(--card);
  border-bottom:1px solid var(--border);
}
.logoArea{display:flex;align-items:center;gap:10px}
.logoArea img{width:42px;height:42px;object-fit:contain;border-radius:8px}
.logo{font-size:22px;font-weight:900}
.sub{font-size:12px;color:var(--muted)}
.btn{
  border:0;
  border-radius:10px;
  padding:11px 18px;
  background:var(--blue);
  color:white;
  font-weight:900;
  cursor:pointer;
}
.btn.red{background:var(--red)}
.btn.green{background:var(--green)}
.btn.orange{background:var(--orange)}
.page{padding:20px}
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-bottom:18px;
}
.card{
  background:linear-gradient(135deg,var(--card),var(--card2));
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  box-shadow:0 8px 20px rgba(0,0,0,.18);
}
.label{font-size:12px;color:var(--muted);font-weight:900}
.num{font-size:26px;color:var(--green);font-weight:900;margin-top:6px}
.formGrid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
input,select{
  width:100%;
  box-sizing:border-box;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  font-size:14px;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:16px;
  background:var(--card);
  border-radius:14px;
  overflow:hidden;
}
th,td{
  border:1px solid var(--border);
  padding:10px;
  text-align:center;
  font-size:13px;
}
th{
  background:var(--card2);
}
.roleAdmin{color:var(--green);font-weight:900}
.roleFull{color:var(--orange);font-weight:900}
.roleUser{color:var(--blue);font-weight:900}
.toast{
  position:fixed;
  right:18px;
  bottom:18px;
  background:var(--green);
  color:white;
  padding:13px 20px;
  border-radius:12px;
  font-weight:900;
  display:none;
}
@media(max-width:900px){
  .grid,.formGrid{grid-template-columns:1fr}
  .header{display:block;text-align:center}
}
</style>
</head>

<body>

<div class="header">
  <div class="logoArea">
    <img src="logo.png" onerror="this.style.display='none'">
    <div>
      <div class="logo">👑 GMS ADMIN PANEL</div>
      <div class="sub">User Permission • MCD Access • Report Control</div>
    </div>
  </div>

  <div>
    <button class="btn" onclick="location.href='index.html'">🏠 Dashboard</button>
    <button class="btn" onclick="toggleTheme()">🌙 / ☀️</button>
  </div>
</div>

<div class="page">

  <div class="grid">
    <div class="card">
      <div class="label">👤 Total Users</div>
      <div class="num" id="totalUsers">0</div>
    </div>

    <div class="card">
      <div class="label">👑 Admin</div>
      <div class="num" id="totalAdmin">0</div>
    </div>

    <div class="card">
      <div class="label">🌍 Full Access</div>
      <div class="num" id="totalFull">0</div>
    </div>

    <div class="card">
      <div class="label">📂 MCD User</div>
      <div class="num" id="totalNormal">0</div>
    </div>
  </div>

  <div class="card">
    <h2>➕ Add / Update User</h2>

    <div class="formGrid">
      <input id="name" placeholder="User Name">
      <input id="email" placeholder="Email">
      <input id="password" placeholder="Password">

      <select id="role">
        <option value="user">Normal User</option>
        <option value="full">Full Access User</option>
        <option value="admin">Admin</option>
      </select>

      <select id="mcd">
        <option>GREY FABRIC MCD</option>
        <option>SHIPMENT MCD</option>
        <option>BILLING SECTION</option>
        <option>OUTER WEAR MCD</option>
        <option>YARN MCD</option>
        <option>PRINTING MCD</option>
        <option>JHUT MCD</option>
        <option>GENERAL MCD</option>
        <option>ACCESSORIES MCD</option>
        <option>LEFTOVER MCD</option>
        <option>FINISH FABRIC MCD</option>
        <option>YARN DYEING MCD</option>
        <option>CHEMICAL MCD</option>
        <option>GENERAL TECHNICAL MCD</option>
      </select>

      <button class="btn green" onclick="saveUser()">💾 Save User</button>
    </div>
  </div>

  <div class="card" style="margin-top:16px">
    <h2>👥 User List</h2>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Password</th>
          <th>Role</th>
          <th>MCD</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="userTable"></tbody>
    </table>
  </div>

</div>

<div id="toast" class="toast">Saved ✅</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
  authDomain: "gms-warehouse-tracker-7f57e.firebaseapp.com",
  projectId: "gms-warehouse-tracker-7f57e",
  storageBucket: "gms-warehouse-tracker-7f57e.firebasestorage.app",
  messagingSenderId: "992250313291",
  appId: "1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.toggleTheme=function(){
  document.body.classList.toggle("light");
  localStorage.setItem("adminTheme",document.body.classList.contains("light") ? "light" : "dark");
}

if(localStorage.getItem("adminTheme")==="light"){
  document.body.classList.add("light");
}

function toast(msg){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",1800);
}

window.saveUser=async function(){
  let name=document.getElementById("name").value.trim();
  let email=document.getElementById("email").value.trim();
  let password=document.getElementById("password").value.trim();
  let role=document.getElementById("role").value;
  let mcd=document.getElementById("mcd").value;

  if(!name || !email || !password){
    alert("Name, Email, Password lagbe");
    return;
  }

  await addDoc(collection(db,"users"),{
    name:name,
    email:email,
    password:password,
    role:role,
    mcd:mcd,
    createdAt:new Date().toISOString()
  });

  document.getElementById("name").value="";
  document.getElementById("email").value="";
  document.getElementById("password").value="";

  toast("User Saved ✅");
  loadUsers();
}

window.deleteUser=async function(id){
  if(confirm("Delete this user?")){
    await deleteDoc(doc(db,"users",id));
    toast("User Deleted ✅");
    loadUsers();
  }
}

async function loadUsers(){
  let snap=await getDocs(collection(db,"users"));
  let html="";
  let total=0,admin=0,full=0,normal=0;

  snap.forEach(d=>{
    let u=d.data();
    total++;

    if(u.role==="admin") admin++;
    else if(u.role==="full") full++;
    else normal++;

    let roleClass = u.role==="admin" ? "roleAdmin" : u.role==="full" ? "roleFull" : "roleUser";

    html+=`
      <tr>
        <td>${u.name || ""}</td>
        <td>${u.email || ""}</td>
        <td>${u.password || ""}</td>
        <td class="${roleClass}">${u.role || ""}</td>
        <td>${u.mcd || ""}</td>
        <td>
          <button class="btn red" onclick="deleteUser('${d.id}')">🗑 Delete</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("userTable").innerHTML=html;
  document.getElementById("totalUsers").innerText=total;
  document.getElementById("totalAdmin").innerText=admin;
  document.getElementById("totalFull").innerText=full;
  document.getElementById("totalNormal").innerText=normal;
}

loadUsers();
</script>

</body>
</html>
