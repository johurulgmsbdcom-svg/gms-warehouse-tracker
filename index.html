<!DOCTYPE html>
<html>
<head>
<title>GMS MCD SYSTEM</title>

<style>
body{
  margin:0;
  background:#0b0f19;
  color:#fff;
  font-family:Segoe UI;
}

/* HEADER */
.header{
  background:#111827;
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #222;
}
.logo{
  font-size:22px;
  font-weight:bold;
}
.sub{
  font-size:12px;
  color:#aaa;
}

/* NAVBAR */
.nav{
  display:flex;
  gap:10px;
  padding:12px;
  background:#020617;
  border-bottom:1px solid #222;
}
.nav button{
  padding:14px 22px;
  background:#111827;
  border:1px solid #333;
  color:#fff;
  border-radius:10px;
  cursor:pointer;
  font-size:15px;
  font-weight:600;
}
.nav button:hover,
.nav button.active{
  background:#2563eb;
}

/* PAGE */
.page{
  display:none;
  padding:20px;
}
.activePage{
  display:block;
}

/* CARD BUTTON */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}
.card{
  background:#111827;
  padding:30px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  border:1px solid #333;
  font-size:18px;
  font-weight:bold;
}
.card:hover{
  background:#2563eb;
}

/* FORM */
select,input{
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #444;
  background:#020617;
  color:white;
}

.btn{
  padding:12px 20px;
  background:#2563eb;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

/* SEARCH */
.search{
  display:flex;
  gap:10px;
}
.search input{flex:1;}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="logo">GMS MCD SYSTEM</div>
    <div class="sub">GMS TEXTILES LTD & COMPOSITE</div>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="active" onclick="openPage('home',this)">Dashboard</button>
  <button onclick="openPage('entry',this)">New Entry</button>
  <button onclick="openPage('reports',this)">Reports</button>
  <button onclick="openPage('needle',this)">Needle</button>
  <button onclick="openPage('manpower',this)">Manpower</button>
  <button onclick="openPage('notice',this)">Notice</button>
</div>

<!-- ================= HOME (BLACK EMPTY) ================= -->
<div id="home" class="page activePage">
  <!-- EMPTY BLACK PAGE (as you wanted) -->
</div>

<!-- ================= ENTRY ================= -->
<div id="entry" class="page">
  <h2>New Entry</h2>

  <label>Company</label>
  <select id="company">
    <option>GMS TEXTILES LTD</option>
    <option>GMS COMPOSITE KNITTING</option>
  </select>

  <br><br>

  <label>MCD</label>
  <select id="mcd">
    <option>GREY FABRIC MCD</option>
    <option>SHIPMENT MCD</option>
    <option>BILLING SECTION</option>
    <option>OUTER WEAR MCD</option>
    <option>YARN MCD</option>
    <option>PRINTING MCD</option>
    <option>JHUT MCD</option>
    <option>GENERAL MCD</option>
    <option>ACCESSORIES MCD</option>
    <option>LEFTOVER MCD</option>
    <option>FINISH FABRIC MCD</option>
    <option>YARN DYEING MCD</option>
    <option>CHEMICAL MCD</option>
    <option>GENERAL TECHNICAL MCD</option>
  </select>

  <button class="btn" onclick="loadEntry()">Open</button>

  <br><br>

  <div id="entryBox" class="grid"></div>
</div>

<!-- ================= REPORT ================= -->
<div id="reports" class="page">
  <h2>Reports</h2>

  <div id="reportBox" class="grid"></div>
</div>

<!-- ================= NEEDLE ================= -->
<div id="needle" class="page">
  <h2>Needle Section</h2>

  <div class="grid">
    <div class="card" onclick="location.href='needle.html'">Needle Daily Entry</div>
    <div class="card">Needle Monthly Report</div>
    <div class="card">All Needle Reports</div>
  </div>
</div>

<!-- ================= MANPOWER ================= -->
<div id="manpower" class="page">
  <h2>Manpower</h2>

  <div class="search">
    <input placeholder="Search ID / Name / Card">
    <button class="btn">Search</button>
  </div>

  <br>

  <div class="card">Total Manpower: 0</div>
</div>

<!-- ================= NOTICE ================= -->
<div id="notice" class="page">
  <h2>Notice Board</h2>

  <textarea style="width:100%;height:120px;background:#020617;color:white;border:1px solid #333"></textarea>
  <br>
  <button class="btn">Save Notice</button>
</div>

<!-- ================= JS ================= -->
<script>

function openPage(id,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("activePage"));
  document.getElementById(id).classList.add("activePage");

  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function loadEntry(){
  let mcd=document.getElementById("mcd").value;
  let box=document.getElementById("entryBox");

  box.innerHTML="";

  if(mcd==="ACCESSORIES MCD"){
    box.innerHTML=`
      <div class="card">Sewing Thread</div>
      <div class="card">Twill Tape</div>
      <div class="card">Accessories</div>
      <div class="card">Manpower</div>
    `;
  }

  else if(mcd==="GENERAL TECHNICAL MCD"){
    box.innerHTML=`
      <div class="card" onclick="location.href='needle.html'">Needle Entry</div>
      <div class="card">Technical Manpower</div>
    `;
  }

  else{
    box.innerHTML=`
      <div class="card">${mcd} Entry</div>
      <div class="card">${mcd} Manpower</div>
    `;
  }
}

</script>

</body>
</html>
