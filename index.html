<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Needle Ageing Live Report</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial,Helvetica,sans-serif;
background:#071229;
color:#fff;
padding:12px;
}

.header{
text-align:center;
margin-bottom:15px;
}

.header h1{
font-size:28px;
letter-spacing:1px;
}

.header h2{
font-size:18px;
color:#cbd5e1;
margin-top:5px;
}

.topbar{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
margin-bottom:15px;
}

select,button{
padding:10px 14px;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

button{
background:#2563eb;
color:#fff;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
margin-bottom:15px;
}

.card{
background:#0f172a;
border:1px solid #334155;
border-radius:14px;
padding:16px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,.25);
}

.card h3{
font-size:14px;
color:#94a3b8;
margin-bottom:8px;
}

.card p{
font-size:28px;
font-weight:bold;
}

.tableWrap{
overflow:auto;
margin-top:15px;
border-radius:12px;
}

table{
width:100%;
border-collapse:collapse;
background:#08112c;
}

th{
background:#0f172a;
padding:10px 5px;
border:1px solid #334155;
font-size:13px;
}

td{
padding:8px 5px;
text-align:center;
border:1px solid #334155;
font-size:12px;
font-weight:700;
}

.stock-normal{background:#2563eb}
.stock-warning{background:#fb923c}
.stock-danger{background:#dc2626}
.stock-empty{background:#fff;color:#000}

.status-running{color:#22c55e}
.status-slow{color:#facc15}
.status-stop{color:#ff4d4d}

.totalRow{
background:#1e293b;
color:#22c55e;
font-size:15px;
}

canvas{
background:#fff;
padding:12px;
border-radius:14px;
margin-top:18px;
}

.live{
text-align:center;
color:#22c55e;
font-weight:bold;
margin-bottom:10px;
}

@media(max-width:700px){
th{font-size:10px}
td{font-size:9px}
.header h1{font-size:22px}
}

@media print{
.topbar,.live{display:none}
canvas{display:none}
body{background:#fff;color:#000}
}
</style>
</head>

<body>

<div class="header">
<h1>GMS TEXTILES LTD</h1>
<h2>Needle Ageing Live Report</h2>
</div>

<div class="live">🟢 LIVE DATA CONNECTED</div>

<div class="topbar">
<select id="floorSelect">
<option value="ALL">ALL FLOOR</option>
<option>Kadom R</option>
<option>Kadom N</option>
<option>Shapla R</option>
<option>Shapla N</option>
<option>Poddo R</option>
<option>Poddo N</option>
<option>Belly R</option>
<option>Belly N</option>
<option>Sample R</option>
<option>Sample N</option>
<option>EMBROIDERY R</option>
<option>EMBROIDERY N</option>
</select>

<button onclick="window.print()">Print</button>
<button onclick="exportExcel()">Excel</button>
<button onclick="downloadPDF()">PDF</button>
</div>

<div class="dashboard">

<div class="card"><h3>Total Item</h3><p id="totalItem">0</p></div>
<div class="card"><h3>Running</h3><p id="runningItem">0</p></div>
<div class="card"><h3>Slow Moving</h3><p id="slowItem">0</p></div>
<div class="card"><h3>No Delivery</h3><p id="noDeliveryItem">0</p></div>
<div class="card"><h3>Critical Stock</h3><p id="criticalItem">0</p></div>
<div class="card"><h3>Total Stock</h3><p id="grandTotal">0</p></div>

</div>

<h2>Critical Stock Alert</h2>

<div class="tableWrap">
<table>
<thead>
<tr>
<th>Floor</th>
<th>Needle</th>
<th>Size</th>
<th>Stock</th>
<th>Running Days</th>
</tr>
</thead>
<tbody id="criticalBody"></tbody>
</table>
</div>

<div class="tableWrap">
<table id="mainTable">
<thead>
<tr>
<th>Floor</th>
<th>SL</th>
<th>Needle Type</th>
<th>Size</th>
<th>Stock</th>
<th>Avg Delivery</th>
<th>Running Days</th>
<th>No Delivery</th>
<th>Status</th>
</tr>
</thead>
<tbody id="reportBody"></tbody>
</table>
</div>

<canvas id="stockChart"></canvas>
<canvas id="trendChart"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_BUCKET",
messagingSenderId: "YOUR_MSG_ID",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("floorSelect").addEventListener("change", startLive);

let unsubscribe = null;

function startLive(){

if(unsubscribe) unsubscribe();

const selectedFloor = document.getElementById("floorSelect").value;

unsubscribe = onSnapshot(collection(db,"dailyPosting"),(snap)=>{

let allData = [];

snap.forEach(doc=>{
let d = doc.data();
if(d.date) allData.push(d);
});

renderReport(allData,selectedFloor);

});

}

function renderReport(allData,selectedFloor){

allData.sort((a,b)=>new Date(a.date)-new Date(b.date));

let map={};

allData.forEach(day=>{

if(selectedFloor!=="ALL" && day.floor!==selectedFloor) return;
if(!day.rows) return;

day.rows.forEach(row=>{

if(!row.needleType || !row.size) return;

let key = day.floor+"_"+row.needleType+"_"+row.size;

let present = Number(row.present)||0;
let delivery = Number(row.delivery)||0;

if(!map[key]){
map[key]={
floor:day.floor,
sl:row.sl||"",
type:row.needleType,
size:row.size,
stock:0,
deliveryTotal:0,
deliveryDays:0,
history:[]
};
}

map[key].stock = present;

if(delivery>0){
map[key].deliveryTotal += delivery;
map[key].deliveryDays +=1;
}

map[key].history.push(delivery);

});

});

let html="";
let criticalHTML="";

let total=0,running=0,slow=0,stop=0,critical=0,grand=0;

let labels=[];
let stocks=[];
let trendLabels=[];
let trendData=[];

Object.values(map).forEach(item=>{

total++;
grand += item.stock;

let avg = item.deliveryDays ? item.deliveryTotal/item.deliveryDays : 0;

let stockDays = avg>0 ? item.stock/avg : 999;
let runningDays = avg>0 ? Math.floor(stockDays)+" Days" : "-";

let noDelivery=0;

for(let i=item.history.length-1;i>=0;i--){
if(item.history[i]>0) break;
noDelivery++;
}

let stockClass="stock-normal";

if(item.stock===0) stockClass="stock-empty";
else if(stockDays<=5) stockClass="stock-warning";
else if(noDelivery>=30) stockClass="stock-danger";

let status="Running";
let statusClass="status-running";

if(item.stock===0){
status="No Stock";
statusClass="status-stop";
stop++;
}
else if(noDelivery>=30){
status="No Delivery";
statusClass="status-stop";
stop++;
}
else if(noDelivery>=13){
status="Slow Moving";
statusClass="status-slow";
slow++;
}
else{
running++;
}

if(stockDays<=5 && item.stock>0){
critical++;

criticalHTML += `
<tr>
<td>${item.floor}</td>
<td>${item.type}</td>
<td>${item.size}</td>
<td class="stock-warning">${item.stock}</td>
<td>${runningDays}</td>
</tr>`;
}

html += `
<tr>
<td>${item.floor}</td>
<td>${item.sl}</td>
<td>${item.type}</td>
<td>${item.size}</td>
<td class="${stockClass}">${item.stock}</td>
<td>${avg.toFixed(1)}</td>
<td>${runningDays}</td>
<td>${noDelivery} Days</td>
<td class="${statusClass}">${status}</td>
</tr>`;

labels.push(item.type+"-"+item.size);
stocks.push(item.stock);
trendLabels.push(item.type);
trendData.push(item.deliveryTotal);

});

html += `
<tr class="totalRow">
<td colspan="4">GRAND TOTAL</td>
<td>${grand}</td>
<td colspan="4">LIVE UPDATE</td>
</tr>`;

document.getElementById("reportBody").innerHTML = html;
document.getElementById("criticalBody").innerHTML = criticalHTML;

document.getElementById("totalItem").innerText = total;
document.getElementById("runningItem").innerText = running;
document.getElementById("slowItem").innerText = slow;
document.getElementById("noDeliveryItem").innerText = stop;
document.getElementById("criticalItem").innerText = critical;
document.getElementById("grandTotal").innerText = grand;

drawStockChart(labels,stocks);
drawTrendChart(trendLabels,trendData);

}

function drawStockChart(labels,data){

const old=Chart.getChart("stockChart");
if(old) old.destroy();

new Chart(document.getElementById("stockChart"),{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Current Stock",
data:data,
backgroundColor:"#2563eb"
}]
}
});

}

function drawTrendChart(labels,data){

const old=Chart.getChart("trendChart");
if(old) old.destroy();

new Chart(document.getElementById("trendChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Consumption Trend",
data:data,
borderColor:"#22c55e",
fill:false,
tension:.3
}]
}
});

}

window.exportExcel=function(){
let table=document.getElementById("mainTable");
let wb=XLSX.utils.table_to_book(table,{sheet:"Needle Report"});
XLSX.writeFile(wb,"Needle_Live_Report.xlsx");
}

window.downloadPDF=function(){
html2pdf().from(document.body).save("Needle_Live_Report.pdf");
}

startLive();

</script>

</body>
</html>
