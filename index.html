<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
  authDomain: "gms-warehouse-tracker-7f57e.firebaseapp.com",
  projectId: "gms-warehouse-tracker-7f57e",
  storageBucket: "gms-warehouse-tracker-7f57e.firebasestorage.app",
  messagingSenderId: "992250313291",
  appId: "1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const openingStock = 133322;

function calc(){
  let p = Number(document.getElementById("previous").innerText) || 0;
  let r = Number(document.getElementById("receive").value) || 0;
  let d = Number(document.getElementById("delivery").value) || 0;
  let b = p + r - d;

  document.getElementById("present").innerText = b;
  document.getElementById("totalPrevious").innerText = p;
  document.getElementById("totalReceive").innerText = r;
  document.getElementById("totalDelivery").innerText = d;
  document.getElementById("totalPresent").innerText = b;
}

async function saveData(){
  let date = document.getElementById("postDate").value;
  if(!date){
    alert("Date select koro");
    return;
  }

  calc();

  await setDoc(doc(db,"sewingThread",date),{
    date: date,
    previous: Number(document.getElementById("previous").innerText) || 0,
    receive: Number(document.getElementById("receive").value) || 0,
    delivery: Number(document.getElementById("delivery").value) || 0,
    present: Number(document.getElementById("present").innerText) || 0,
    remarks: document.getElementById("remarks").value || ""
  });

  await loadMonthlySummary();
  alert("Saved Successfully");
}

async function loadData(){
  let date = document.getElementById("postDate").value;
  if(!date) return;

  let todaySnap = await getDoc(doc(db,"sewingThread",date));

  if(todaySnap.exists()){
    let data = todaySnap.data();

    document.getElementById("previous").innerText = data.previous || openingStock;
    document.getElementById("receive").value = data.receive || "";
    document.getElementById("delivery").value = data.delivery || "";
    document.getElementById("remarks").value = data.remarks || "";
    calc();
    await loadMonthlySummary();
    return;
  }

  let d = new Date(date);
  d.setDate(d.getDate() - 1);
  let prevDate = d.toISOString().slice(0,10);

  let prevSnap = await getDoc(doc(db,"sewingThread",prevDate));

  if(prevSnap.exists()){
    document.getElementById("previous").innerText = prevSnap.data().present || openingStock;
  }else{
    document.getElementById("previous").innerText = openingStock;
  }

  document.getElementById("receive").value = "";
  document.getElementById("delivery").value = "";
  document.getElementById("remarks").value = "";

  calc();
  await loadMonthlySummary();
}

async function loadMonthlySummary(){
  let date = document.getElementById("postDate").value;
  if(!date) return;

  let month = date.slice(0,7);

  let totalReceive = 0;
  let totalDelivery = 0;
  let firstPrevious = null;
  let latestPresent = Number(document.getElementById("present").innerText) || 0;

  let snap = await getDocs(collection(db,"sewingThread"));

  let monthRows = [];

  snap.forEach(docSnap=>{
    let data = docSnap.data();
    if(data.date && data.date.slice(0,7) === month){
      monthRows.push(data);
    }
  });

  monthRows.sort((a,b)=>a.date.localeCompare(b.date));

  monthRows.forEach((data,index)=>{
    if(index === 0){
      firstPrevious = Number(data.previous) || openingStock;
    }

    totalReceive += Number(data.receive) || 0;
    totalDelivery += Number(data.delivery) || 0;
    latestPresent = Number(data.present) || latestPresent;
  });

  if(firstPrevious === null){
    firstPrevious = Number(document.getElementById("previous").innerText) || openingStock;
  }

  document.getElementById("mOpening").innerText = firstPrevious;
  document.getElementById("mReceive").innerText = totalReceive;
  document.getElementById("mDelivery").innerText = totalDelivery;
  document.getElementById("mPresent").innerText = latestPresent;
}

document.getElementById("postDate").addEventListener("change", loadData);

window.calc = calc;
window.saveData = saveData;

calc();
</script>
