<!DOCTYPE html>
<html>
<head>
<title>GMS System</title>

<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Arial;
}

.header{
  padding:15px 25px;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

.logo{
  font-size:20px;
  font-weight:bold;
}

.sub{
  font-size:12px;
  color:#94a3b8;
}

.nav{
  display:flex;
  gap:10px;
  padding:15px;
  background:#020617;
}

.nav button{
  padding:12px 20px;
  background:#1e293b;
  border:0;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.nav button:hover{
  background:#2563eb;
}

.box{
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  font-weight:bold;
}

.card:hover{
  background:#2563eb;
}

.hidden{
  display:none;
}

.search{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.search input{
  flex:1;
  padding:12px;
  border-radius:8px;
  border:0;
}

.search button{
  padding:12px 20px;
  background:#2563eb;
  border:0;
  color:white;
  border-radius:8px;
}

select{
  width:100%;
  padding:12px;
  border-radius:8px;
  margin-top:5px;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">GMS Warehouse System</div>
  <div class="sub">GMS TEXTILES & COMPOSITE</div>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="showPage('dashboard')">Dashboard</button>
  <button onclick="showPage('newEntry')">New Entry</button>
  <button onclick="showPage('reports')">Reports</button>
  <button onclick="showPage('manpower')">Manpower</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box">

<h2>Dashboard</h2>

<div class="grid">
  <div class="card">Today<br>0</div>
  <div class="card">Week<br>0</div>
  <div class="card">Month<br>0</div>
  <div class="card">Total<br>0</div>
</div>

<div class="search">
  <input placeholder="Search manpower / report / MCD">
  <button>Search</button>
</div>

<br>

<div class="grid">
  <div class="card" onclick="showPage('newEntry')">New Entry</div>
  <div class="card" onclick="showPage('reports')">Reports</div>
  <div class="card" onclick="showPage('manpower')">Manpower</div>
  <div class="card">Notice</div>
</div>

<br>

<div class="card">
  Chart Section (later add hobe)
</div>

</div>

<!-- NEW ENTRY -->
<div id="newEntry" class="box hidden">

<h2>New Entry</h2>

<label>Company</label>
<select id="entryCompany">
<option>GMS TEXTILES LTD</option>
<option>GMS COMPOSITE</option>
</select>

<br><br>

<label>MCD</label>
<select id="entryMcd">
<option>GENERAL TECHNICAL MCD</option>
<option>ACCESSORIES MCD</option>
<option>YARN MCD</option>
<option>PRINTING MCD</option>
</select>

<br><br>

<button onclick="openEntry()">Open Entry</button>

<div id="entrySub" class="grid hidden"></div>

</div>

<!-- REPORT -->
<div id="reports" class="box hidden">

<h2>Reports</h2>

<label>Company</label>
<select>
<option>GMS TEXTILES LTD</option>
</select>

<br><br>

<label>MCD</label>
<select id="reportMcd">
<option>GENERAL TECHNICAL MCD</option>
<option>ACCESSORIES MCD</option>
<option>YARN MCD</option>
<option>PRINTING MCD</option>
</select>

<br><br>

<button onclick="openReport()">Show Report</button>

<br><br>

<div id="reportButtons" class="grid hidden"></div>

</div>

<!-- MANPOWER -->
<div id="manpower" class="box hidden">
<h2>Manpower List</h2>

<div class="search">
  <input placeholder="Search manpower ID / card">
  <button>Search</button>
</div>

<br>

<div class="card">Total Manpower: 0</div>

</div>

<script>

function showPage(id){
  ["dashboard","newEntry","reports","manpower"].forEach(x=>{
    document.getElementById(x).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

/* ENTRY */
function openEntry(){
  let mcd=document.getElementById("entryMcd").value;
  let box=document.getElementById("entrySub");

  box.innerHTML="";
  box.classList.remove("hidden");

  if(mcd==="ACCESSORIES MCD"){
    box.innerHTML=`
      <div class="card">Sewing Thread Entry</div>
      <div class="card">Twill Tape Entry</div>
      <div class="card">Accessories Entry</div>
      <div class="card" onclick="showPage('manpower')">Manpower Entry</div>
    `;
  }

  else if(mcd==="GENERAL TECHNICAL MCD"){
    location.href="needle.html";
  }

  else{
    box.innerHTML=`<div class="card">${mcd} Entry</div>`;
  }
}

/* REPORT */
function openReport(){
  let mcd=document.getElementById("reportMcd").value;
  let box=document.getElementById("reportButtons");

  box.innerHTML="";
  box.classList.remove("hidden");

  if(mcd==="ACCESSORIES MCD"){
    box.innerHTML=`
      <div class="card">Sewing Thread Report</div>
      <div class="card">Twill Tape Report</div>
      <div class="card">Accessories Report</div>
      <div class="card" onclick="showPage('manpower')">Manpower Report</div>
    `;
  }

  else if(mcd==="GENERAL TECHNICAL MCD"){
    box.innerHTML=`
      <div class="card" onclick="location.href='needle.html'">Needle Report</div>
      <div class="card" onclick="showPage('manpower')">Manpower Report</div>
    `;
  }

  else{
    box.innerHTML=`
      <div class="card">${mcd} Report</div>
      <div class="card" onclick="showPage('manpower')">Manpower Report</div>
    `;
  }
}

</script>

</body>
</html>
