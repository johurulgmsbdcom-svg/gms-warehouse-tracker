<!DOCTYPE html>
<html>
<head>
<title>Accessories Inventory Posting</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<style>
body{margin:0;background:#07111f;color:white;font-family:Arial,sans-serif}
.header{text-align:center;padding:12px}
.header h2,.header h3,.header h4{margin:3px}
.controls{text-align:center;margin:10px}
button{padding:10px 14px;border:0;border-radius:8px;color:white;font-weight:bold;margin:4px}
.add{background:#f59e0b}.save{background:#16a34a}.home{background:#0f766e}.report{background:#2563eb}.del{background:#dc2626}
input,select{font-size:16px;padding:7px;border-radius:6px;border:1px solid #999}
.tableWrap{overflow-x:auto;width:100%}
table{min-width:1250px;width:98%;margin:10px auto;border-collapse:collapse;background:white;color:black;font-size:12px}
th,td{border:1px solid #000;padding:5px;text-align:center}
th{background:#2f6b55;color:white}
td input,td select{width:100%;box-sizing:border-box;border:0;outline:none;text-align:center;font-size:16px}
.toast{position:fixed;right:15px;bottom:15px;background:#22c55e;padding:12px 18px;border-radius:10px;font-weight:bold;display:none}
@media(max-width:700px){
  table{font-size:11px}
  .header h2{font-size:26px}
}
</style>
</head>

<body>

<div class="header">
  <h2>GMS Textiles Ltd</h2>
  <h4>Tansutrapur, Kaliakair, Gazipur</h4>
  <h4>Accessories MCD</h4>
  <h3>Accessories Inventory Posting</h3>
</div>

<div class="controls">
  Posting Date:
  <input type="date" id="postingDate">
  <button class="add" onclick="addRow()">➕ Add Row</button>
  <button class="save" onclick="savePosting()">💾 Save Posting</button>
  <button class="report" onclick="location.href='accessories-inventory-report.html'">📊 Report</button>
  <button class="home" onclick="location.href='index.html'">🏠 Home</button>
</div>

<div class="tableWrap">
<table>
<thead>
<tr>
  <th>Received Date</th>
  <th>Challan No</th>
  <th>Buyer Name</th>
  <th>Style</th>
  <th>Order</th>
  <th>Name of Item</th>
  <th>Unit</th>
  <th>Challan Qty</th>
  <th>Receive Qty</th>
  <th>Due Qty</th>
  <th>Short</th>
  <th>Excess</th>
  <th>Reported By</th>
  <th>Action</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div id="toast" class="toast">Saved ✅</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
  authDomain:"gms-warehouse-tracker-7f57e.firebaseapp.com",
  projectId:"gms-warehouse-tracker-7f57e",
  storageBucket:"gms-warehouse-tracker-7f57e.firebasestorage.app",
  messagingSenderId:"992250313291",
  appId:"1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const user=JSON.parse(localStorage.getItem("gmsUser")||"null");
if(!user){window.location.href="login.html"}

let rows=[];

function today(){return new Date().toISOString().slice(0,10)}
document.getElementById("postingDate").value=today();

function toast(msg){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",1500);
}

function blankRow(){
  return {
    receivedDate:document.getElementById("postingDate").value,
    challanNo:"",
    buyerName:"",
    style:"",
    orderNo:"",
    itemName:"",
    unit:"",
    challanQty:"",
    receiveQty:"",
    dueQty:"",
    short:"",
    excess:"",
    reportedBy:user.name||user.email||"User"
  };
}

function calc(i){
  let c=Number(rows[i].challanQty)||0;
  let r=Number(rows[i].receiveQty)||0;
  rows[i].dueQty = c>r ? c-r : "";
}

function render(){
  let html="";
  rows.forEach((r,i)=>{
    html+=`
    <tr>
      <td><input type="date" value="${r.receivedDate||''}" onchange="rows[${i}].receivedDate=this.value"></td>
      <td><input value="${r.challanNo||''}" onchange="rows[${i}].challanNo=this.value"></td>
      <td><input value="${r.buyerName||''}" onchange="rows[${i}].buyerName=this.value"></td>
      <td><input value="${r.style||''}" onchange="rows[${i}].style=this.value"></td>
      <td><input value="${r.orderNo||''}" onchange="rows[${i}].orderNo=this.value"></td>
      <td><input value="${r.itemName||''}" onchange="rows[${i}].itemName=this.value"></td>
      <td>
        <select onchange="rows[${i}].unit=this.value">
          <option value="">Select</option>
          <option ${r.unit==="Pcs"?"selected":""}>Pcs</option>
          <option ${r.unit==="Cone"?"selected":""}>Cone</option>
          <option ${r.unit==="Yds"?"selected":""}>Yds</option>
        </select>
      </td>
      <td><input type="number" value="${r.challanQty||''}" onchange="rows[${i}].challanQty=this.value;calc(${i});render()"></td>
      <td><input type="number" value="${r.receiveQty||''}" onchange="rows[${i}].receiveQty=this.value;calc(${i});render()"></td>
      <td>${r.dueQty||""}</td>
      <td><input type="number" value="${r.short||''}" onchange="rows[${i}].short=this.value"></td>
      <td><input type="number" value="${r.excess||''}" onchange="rows[${i}].excess=this.value"></td>
      <td>${r.reportedBy||""}</td>
      <td><button class="del" onclick="deleteRow(${i})">🗑 Delete</button></td>
    </tr>`;
  });
  document.getElementById("tbody").innerHTML=html;
}

window.addRow=function(){
  rows.push(blankRow());
  render();
};

window.deleteRow=function(i){
  rows.splice(i,1);
  render();
};

window.savePosting=async function(){
  let valid=rows.filter(r=>r.challanNo||r.buyerName||r.itemName||r.receiveQty);
  if(valid.length===0){alert("Data nai");return}

  await addDoc(collection(db,"accessoriesInventory"),{
    postingDate:document.getElementById("postingDate").value,
    rows:valid,
    userId:user.id||"",
    userName:user.name||"",
    userEmail:user.email||"",
    createdAt:new Date().toISOString()
  });

  rows=[];
  addRow();
  toast("Posting Saved ✅");
};

document.addEventListener("keydown",function(e){
  if(e.key==="Enter" && e.target.tagName==="INPUT"){
    e.preventDefault();
    let inputs=[...document.querySelectorAll("td input,td select")];
    let index=inputs.indexOf(e.target);
    if(inputs[index+1]) inputs[index+1].focus();
  }
});

addRow();
</script>

</body>
</html>
