<script type="module">

  appId:"1:992250313291:web:ee3bceae76d4d53bc26bce"
};
const app=initializeApp(firebaseConfig), db=getFirestore(app);
const $=id=>document.getElementById(id);
let all=[],cur=[];

let userBarChart=null, distPieChart=null;

const CHART_COLORS = [
  '#22c55e','#3b82f6','#8b5cf6','#f59e0b','#ef4444',
  '#06b6d4','#ec4899','#14b8a6','#f97316','#6366f1',
  '#84cc16','#eab308','#0ea5e9','#d946ef','#f43f5e'
];

window.GMS_CACHE = {
  CACHE_KEY: 'GMS_CHALLAN_SMART_CACHE',
  READ_COUNT_KEY: 'GMS_CHALLAN_READ_COUNT_TODAY',
  READ_DATE_KEY: 'GMS_CHALLAN_READ_COUNT_DATE',
  CACHE_EXPIRY_MS: 5 * 60 * 1000,
  getReadCount: function(){
    var today = new Date().toDateString();
    if(localStorage.getItem(this.READ_DATE_KEY) !== today){
      localStorage.setItem(this.READ_DATE_KEY, today);
      localStorage.setItem(this.READ_COUNT_KEY, '0');
    }
    return parseInt(localStorage.getItem(this.READ_COUNT_KEY) || '0');
  },
  incRead: function(n){
    n = n || 1;
    var count = this.getReadCount() + n;
    localStorage.setItem(this.READ_COUNT_KEY, String(count));
    var el = document.getElementById('readCounter');
    if(el) el.innerText = count;
    return count;
  },
  _all: function(){
    try{ return JSON.parse(localStorage.getItem(this.CACHE_KEY) || '{}'); }
    catch(e){ return {}; }
  },
  set: function(key, data){
    var all = this._all();
    all[key] = { data: data, savedAt: Date.now() };
    try{ localStorage.setItem(this.CACHE_KEY, JSON.stringify(all)); }
    catch(e){ console.warn('Cache set failed:', e); }
  },
  get: function(key){
    var all = this._all();
    var entry = all[key];
    if(!entry) return null;
    var age = Date.now() - entry.savedAt;
    if(age > this.CACHE_EXPIRY_MS){
      console.log('⏰ Cache expired for:', key);
      return null;
    }
    return entry.data;
  },
  invalidate: function(keys){
    var all = this._all();
    if(typeof keys === 'string') keys = [keys];
    keys.forEach(function(k){ delete all[k]; });
    localStorage.setItem(this.CACHE_KEY, JSON.stringify(all));
  },
  clear: function(){
    localStorage.removeItem(this.CACHE_KEY);
  }
};

const CACHE_KEYS = { challanGatePass: 'challan_gatepass_cache' };

function esc(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
function n(v){return Number(v)||0}
function fmt(v){return n(v).toLocaleString("en-US")}

function same(a,b){
  if(!a || !b) return false;
  return String(a).trim().toUpperCase() === String(b).trim().toUpperCase();
}

function link(no){return location.origin+location.pathname+"?challanNo="+encodeURIComponent(no||"")}

function applyUrlFilters(){
  const params=new URLSearchParams(location.search);
  const company=params.get("company"), mcd=params.get("mcd");
  if(company && $("companyFilter")){
    const c=company.toUpperCase();
    [...$("companyFilter").options].forEach(o=>{if(o.value.toUpperCase()===c||o.text.toUpperCase()===c)$("companyFilter").value=o.value});
  }
  if(mcd && $("mcdFilter")){
    [...$("mcdFilter").options].forEach(o=>{if(o.value.toUpperCase()===mcd.toUpperCase()||o.text.toUpperCase()===mcd.toUpperCase())$("mcdFilter").value=o.value});
  }
}

window.updateReportHeader=function(){let c=$("companyFilter").value;$("reportCompanyTitle").innerText=(c&&c!=="All")?c:"GMS TEXTILES LTD."}

async function load(){
  const snap=await getDocs(collection(db,"challanGatePass"));
  all=[];
  snap.forEach(d=>all.push({...d.data(),_id:d.id,_source:"firebase"}));
  all.sort(sorter);
}

function sorter(a,b){
  let c=String(b.updatedAt||b.createdAt||"").localeCompare(String(a.updatedAt||a.createdAt||""));
  if(c)return c;
  c=String(b.date||"").localeCompare(String(a.date||""));
  if(c)return c;
  return String(b.challanNo||"").localeCompare(String(a.challanNo||""));
}

function getUniqueCreatedBy(){
  let names = new Set();
  all.forEach(x=>{
    let name = x.createdBy || x.preparedBy || 'Unknown';
    if(name) names.add(name);
  });
  return Array.from(names).sort();
}

function filter(){
  let company=$("companyFilter").value,
      toCompany=$("toCompanyFilter").value,
      mcd=$("mcdFilter").value,
      createdBy=$("createdByFilter").value,
      month=$("monthFilter").value,
      single=$("singleDate").value,
      from=$("fromDate").value,
      to=$("toDate").value,
      ch=$("challanSearch").value.toLowerCase().trim(),
      gp=$("gateSearch").value.toLowerCase().trim(),
      txt=$("textSearch").value.toLowerCase().trim();
  
  return all.filter(x=>{
    let d=x.date||"";
    if(single && d!==single) return false;
    if(month && d.slice(0,7)!==month) return false;
    if(from && d<from) return false;
    if(to && d>to) return false;
    if(ch && !(x.challanNo||"").toLowerCase().includes(ch)) return false;
    if(gp && !(x.gatePassNo||"").toLowerCase().includes(gp)) return false;
    if(mcd && mcd!=="All"){
      if(!same(x.mcd, mcd)) return false;
    }
    if(createdBy){
      let recordCreatedBy = x.createdBy || x.preparedBy || '';
      if(!same(recordCreatedBy, createdBy)) return false;
    }
    if(company && company!=="All"){
      if(company==="OTHER FACTORY"){
        if(x.companyType!=="OTHER FACTORY") return false;
      } else if(!same(x.company, company)){
        return false;
      }
    }
    if(toCompany && toCompany!=="All"){
      if(toCompany==="OTHER FACTORY"){
        if(x.toCompanyType!=="OTHER FACTORY") return false;
      } else if(!same(x.toCompany, toCompany)){
        return false;
      }
    }
    if(txt){
      let hay=[x.buyer,x.vehicleNo,x.toCompany,x.company,x.driverName,x.transportNo,x.mcd,x.challanNo,x.gatePassNo].join(" ").toLowerCase();
      if(!hay.includes(txt)) return false;
    }
    return true;
  }).sort(sorter);
}

function renderCharts(data){
  const chartSection = $('chartSection');
  
  if(!data || data.length===0){
    chartSection.style.display = 'none';
    return;
  }
  
  chartSection.style.display = 'block';
  
  // Check if Chart.js is loaded
  if(typeof window.Chart === 'undefined'){
    console.error('❌ Chart.js not loaded!');
    chartSection.innerHTML = '<div class="chartError">⚠️ Chart.js library not loaded. Please check internet connection.</div>';
    return;
  }
  
  const ChartLib = window.Chart;
  
  const userCounts = {};
  data.forEach(x=>{
    let name = x.createdBy || x.preparedBy || 'Unknown';
    userCounts[name] = (userCounts[name] || 0) + 1;
  });
  
  const sortedUsers = Object.entries(userCounts).sort((a,b)=>b[1]-a[1]);
  const labels = sortedUsers.map(u=>u[0]);
  const counts = sortedUsers.map(u=>u[1]);
  const colors = labels.map((_,i)=>CHART_COLORS[i % CHART_COLORS.length]);

          borderWidth: 2,
          borderRadius: 8,
          borderSkipped: false

      },
      options: {
        responsive: true,
        maintainAspectRatio: false,

          }
        }
      }
    });
  }catch(e){
    console.error('Bar chart error:', e);
  }
  
  try{
    const pieCtx = $('distPieChart').getContext('2d');
    distPieChart = new ChartLib(pieCtx, {
      type: 'doughnut',
      data: {
        labels: labels,
        datasets: [{
          data: counts,
          backgroundColor: colors.map(c=>c+'dd'),

          borderWidth: 3,
          hoverOffset: 8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '55%',
        plugins: {
          legend: {
            position: 'bottom',
            labels: { color: '#e2e8f0', font: { size: 11, weight: 'bold' }, padding: 10 }

                return ctx.label + ': ' + ctx.raw + ' (' + pct + '%)';
              }
            }
          }
        }

window.loadOfflineData=function(){
  let offlineCount=0;
  for(let i=0;i<localStorage.length;i++){
    const key=localStorage.key(i);
    if(key && key.startsWith("GMS_CHALLAN_OFFLINE_")){
      try{
        const queue=JSON.parse(localStorage.getItem(key)||"[]");
        const pending=queue.filter(x=>x.status!=="synced");
        pending.forEach(item=>{
          if(!all.find(a=>a._id===item.id)){
            let c=item.data; c._id=item.id; c._source="offline"; c._status=item.status||"pending";
            all.push(c); offlineCount++;
          }
        });
      }catch(e){}
    }
  }
  if(offlineCount>0){
    all.sort(sorter); 
    populateCreatedByFilter();
    cur=filter(); 
    renderCharts(cur);
    summary(cur);
    $("area").innerHTML=cur.length?cur.map(setHtml).join(""):`<div class="noDataBox">No Challan Found</div>`;
    setTimeout(qr,100);
    alert("✅ Loaded "+offlineCount+" offline challan(s)");
  }else{ alert("📦 No offline data found"); }
}

window.syncAllOffline=async function(){
  let synced=0,failed=0;
  for(let i=0;i<localStorage.length;i++){
    const key=localStorage.key(i);
    if(key && key.startsWith("GMS_CHALLAN_OFFLINE_")){
      try{
        const queue=JSON.parse(localStorage.getItem(key)||"[]");
        const pending=queue.filter(x=>x.status==="pending");
        for(let item of pending){
          try{
            await setDoc(doc(db,"challanGatePass",item.id),item.data,{merge:true});
            if(item.data.challanNo && item.data.challanNo.match(/CH-\d{4}-\d{4}/)){
              const year=item.data.challanNo.split("-")[1];
              const num=parseInt(item.data.challanNo.split("-")[2]);
              await setDoc(doc(db,"serialCounters","challan_"+year),{last:num,year:year,updatedAt:new Date().toISOString()},{merge:true});
            }
            item.status="synced"; item.syncedAt=new Date().toISOString(); synced++;
          }catch(e){ failed++; }
        }
        localStorage.setItem(key,JSON.stringify(queue));
      }catch(e){}
    }
  }
  if(synced>0 || failed>0){
    alert("✅ Synced: "+synced+" | ❌ Failed: "+failed);
    await load(); 
    populateCreatedByFilter();
    cur=filter(); 
    renderCharts(cur);
    summary(cur); 
    $("area").innerHTML=cur.map(setHtml).join(""); 
    setTimeout(qr,100);
  }else{ alert("✅ No pending offline data"); }
}

applyUrlFilters();
let p=new URLSearchParams(location.search).get("challanNo");
if(p){document.body.classList.add("singleView");$("challanSearch").value=p}

(function(){
  var c = window.GMS_CACHE.getReadCount();
  var el = document.getElementById('readCounter');
  if(el) el.innerText = c;
})();

// Check Chart.js loaded
if(typeof window.Chart === 'undefined'){
  console.error(' Chart.js not loaded! Retrying...');
  // Retry loading Chart.js
  let script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';
  script.onload = function(){
    console.log('✅ Chart.js loaded successfully');
    showReport();
  };
  script.onerror = function(){
    console.error('❌ Chart.js failed to load');
  };
  document.head.appendChild(script);
}else{
  console.log('✅ Chart.js already loaded:', window.Chart.version);
}

setupRealtimeSync();
showReport();

setInterval(function(){
  if(!document.hidden){
    console.log('⏰ Auto-refresh triggered');
    showReport();
  }
}, 30000);

console.log('%c═══════════════════════════════════════════', 'color: #22c55e; font-weight: bold;');
console.log('%c  📊 SMART CHART - CHALLAN REPORT', 'color: #22c55e; font-weight: bold; font-size:14px;');
console.log('%c═══════════════════════════════════════════', 'color: #22c55e; font-weight: bold;');
console.log('%c  Chart.js Status:', typeof window.Chart !== 'undefined' ? '✅ Loaded' : ' Not Loaded');
console.log('%c═══════════════════════════════════════════', 'color: #22c55e; font-weight: bold;');
</script>
</body>
