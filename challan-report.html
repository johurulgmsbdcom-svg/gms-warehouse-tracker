<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Challan Gate Pass Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;background:#07111f;color:#fff;font-family:Arial,Helvetica,sans-serif}
.wrap{max-width:1500px;margin:auto;padding:14px}
.head{text-align:center;padding:12px 0}.head h2,.head h3{margin:4px}
.controls,.summary{background:#101827;border:1px solid #263855;border-radius:14px;padding:12px;margin:12px 0}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;text-align:left}
label{display:block;color:#b7c5da;font-weight:900;font-size:12px;margin-bottom:4px}
input,select{width:100%;padding:9px;border-radius:7px;border:1px solid #94a3b8;color:#000;font-size:14px}
button{border:0;border-radius:8px;padding:9px 12px;color:white;font-weight:900;cursor:pointer;margin:3px}
.blue{background:#2563eb}.green{background:#16a34a}.purple{background:#7c3aed}.orange{background:#f59e0b}.red{background:#dc2626}.gray{background:#64748b}
.btns{text-align:center;margin-top:9px}
.sumTitle{text-align:center;color:#22c55e;font-size:22px;font-weight:900;margin-bottom:8px}
table{width:100%;border-collapse:collapse;background:#fff;color:#000}
th,td{border:1px solid #000;padding:6px;text-align:center;color:#000}
th{background:#dbeafe;font-weight:900}
.reportSet{background:#fff;color:#000;margin:15px 0}
.actionBar{background:#07111f;text-align:center;padding:10px}
.createdByBadge{display:inline-block;margin-left:10px;padding:8px 14px;border-radius:10px;background:#0f172a;border:1px solid #334155;color:#22c55e!important;font-weight:900}
.page{background:#fff;color:#000;padding:18px 24px;page-break-inside:avoid}
.challanPage{min-height:900px}.gatePage{page-break-before:always;min-height:760px}
.qr{width:60px;height:60px;margin:4px auto}
.ctop{text-align:center;position:relative}.challanTitle{display:inline-block;border:3px double #000;padding:5px 24px;font-size:26px;font-weight:900}
.logoLine{display:flex;justify-content:center;align-items:center;gap:12px;margin-top:8px}.logo{border:3px solid #000;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:25px;font-weight:900}
.companyBig{font-size:34px;font-weight:900}.cno{position:absolute;right:30px;top:55px;font-weight:900;text-align:center}.cno b{font-size:20px}
.info{display:grid;grid-template-columns:1fr 1fr;gap:35px;margin-top:18px}.line{display:grid;grid-template-columns:120px 1fr;gap:6px;margin:10px 0;font-size:16px}.line span:last-child{border-bottom:2px solid #000;min-height:22px;font-weight:700}
.desc{border:2px solid #000;margin-top:18px}.spec{display:grid;grid-template-columns:110px 1fr 70px 1fr 120px 1fr;gap:6px;padding:6px}.spec div:nth-child(even){border-bottom:2px solid #000;font-weight:700}
.challanTable{table-layout:fixed;font-size:13px}.challanTable th,.challanTable td{height:38px;border:2px solid #000}
.good{border:2px solid #000;border-top:0;padding:6px}.sign{display:grid;grid-template-columns:1fr 1fr 1fr;border:2px solid #000;border-top:0;height:95px}.sign div{display:flex;align-items:end;justify-content:center;border-right:2px solid #000;padding-bottom:12px;font-weight:900}.sign div:last-child{border-right:0}
.addr{display:grid;grid-template-columns:1fr 1fr;margin-top:12px;font-size:13px}
.gateHeader{display:grid;grid-template-columns:1fr 1fr;gap:25px}.gateCompany{display:flex;gap:10px}.gateCompany h2{margin:0;font-size:31px}.addrBlock{font-size:14px;white-space:pre-line}
.gateRight{display:grid;grid-template-columns:1fr 160px;border:2px solid #000}.gateText{padding:18px;font-size:19px}.blank{display:inline-block;min-width:230px;border-bottom:2px solid #000;font-weight:900}.gateSide{border-left:2px solid #000}
.gtitle{font-size:34px;font-weight:900;text-align:center;border-bottom:2px solid #000;padding:9px}.only{text-align:center;font-weight:900;border-bottom:2px solid #000;padding:5px}.gno{font-size:17px;padding:8px;border-bottom:2px solid #000}.gnum{font-size:24px;font-weight:900;text-align:center;padding:8px;border-bottom:2px solid #000}.gdate{font-size:17px;padding:8px}
.vehicle{border:2px solid #000;margin-top:25px;padding:10px;font-size:36px;font-weight:900}.gateTable{table-layout:fixed;margin-top:15px;font-size:17px}.gateTable th,.gateTable td{border:2px solid #000;height:58px}
.bottom{display:grid;grid-template-columns:1fr 1.3fr;border:2px solid #000;margin-top:40px;min-height:105px}.bleft{display:grid;grid-template-columns:1fr 1fr;align-items:end;text-align:center;font-weight:900;padding-bottom:14px}.bright{border-left:2px solid #000;text-align:center;padding-top:12px;font-size:18px}.bright2{display:grid;grid-template-columns:1fr 1fr;align-items:end;height:65px;font-weight:900}
body.singleView .head,body.singleView .controls,body.singleView .summary,body.singleView .actionBar{display:none!important}
body.singleView{background:#fff!important;color:#000!important}body.singleView .wrap{padding:0!important}body.singleView .reportSet{margin:0!important}
#errorBox{display:none;background:#fee2e2;color:#991b1b;padding:12px;border-radius:10px;margin:10px 0;font-weight:900}
@media(max-width:900px){.grid,.info,.gateHeader{grid-template-columns:1fr}.page{overflow-x:auto}}
@page{size:A4 portrait;margin:6mm}
@media print{
body{background:#fff!important;margin:0!important;padding:0!important}.head,.controls,.summary,.actionBar,#errorBox{display:none!important}.wrap{padding:0!important;max-width:none!important;width:100%!important}.reportSet{margin:0!important;padding:0!important}.page{width:100%!important;padding:0!important;margin:0!important;overflow:hidden!important}.challanPage{height:285mm!important;min-height:0!important;page-break-after:always!important}.gatePage{height:285mm!important;min-height:0!important;page-break-before:always!important}.qr{width:42px!important;height:42px!important;margin:3px auto!important}.challanTitle{font-size:18px!important;padding:2px 20px!important}.logo{width:38px!important;height:38px!important;font-size:19px!important}.companyBig{font-size:23px!important}.cno{right:20px!important;top:48px!important;font-size:9px!important}.cno b{font-size:15px!important}.info{margin-top:6px!important;gap:18px!important}.line{font-size:10px!important;margin:3px 0!important;grid-template-columns:82px 1fr!important}.line span:last-child{min-height:14px!important;border-bottom:1px solid #000!important}.desc{margin-top:6px!important;border:1px solid #000!important}.spec{font-size:8px!important;grid-template-columns:62px 1fr 38px 1fr 70px 1fr!important;padding:2px!important}.challanTable{font-size:7px!important}.challanTable th,.challanTable td{height:21px!important;padding:1px!important;border:1px solid #000!important}.good{font-size:9px!important;padding:2px!important;border:1px solid #000!important}.sign{height:45px!important;border:1px solid #000!important}.sign div{font-size:9px!important;border-right:1px solid #000!important;padding-bottom:4px!important}.addr{font-size:8px!important;margin-top:4px!important;line-height:1.05!important}.gateHeader{grid-template-columns:1fr 1.05fr!important;gap:12px!important}.gateCompany h2{font-size:22px!important}.addrBlock{font-size:8px!important;line-height:1.05!important;max-height:70px!important;overflow:hidden!important}.gateRight{min-height:125px!important}.gateText{font-size:11px!important;padding:8px!important;line-height:1.2!important}.blank{min-width:120px!important;border-bottom:1px solid #000!important}.gtitle{font-size:22px!important;padding:4px!important}.only{font-size:9px!important;padding:3px!important}.gno{font-size:10px!important;padding:3px!important}.gnum{font-size:14px!important;padding:4px!important}.gdate{font-size:10px!important;padding:4px!important}.vehicle{font-size:22px!important;margin-top:10px!important;padding:6px!important}.gateTable{font-size:10px!important;margin-top:8px!important}.gateTable th,.gateTable td{height:38px!important;border:1px solid #000!important;padding:2px!important}.bottom{margin-top:18px!important;min-height:65px!important;border:1px solid #000!important}.bright{font-size:10px!important;padding-top:5px!important;border-left:1px solid #000!important}.bright2{height:42px!important}.bleft{font-size:10px!important;padding-bottom:8px!important}
}

.challanTable th:nth-child(2), .challanTable td:nth-child(2) {
    word-wrap: break-word; /* Auto wraps the text if it overflows */
    white-space: normal; /* Ensures the text wraps to the next line */
    width: 1%; /* Makes the column flexible */
    min-width: 150px; /* Minimum width to maintain readability */
}

.noDataBox{
  background:#fee2e2!important;
  color:#991b1b!important;
  border:2px solid #ef4444!important;
  border-radius:12px!important;
  padding:18px!important;
  margin:15px!important;
  text-align:center!important;
  font-size:20px!important;
  font-weight:900!important;
}
body.singleView .noDataBox{
  display:block!important;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="head"><h2 id="reportCompanyTitle">GMS TEXTILES LTD.</h2><h3>Delivery Challan & Gate Pass Report</h3></div>
  <div class="controls">
    <div class="grid">
      <div><label>Company</label><select id="companyFilter" onchange="updateReportHeader();showReport()"><option>All</option><option>GMS TEXTILES LTD.</option><option>GMS COMPOSITE KNITTING IND LTD.</option><option>OTHER FACTORY</option></select></div>
      <div><label>To Company</label><select id="toCompanyFilter" onchange="showReport()"><option>All</option><option>GMS TEXTILES LTD.</option><option>GMS COMPOSITE KNITTING IND LTD.</option><option>OTHER FACTORY</option></select></div>
      <div><label>MCD</label><select id="mcdFilter" onchange="showReport()"><option>All</option><option>ACCESSORIES MCD</option><option>GREY FABRIC MCD</option><option>SHIPMENT MCD</option></select></div>
      <div><label>Month</label><input type="month" id="monthFilter"></div>
      <div><label>Single Date</label><input type="date" id="singleDate"></div>
    </div>
  </div>

  <div id="errorBox"></div><div id="summary"></div><div id="area"></div>
</div>

<script type="module">
  // JavaScript logic for report handling
  async function showReport() {
    // Load and display filtered data
    const data = await loadReportData();
    // Process and show summary
    document.getElementById("area").innerHTML = generateReportHtml(data);
  }
  function updateReportHeader() {
    const company = document.getElementById("companyFilter").value;
    document.getElementById("reportCompanyTitle").innerText = company !== "All" ? company : "GMS TEXTILES LTD.";
  }
  async function loadReportData() {
    // Here you would fetch data from the server or database
    return [
      { challanNo: 'CH-2026-0001', date: '2026-05-01', company: 'GMS TEXTILES LTD.' },
      // Add more data objects as needed
    ];
  }
  function generateReportHtml(data) {
    return data.map(item => {
      return `<div><strong>Challan No:</strong> ${item.challanNo}, <strong>Date:</strong> ${item.date}, <strong>Company:</strong> ${item.company}</div>`;
    }).join('');
  }
</script>
</body>
</html>
