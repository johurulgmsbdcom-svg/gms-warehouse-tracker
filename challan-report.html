/* ===== Delivery Challan Format ===== */
.challanBox{
  width:100%;
  border:0;
  color:#000;
}
.challanTop{
  text-align:center;

}
.challanTitle{

  font-weight:900;
  margin-bottom:8px;
}
.logoLine{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
}
.logoMark{
  width:54px;height:54px;border:3px solid #000;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:24px;
}
.companyBig{
  font-size:34px;
  font-weight:900;
}
.serialRight{
  position:absolute;
  right:80px;
  top:52px;
  font-size:24px;
  font-weight:900;
  letter-spacing:3px!important;
}
.challanInfo{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:35px;
  margin-top:22px;
}
.lineField{
  display:grid;
  grid-template-columns:90px 1fr;
  align-items:end;
  gap:6px;
  margin:12px 0;
  font-size:16px;
}
.lineField span:last-child{

  font-weight:700;
}
.descBox{
  border:2px solid #000;
  margin-top:22px;
}
.descTitle{
  padding:8px;
  font-size:16px;
  font-weight:700;
}
.specGrid{
  display:grid;
  grid-template-columns:110px 1fr 80px 1fr 130px 1fr;
  gap:8px;
  padding:4px 8px 10px;
  align-items:end;
}
.specGrid div:nth-child(even){

  min-height:22px;
  font-weight:700;
}
.challanTable{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  font-size:14px;
}
.challanTable th,.challanTable td{
  border:2px solid #000;
  padding:5px;

.challanTable th{font-weight:900}
.challanTable .sl{width:45px}

.totalRow td{font-weight:900;height:38px}
.goodText{

  padding:6px;

}
.challanSign{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  border:2px solid #000;
  border-top:0;
  height:105px;
}
.challanSign div{
  display:flex;
  align-items:end;
  justify-content:center;
  padding-bottom:12px;
  border-right:2px solid #000;

}
.challanSign div:last-child{border-right:0}
.footerAddr{
  display:grid;
  grid-template-columns:1fr 1fr;
  margin-top:18px;
  font-size:14px;
}
.footerAddr b{font-size:15px}

/* ===== Gate Pass Format ===== */

<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
  authDomain:"gms-warehouse-tracker-7f57e.firebaseapp.com",
  projectId:"gms-warehouse-tracker-7f57e",
  storageBucket:"gms-warehouse-tracker-7f57e.firebasestorage.app",
  messagingSenderId:"992250313291",
  appId:"1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const $=id=>document.getElementById(id);

let allData=[];
let currentList=[];

function esc(v){
  return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));
}
function num(v){return Number(v)||0}
function fmt(v){return num(v).toLocaleString("en-US")}
function reportLink(challanNo){
  return location.origin+location.pathname+"?challanNo="+encodeURIComponent(challanNo||"");
}
function renderQr(){
  document.querySelectorAll("[data-qr]").forEach(el=>{
    let no=el.getAttribute("data-qr")||"";
    el.innerHTML="";
    new QRCode(el,{text:reportLink(no),width:64,height:64,correctLevel:QRCode.CorrectLevel.M});
  });
}
function shortNo(no){
  let m=String(no||"").match(/(\d+)$/);
  return m ? m[1] : no;
}

async function loadData(){
  let snap=await getDocs(collection(db,"challanGatePass"));
  allData=[];
  snap.forEach(d=>allData.push({...d.data(),_id:d.id}));
  allData.sort((a,b)=>{
    let d=(b.date||"").localeCompare(a.date||"");
    if(d!==0) return d;
    return (b.challanNo||"").localeCompare(a.challanNo||"");
  });
  $("status").innerText="Loaded: "+allData.length+" Challan / Gate Pass";
}

function filterData(){
  let from=$("fromDate").value;
  let to=$("toDate").value;
  let single=$("singleDate") ? $("singleDate").value : "";
  let month=$("monthFilter") ? $("monthFilter").value : "";
  let ch=$("challanSearch").value.trim();
  let gp=$("gateSearch").value.trim();
  let mcd=$("mcdFilter").value;
  let company=$("companyFilter") ? $("companyFilter").value : "All";
  let toCompany=$("toCompanyFilter") ? $("toCompanyFilter").value : "All";

  return allData.filter(x=>{
    let date=x.date||"";

    // Single date filter priority
    if(single && date!==single) return false;

    // Month wise filter
    if(month && date.slice(0,7)!==month) return false;

    // Date range filter, like 1-7 date
    if(from && date<from) return false;
    if(to && date>to) return false;

    // Number search full/partial
    if(ch && !(x.challanNo||"").toLowerCase().includes(ch.toLowerCase())) return false;
    if(gp && !(x.gatePassNo||"").toLowerCase().includes(gp.toLowerCase())) return false;

    if(mcd!=="All" && x.mcd!==mcd) return false;

    if(company!=="All"){
      if(company==="OTHER FACTORY"){
        if(x.companyType!=="OTHER FACTORY") return false;
      }else{
        if((x.company||"").toUpperCase()!==company.toUpperCase()) return false;
      }
    }

    if(toCompany!=="All"){
      if(toCompany==="OTHER FACTORY"){
        if(x.toCompanyType!=="OTHER FACTORY") return false;
      }else{
        if((x.toCompany||"").toUpperCase()!==toCompany.toUpperCase()) return false;
      }
    }

    return true;
  });
}

function blankRows(rows,count){
  let arr=[...rows];
  while(arr.length<count) arr.push({});
  return arr;
}

window.showReport=async function(){

  $("reportArea").innerHTML=currentList.map((x,i)=>renderSet(x,i)).join("");

};
