<!DOCTYPE html>
<html>
<head>
<title>GMS Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#07111f;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* WELCOME SCREEN */

#welcomeScreen{
position:fixed;
inset:0;
z-index:9999;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at top,
#163257,
#07111f 60%);
}

#lottieWalker{
width:260px;
height:260px;
}

#welcomeScreen h1{
font-size:34px;
font-weight:700;
text-align:center;

background:linear-gradient(
90deg,
#60a5fa,
#22c55e
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* LOGIN BOX */

.box{
width:90%;
max-width:420px;

padding:28px;

border-radius:24px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 8px 30px rgba(0,0,0,.35);

opacity:0;

animation:showBox .8s ease forwards;
}

@keyframes showBox{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:80px;
}

.logo h2{
margin-top:10px;
color:#fff;
}

.logo p{
color:#9fb0c7;
}

/* INPUT */

label{
display:block;
margin-bottom:6px;
color:#fff;
font-weight:bold;
}

input{
width:100%;

padding:14px;

margin-bottom:15px;

border-radius:12px;

border:1px solid rgba(255,255,255,.08);

background:rgba(255,255,255,.04);

color:white;

font-size:16px;

transition:.3s;
}

input:focus{
outline:none;

border-color:#22c55e;

box-shadow:
0 0 20px rgba(34,197,94,.35);

transform:translateY(-2px);
}

/* BUTTON */

button{
width:100%;

padding:15px;

border:none;

border-radius:999px;

font-size:18px;
font-weight:700;

cursor:pointer;

position:relative;

overflow:hidden;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.12);

color:#fff;

box-shadow:
0 4px 12px rgba(0,0,0,.25),
inset 0 1px 1px rgba(255,255,255,.2);

transition:.3s;
}

button:hover{
transform:translateY(-2px);
}

button::before{
content:"";

position:absolute;

top:0;
left:-100%;

width:100%;
height:100%;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.35),
transparent
);

transition:.8s;
}

button:hover::before{
left:100%;
}

/* MESSAGE */

.msg{
text-align:center;
font-weight:bold;
margin-top:15px;
min-height:30px;
}

/* FOOTER */

.footer{
margin-top:20px;
text-align:center;
font-size:12px;
color:#9fb0c7;
}

@keyframes pop{
0%{
transform:scale(.5);
opacity:0;
}
100%{
transform:scale(1);
opacity:1;
}
}

</style>
</head>
<body>

<!-- WELCOME SCREEN -->

<div id="welcomeScreen">

<div id="lottieWalker"></div>

<h1>Welcome To GMS MCD SYSTEM</h1>

</div>

<!-- LOGIN BOX -->

<div class="box" id="loginBox">

<div class="logo">

<img src="logo.png"
onerror="this.style.display='none'">

<h2>GMS MCD SYSTEM</h2>

<p>Secure Login Portal</p>

</div>

<label>Email</label>

<input
id="email"
placeholder="Enter email">

<label>Password</label>

<input
id="password"
type="password"
placeholder="Enter password">

<button onclick="login()">
🔐 LOGIN
</button>

<div
id="msg"
class="msg">
</div>

<div class="footer">
Powered by JOHURUL
</div>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from
"https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
authDomain:"gms-warehouse-tracker-7f57e.firebaseapp.com",
projectId:"gms-warehouse-tracker-7f57e",
storageBucket:"gms-warehouse-tracker-7f57e.firebasestorage.app",
messagingSenderId:"992250313291",
appId:"1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

/* LOTTIE */

lottie.loadAnimation({
container:
document.getElementById(
"lottieWalker"
),

renderer:"svg",

loop:true,

autoplay:true,

path:
"https://assets5.lottiefiles.com/packages/lf20_tijmpw.json"
});

/* WELCOME SCREEN */

window.addEventListener(
"load",
()=>{

setTimeout(()=>{

const ws=
document.getElementById(
"welcomeScreen"
);

ws.style.transition="1s";

ws.style.opacity="0";

setTimeout(()=>{
ws.remove();
},1000);

},4000);

}
);

/* LOGIN */

window.login=
async function(){

let email=
document.getElementById(
"email"
).value.trim();

let password=
document.getElementById(
"password"
).value.trim();

let msg=
document.getElementById(
"msg"
);

msg.innerHTML="";

if(
!email ||
!password
){
msg.style.color="#ef4444";
msg.innerHTML=
"Email & Password dao";
return;
}

try{

let snap=
await getDocs(
collection(
db,
"users"
)
);

let found=null;

let id="";

snap.forEach(d=>{

let u=d.data();

if(
String(
u.email||""
)
.trim()
.toLowerCase()
===
email.toLowerCase()

&&

String(
u.password||""
)
.trim()
===
password
){
found=u;
id=d.id;
}

});

if(!found){

msg.style.color="#ef4444";

msg.innerHTML=
"❌ Login Failed";

return;

}

found.id=id;

localStorage.setItem(
"gmsUser",
JSON.stringify(found)
);

document.querySelector(
".box"
).innerHTML=
`
<div style="
padding:40px;
text-align:center;
animation:pop .6s ease;
">

<h1>
🎉 Welcome
</h1>

<br>

<h2>
${found.name || found.email}
</h2>

</div>
`;

setTimeout(()=>{

location.href=
"index.html";

},2000);

}
catch(e){

console.log(e);

msg.style.color="#ef4444";

msg.innerHTML=
"Firebase Problem";

}

}

</script>

</body>
</html>
