<!DOCTYPE html>
<html>
<head>
<title>GMS Login</title>

<style>
:root{
  --bg:#07111f;
  --card:#101b2d;
  --card2:#14233a;
  --text:#ffffff;
  --muted:#9fb0c7;
  --border:#263855;
  --blue:#2563eb;
  --green:#22c55e;
}

body{
  margin:0;
  background:linear-gradient(135deg,#07111f,#0f172a);
  font-family:Segoe UI,Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.loginBox{
  width:360px;
  background:linear-gradient(135deg,var(--card),var(--card2));
  border:1px solid var(--border);
  border-radius:22px;
  padding:30px;
  box-shadow:0 15px 35px rgba(0,0,0,.35);
}

.logoArea{
  text-align:center;
  margin-bottom:20px;
}

.logoArea img{
  width:90px;
  height:90px;
  object-fit:contain;
  margin-bottom:10px;
}

.logoTitle{
  font-size:24px;
  font-weight:900;
}

.sub{
  color:var(--muted);
  font-size:12px;
  margin-top:4px;
}

.inputBox{
  margin-top:15px;
}

.inputBox label{
  display:block;
  margin-bottom:6px;
  color:#cbd5e1;
  font-size:13px;
  font-weight:800;
}

.inputBox input{
  width:100%;
  padding:13px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#0b1220;
  color:white;
  font-size:15px;
  box-sizing:border-box;
}

.loginBtn{
  width:100%;
  margin-top:22px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#2563eb,#22c55e);
  color:white;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
}

.loginBtn:hover{
  opacity:.92;
}

.demo{
  margin-top:18px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:12px;
  font-size:12px;
  color:#cbd5e1;
  line-height:1.6;
}

.footer{
  text-align:center;
  margin-top:18px;
  font-size:11px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="loginBox">

  <div class="logoArea">
    <img src="logo.png" onerror="this.style.display='none'">

    <div class="logoTitle">
      GMS MCD SYSTEM
    </div>

    <div class="sub">
      Secure Login Portal
    </div>
  </div>

  <div class="inputBox">
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter email">
  </div>

  <div class="inputBox">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password">
  </div>

  <button class="loginBtn" onclick="login()">
    🔐 LOGIN
  </button>

  <div class="demo">
    👑 Admin Example<br>
    Email: admin@gms.com<br>
    Password: 123456
  </div>

  <div class="footer">
    Powered by JOHURUL
  </div>

</div>

<script>
function login(){

  let email=document.getElementById("email").value;
  let password=document.getElementById("password").value;

  if(email==="admin@gms.com" && password==="123456"){
    
    localStorage.setItem("gmsUser","admin");

    alert("Admin Login Success");

    window.location.href="index.html";

  }else{

    alert("Wrong Email or Password");

  }
}
</script>

</body>
</html>
