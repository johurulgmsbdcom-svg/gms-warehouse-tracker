<!DOCTYPE html>
<html>
<head>
<title>GMS Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#07111f;color:white;font-family:Arial;display:flex;justify-content:center;align-items:center;min-height:100vh}
.box{width:90%;max-width:420px;background:#101b2d;border:1px solid #263855;border-radius:18px;padding:28px}
.logo{text-align:center}.logo img{width:80px}.logo h2{margin:8px 0}.logo p{color:#9fb0c7}
label{font-weight:bold;font-size:14px}
input{width:100%;padding:14px;margin:8px 0 16px;border-radius:10px;border:1px solid #334155;background:#07111f;color:white;font-size:16px;box-sizing:border-box}
button{width:100%;padding:15px;border:0;border-radius:12px;background:linear-gradient(135deg,#2563eb,#22c55e);color:white;font-size:18px;font-weight:bold}
.msg{text-align:center;color:#ef4444;font-weight:bold;margin-top:12px}
.footer{text-align:center;color:#9fb0c7;font-size:12px;margin-top:25px}
</style>
</head>
<body>

<div class="box">
  <div class="logo">
    <img src="logo.png" onerror="this.style.display='none'">
    <h2>GMS MCD SYSTEM</h2>
    <p>Secure Login Portal</p>
  </div>

  <label>Email</label>
  <input id="email" placeholder="Enter email">

  <label>Password</label>
  <input id="password" type="password" placeholder="Enter password">

  <button onclick="login()">🔐 LOGIN</button>

  <div id="msg" class="msg"></div>

  <div class="footer">Powered by JOHURUL</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
  authDomain:"gms-warehouse-tracker-7f57e.firebaseapp.com",
  projectId:"gms-warehouse-tracker-7f57e",
  storageBucket:"gms-warehouse-tracker-7f57e.firebasestorage.app",
  messagingSenderId:"992250313291",
  appId:"1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

window.login=async function(){
  let email=document.getElementById("email").value.trim();
  let password=document.getElementById("password").value.trim();
  let msg=document.getElementById("msg");

  msg.innerText="";

  if(!email || !password){
    msg.innerText="Email & Password dao";
    return;
  }

  try{
    let snap=await getDocs(collection(db,"users"));
    let found=null;
    let id="";

    snap.forEach(d=>{
      let u=d.data();
      if(String(u.email||"").trim().toLowerCase()===email.toLowerCase()
         && String(u.password||"").trim()===password){
        found=u;
        id=d.id;
      }
    });

    if(!found){
      msg.innerText="Login failed";
      return;
    }

    found.id=id;
    localStorage.setItem("gmsUser",JSON.stringify(found));
    location.href="index.html";

  }catch(e){
    console.log(e);
    msg.innerText="Firebase problem";
  }
}
</script>

</body>
</html>
