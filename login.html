<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
  authDomain: "gms-warehouse-tracker-7f57e.firebaseapp.com",
  projectId: "gms-warehouse-tracker-7f57e",
  storageBucket: "gms-warehouse-tracker-7f57e.firebasestorage.app",
  messagingSenderId: "992250313291",
  appId: "1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login = async function(){

  let email=document.getElementById("email").value.trim();
  let password=document.getElementById("password").value.trim();

  const snap = await getDocs(collection(db,"users"));

  let found=false;

  snap.forEach(doc=>{

    let u=doc.data();

    if(u.email===email && u.password===password){

      found=true;

      localStorage.setItem("gmsUser",JSON.stringify(u));

      alert("Login Success ✅");

      // ADMIN
      if(u.role==="admin"){

        window.location.href="admin.html";

      }

      // FULL ACCESS USER
      else if(u.role==="full"){

        window.location.href="index.html";

      }

      // NORMAL USER
      else{

        localStorage.setItem("userMCD",u.mcd);

        window.location.href="index.html";

      }

    }

  });

  if(!found){

    alert("Wrong Email or Password ❌");

  }

}

</script>
