<!DOCTYPE html>
<html>
<head>
<title>GMS Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial,sans-serif;
  background:#07111f;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:15px;
}

.loginBox{
  width:100%;
  max-width:420px;
  background:#101b2d;
  border:1px solid #263855;
  border-radius:18px;
  padding:25px;
  box-shadow:0 0 20px rgba(0,0,0,.4);
}

.logo{
  text-align:center;
  margin-bottom:20px;
}

.logo h1{
  font-size:28px;
  margin-bottom:5px;
}

.logo p{
  color:#9fb0c7;
  font-size:14px;
}

.inputBox{
  margin-bottom:16px;
}

.inputBox label{
  display:block;
  margin-bottom:6px;
  font-weight:bold;
  color:#cbd5e1;
}

.inputBox input{
  width:100%;
  padding:13px;
  border-radius:10px;
  border:1px solid #334155;
  background:#0f172a;
  color:white;
  font-size:16px;
  outline:none;
}

.inputBox input:focus{
  border-color:#2563eb;
}

.loginBtn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-size:17px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.loginBtn:hover{
  background:#1d4ed8;
}

.msg{
  margin-top:14px;
  text-align:center;
  font-weight:bold;
  color:#ef4444;
}

.footer{
  margin-top:18px;
  text-align:center;
  color:#94a3b8;
  font-size:12px;
}
</style>
</head>

<body>

<div class="loginBox">

  <div class="logo">
    <h1>GMS Dashboard</h1>
    <p>Warehouse & Inventory Management System</p>
  </div>

  <div class="inputBox">
    <label>User ID / Email</label>
    <input type="email" id="email" placeholder="Enter Email">
  </div>

  <div class="inputBox">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter Password">
  </div>

  <button class="loginBtn" onclick="login()">🔐 Login</button>

  <div class="msg" id="msg"></div>

  <div class="footer">
    © GMS Textiles Ltd.
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
  authDomain:"gms-warehouse-tracker-7f57e.firebaseapp.com",
  projectId:"gms-warehouse-tracker-7f57e",
  storageBucket:"gms-warehouse-tracker-7f57e.firebasestorage.app",
  messagingSenderId:"992250313291",
  appId:"1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

window.login=async function(){

  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value.trim();
  const msg=document.getElementById("msg");

  msg.innerText="";

  if(!email || !password){
    msg.innerText="Enter email & password";
    return;
  }

  try{

    const userCredential=await signInWithEmailAndPassword(auth,email,password);

    const uid=userCredential.user.uid;

    let userData={
      uid:uid,
      email:email
    };

    try{
      const userRef=doc(db,"users",uid);
      const userSnap=await getDoc(userRef);

      if(userSnap.exists()){
        userData={
          uid:uid,
          ...userSnap.data()
        };
      }
    }catch(e){
      console.log(e);
    }

    localStorage.setItem("gmsUser",JSON.stringify(userData));

    location.href="index.html";

  }catch(error){

    console.log(error);

    if(error.code==="auth/user-not-found"){
      msg.innerText="User not found";
    }
    else if(error.code==="auth/wrong-password"){
      msg.innerText="Wrong password";
    }
    else if(error.code==="auth/invalid-email"){
      msg.innerText="Invalid email";
    }
    else{
      msg.innerText="Login failed";
    }
  }
}
</script>

</body>
</html>
