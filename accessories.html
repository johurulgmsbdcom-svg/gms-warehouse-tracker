<!DOCTYPE html>
<html>
<head>
<title>Accessories Stock</title>

<style>
body{margin:0;background:#0b0f19;color:white;font-family:Arial}
.box{padding:20px}
h2,h3{text-align:center}
table{width:100%;border-collapse:collapse;margin-top:15px;background:white;color:black}
th,td{border:1px solid #000;padding:8px;text-align:center}
input{width:90%;padding:6px;text-align:center}
button{padding:10px 20px;background:#2563eb;color:white;border:0;border-radius:6px;margin:5px}
.total{background:#92d050;font-weight:bold}
</style>

</head>

<body>
<div class="box">

<h2>GMS TEXTILES LTD</h2>
<h3>Accessories (MCD)</h3>
<h3>Daily Accessories Stock</h3>

Date:
<input type="date" id="date">
<button onclick="saveData()">Save</button>
<button onclick="loadData()">Load</button>

<table id="table">
<thead>
<tr>
<th>Item</th>
<th>Unit</th>
<th>Previous</th>
<th>Receive</th>
<th>Delivery</th>
<th>Present</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

<tfoot>
<tr class="total">
<td colspan="2">TOTAL</td>
<td id="tPrev">0</td>
<td id="tRec">0</td>
<td id="tDel">0</td>
<td id="tPres">0</td>
</tr>
</tfoot>
</table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
  authDomain: "gms-warehouse-tracker-7f57e.firebaseapp.com",
  projectId: "gms-warehouse-tracker-7f57e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const items = [
  {name:"Sewing Thread", unit:"Cone", opening:133322},
  {name:"Twill Tape", unit:"Yds", opening:171255},
  {name:"Accessories With Sample", unit:"Pcs", opening:171255}
];

function render(){
  let html="";
  items.forEach((it,i)=>{
    html+=`
    <tr>
      <td>${it.name}</td>
      <td>${it.unit}</td>
      <td id="p${i}">${it.opening}</td>
      <td><input id="r${i}" oninput="calc()"></td>
      <td><input id="d${i}" oninput="calc()"></td>
      <td id="b${i}">${it.opening}</td>
    </tr>`;
  });
  document.getElementById("tbody").innerHTML=html;
}

function calc(){
  let tp=0,tr=0,td=0,tb=0;

  items.forEach((it,i)=>{
    let p=Number(document.getElementById("p"+i).innerText);
    let r=Number(document.getElementById("r"+i).value)||0;
    let d=Number(document.getElementById("d"+i).value)||0;
    let b=p+r-d;

    document.getElementById("b"+i).innerText=b;

    tp+=p; tr+=r; td+=d; tb+=b;
  });

  tPrev.innerText=tp;
  tRec.innerText=tr;
  tDel.innerText=td;
  tPres.innerText=tb;
}

async function saveData(){
  let date=document.getElementById("date").value;

  let data=[];
  items.forEach((it,i)=>{
    data.push({
      r:Number(document.getElementById("r"+i).value)||0,
      d:Number(document.getElementById("d"+i).value)||0
    });
  });

  await setDoc(doc(db,"accessories",date),{items:data});
  alert("Saved");
}

async function loadData(){
  let date=document.getElementById("date").value;

  let snap=await getDoc(doc(db,"accessories",date));

  if(snap.exists()){
    let data=snap.data().items;

    data.forEach((it,i)=>{
      document.getElementById("r"+i).value=it.r;
      document.getElementById("d"+i).value=it.d;
    });

    calc();
  }
}

window.calc=calc;

render();
</script>

</body>
</html>
