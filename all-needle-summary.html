<!DOCTYPE html>
<html>
<head>
<title>All Needle Summary</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<style>
body{margin:0;background:#07111f;color:white;font-family:Arial,sans-serif}
.header{text-align:center;padding:12px}
.header h2,.header h3{margin:4px}
.controls{text-align:center;margin:10px}
button{padding:10px 14px;border:0;border-radius:8px;color:white;font-weight:bold;margin:4px;cursor:pointer}
.show{background:#2563eb}.excel{background:#16a34a}.print{background:#7c3aed}.home{background:#0f766e}
input,select{font-size:16px;padding:8px;border-radius:6px;border:1px solid #999}
.kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px}
.kpiBox{background:#101b2d;border:1px solid #263855;border-radius:14px;padding:12px;text-align:center}
.kpiBox span{font-size:12px;color:#9fb0c7;font-weight:bold}
.kpiBox b{display:block;color:#22c55e;font-size:24px;margin-top:5px}
.tableWrap{overflow-x:auto;width:100%}
table{min-width:900px;width:98%;margin:10px auto;border-collapse:collapse;background:white;color:black;font-size:12px}
th,td{border:1px solid #000;padding:6px;text-align:center}
th{background:#9fc5e8;font-weight:bold}
.totalRow{background:#d9ead3;font-weight:bold}
.grandRow{background:#ffe599;font-weight:bold;font-size:15px}
@page{size:A4 landscape;margin:5mm}
@media print{
  body{background:white;color:black}
  .controls,.kpi,.noPrint{display:none!important}
  .header h2{font-size:16px}
  .header h3{font-size:12px}
  table{width:100%;min-width:0;font-size:9px;margin:2px 0}
  th,td{padding:3px}
}
@media(max-width:700px){.kpi{grid-template-columns:1fr}}
</style>
</head>

<body>

<div class="header">
  <h2>GMS Textiles Ltd</h2>
  <h3>All Needle Summary Report</h3>
</div>

<div class="controls noPrint">
  From: <input type="date" id="fromDate">
  To: <input type="date" id="toDate">
  Month: <input type="month" id="monthInput">

  <button class="show" onclick="setMonthRange()">📅 Month Load</button>
  <button class="show" onclick="loadSummary()">🔍 Show</button>
  <button class="excel" onclick="exportExcel()">📊 Excel</button>
  <button class="print" onclick="window.print()">🖨 PDF / Print</button>
  <button class="home" onclick="location.href='needle.html'">🪡 Entry</button>
  <button class="home" onclick="location.href='index.html'">🏠 Home</button>
</div>

<div class="kpi">
  <div class="kpiBox"><span>📥 Total Receive</span><b id="kpiReceive">0</b></div>
  <div class="kpiBox"><span>📤 Total Delivery</span><b id="kpiDelivery">0</b></div>
  <div class="kpiBox"><span>📦 Present Stock</span><b id="kpiPresent">0</b></div>
</div>

<div class="tableWrap">
<table id="summaryTable">
<thead>
<tr>
  <th>SL</th>
  <th>Needle Type</th>
  <th>Size</th>
  <th>Total Receive</th>
  <th>Total Delivery</th>
  <th>Present Stock</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
<tfoot>
<tr class="grandRow">
  <td colspan="3">Grand Total</td>
  <td id="gtReceive">0</td>
  <td id="gtDelivery">0</td>
  <td id="gtPresent">0</td>
</tr>
</tfoot>
</table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
  authDomain:"gms-warehouse-tracker-7f57e.firebaseapp.com",
  projectId:"gms-warehouse-tracker-7f57e",
  storageBucket:"gms-warehouse-tracker-7f57e.firebasestorage.app",
  messagingSenderId:"992250313291",
  appId:"1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

function today(){return new Date().toISOString().slice(0,10)}
function ym(){return new Date().toISOString().slice(0,7)}
function n(v){return Number(v)||0}

document.getElementById("fromDate").value=today();
document.getElementById("toDate").value=today();
document.getElementById("monthInput").value=ym();

window.setMonthRange=function(){
  let m=document.getElementById("monthInput").value;
  if(!m){alert("Month select koro");return;}

  let first=m+"-01";
  let d=new Date(first);
  let last=new Date(d.getFullYear(),d.getMonth()+1,0).toISOString().slice(0,10);

  document.getElementById("fromDate").value=first;
  document.getElementById("toDate").value=last;

  loadSummary();
};

async function loadSummary(){
  let from=document.getElementById("fromDate").value;
  let to=document.getElementById("toDate").value;

  let snap=await getDocs(collection(db,"dailyPosting"));
  let map={};

  snap.forEach(d=>{
    let data=d.data();
    if(!data.date || !Array.isArray(data.rows)) return;
    if(from && data.date<from) return;
    if(to && data.date>to) return;

    data.rows.forEach(row=>{
      let needleType=row.needleType || "";
      let size=row.size || "";
      let key=needleType+"___"+size;

      if(!map[key]){
        map[key]={
          needleType:needleType,
          size:size,
          receive:0,
          delivery:0,
          presentByFloor:{},
          lastDateByFloor:{}
        };
      }

      map[key].receive += n(row.receive);
      map[key].delivery += n(row.delivery);

      let floor=data.floor || "";
      let date=data.date || "";

      if(!map[key].lastDateByFloor[floor] || date>=map[key].lastDateByFloor[floor]){
        map[key].presentByFloor[floor]=n(row.present);
        map[key].lastDateByFloor[floor]=date;
      }
    });
  });

  let rows=Object.values(map).map(r=>{
    let present=0;
    Object.values(r.presentByFloor).forEach(v=>present+=n(v));
    return {...r,present};
  }).sort((a,b)=>{
    let x=(a.needleType+a.size).localeCompare(b.needleType+b.size);
    return x;
  });

  let html="";
  let gtReceive=0,gtDelivery=0,gtPresent=0;

  rows.forEach((r,i)=>{
    gtReceive+=n(r.receive);
    gtDelivery+=n(r.delivery);
    gtPresent+=n(r.present);

    html+=`
    <tr>
      <td>${i+1}</td>
      <td>${r.needleType}</td>
      <td>${r.size}</td>
      <td>${r.receive}</td>
      <td>${r.delivery}</td>
      <td>${r.present}</td>
    </tr>`;
  });

  document.getElementById("tbody").innerHTML=html || `<tr><td colspan="6">No Data Found</td></tr>`;

  document.getElementById("gtReceive").innerText=gtReceive;
  document.getElementById("gtDelivery").innerText=gtDelivery;
  document.getElementById("gtPresent").innerText=gtPresent;

  document.getElementById("kpiReceive").innerText=gtReceive;
  document.getElementById("kpiDelivery").innerText=gtDelivery;
  document.getElementById("kpiPresent").innerText=gtPresent;
}

window.loadSummary=loadSummary;

window.exportExcel=function(){
  let table=document.getElementById("summaryTable").outerHTML;

  let file=new Blob([`
    <html><head><meta charset="UTF-8"></head>
    <body>
      <h2>GMS Textiles Ltd</h2>
      <h3>All Needle Summary Report</h3>
      ${table}
    </body></html>
  `],{type:"application/vnd.ms-excel"});

  let a=document.createElement("a");
  a.href=URL.createObjectURL(file);
  a.download="all-needle-summary-report.xls";
  a.click();
};

loadSummary();
</script>

</body>
</html>
