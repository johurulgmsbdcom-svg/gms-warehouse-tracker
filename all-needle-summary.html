<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>All Needle Summary</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  background:#07111f;
  color:#fff;
  font-family:"Segoe UI Emoji","Apple Color Emoji","Segoe UI",Arial,sans-serif;
}
.header{
  text-align:center;
  padding:14px 8px;
}
.header h1,.header h2,.header h3{
  margin:3px;
}
.controls{
  text-align:center;
  margin:10px;
}
input,select{
  padding:9px;
  border-radius:7px;
  border:1px solid #999;
  font-weight:bold;
}
button{
  padding:10px 16px;
  border:0;
  border-radius:8px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  margin:4px;
}
.show{background:#2563eb}
.excel{background:#16a34a}
.print{background:#7c3aed}
.home{background:#0f766e}

.cardGrid{
  width:96%;
  margin:10px auto;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}
.card{
  background:linear-gradient(135deg,#12213a,#17294a);
  border:1px solid #30415f;
  border-radius:16px;
  padding:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.25);
}
.card .label{
  color:#9fb0c7;
  font-weight:900;
  font-size:13px;
}
.card .value{
  color:#22c55e;
  font-size:28px;
  font-weight:1000;
  margin-top:5px;
}

.reportBox{
  width:96%;
  margin:12px auto;
  background:#fff;
  color:#000;
  border-radius:8px;
  overflow:hidden;
}
.reportTitle{
  text-align:center;
  padding:10px;
  font-weight:900;
  font-size:20px;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}
th,td{
  border:1px solid #000;
  padding:7px;
  text-align:center;
  font-weight:700;
}
th{
  background:#b8cbe0;
}
.totalRow{
  background:#eaf2df;
  font-weight:900;
  font-size:15px;
}
.chartBox{
  width:96%;
  height:330px;
  margin:12px auto;
  background:#fff;
  color:#000;
  border-radius:12px;
  padding:12px;
}
@media(max-width:800px){
  .cardGrid{grid-template-columns:1fr}
  table{font-size:10px}
  th,td{padding:4px}
}
@page{
  size:A4 landscape;
  margin:7mm;
}
@media print{
  body{background:#fff;color:#000}
  .controls,.cardGrid,.chartBox{display:none!important}
  .reportBox{width:100%;margin:0;border-radius:0}
  table{font-size:11px}
}
</style>
</head>

<body>

<div class="header">
  <h1>GMS Textiles Ltd</h1>
  <h3>Tansutrapur, Kaliakoir, Gazipur</h3>
  <h2>All Needle Summary</h2>
</div>

<div class="controls">
  From: <input type="date" id="fromDate">
  To: <input type="date" id="toDate">
  <button class="show" onclick="loadSummary()">🔍 Show Report</button>
  <button class="excel" onclick="exportExcel()">📊 Excel</button>
  <button class="print" onclick="window.print()">🖨 PDF / Print</button>
  <button class="home" onclick="location.href='index.html'">🏠 Home</button>
</div>

<div class="cardGrid">
  <div class="card"><div class="label">Previous Qty</div><div class="value" id="kPrev">0</div></div>
  <div class="card"><div class="label">Receive Qty</div><div class="value" id="kReceive">0</div></div>
  <div class="card"><div class="label">Delivery Qty</div><div class="value" id="kDelivery">0</div></div>
  <div class="card"><div class="label">Present Stock</div><div class="value" id="kPresent">0</div></div>
</div>

<div class="reportBox" id="reportBox">
  <div class="reportTitle" id="reportTitle">All Needle Summary</div>
  <table id="summaryTable">
    <thead>
      <tr>
        <th>SL</th>
        <th>Floor Name</th>
        <th>Previous Qty</th>
        <th>Receive Qty</th>
        <th>Delivery Qty</th>
        <th>Present Stock</th>
        <th>Remarks</th>
      </tr>
    </thead>
    <tbody id="summaryBody"></tbody>
    <tfoot>
      <tr class="totalRow">
        <td colspan="2">Grand Total</td>
        <td id="tPrev">0</td>
        <td id="tReceive">0</td>
        <td id="tDelivery">0</td>
        <td id="tPresent">0</td>
        <td></td>
      </tr>
    </tfoot>
  </table>
</div>

<div class="chartBox">
  <canvas id="summaryChart"></canvas>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
  authDomain:"gms-warehouse-tracker-7f57e.firebaseapp.com",
  projectId:"gms-warehouse-tracker-7f57e",
  storageBucket:"gms-warehouse-tracker-7f57e.firebasestorage.app",
  messagingSenderId:"992250313291",
  appId:"1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const FLOORS=[
  "Shapla R","Shapla N",
  "Poddo R","Poddo N",
  "Sample R","Sample N",
  "Kadom R","Kadom N",
  "Belly R","Belly N",
  "EMBROIDERY R","EMBROIDERY N"
];

let chart=null;

function today(){
  return new Date().toISOString().slice(0,10);
}

function fmt(n){
  return Number(n||0).toLocaleString("en-US");
}

function n(v){
  return Number(v)||0;
}

function setDefaultDate(){
  let d=today();
  if(!document.getElementById("fromDate").value) document.getElementById("fromDate").value=d;
  if(!document.getElementById("toDate").value) document.getElementById("toDate").value=d;
}

function getFloorName(data){
  return data.floor || data.floorName || data.productionFloor || data.name || "";
}

function getDate(data){
  return data.date || data.postingDate || data.entryDate || (data.createdAt||"").slice(0,10) || "";
}

function readRows(data){
  if(Array.isArray(data.rows)) return data.rows;
  if(Array.isArray(data.items)) return data.items;
  return [];
}

window.loadSummary=async function(){
  setDefaultDate();

  let from=document.getElementById("fromDate").value;
  let to=document.getElementById("toDate").value;

  let map={};
  FLOORS.forEach(f=>{
    map[f]={floor:f,previous:0,receive:0,delivery:0,present:0};
  });

  let snap=await getDocs(collection(db,"dailyPosting"));

  snap.forEach(docSnap=>{
    let data=docSnap.data();
    let date=getDate(data);
    if(from && date<from) return;
    if(to && date>to) return;

    let floor=getFloorName(data);
    if(!floor) return;

    if(!map[floor]){
      map[floor]={floor:floor,previous:0,receive:0,delivery:0,present:0};
    }

    let rows=readRows(data);

    if(rows.length){
      rows.forEach(r=>{
        map[floor].previous += n(r.previous) || n(r.previousQty) || n(r.prev);
        map[floor].receive += n(r.receive) || n(r.receiveQty) || n(r.received);
        map[floor].delivery += n(r.delivery) || n(r.deliveryQty) || n(r.issue);
        map[floor].present += n(r.present) || n(r.presentStock) || n(r.stock);
      });
    }else{
      map[floor].previous += n(data.previous) || n(data.previousQty);
      map[floor].receive += n(data.receive) || n(data.receiveQty);
      map[floor].delivery += n(data.delivery) || n(data.deliveryQty);
      map[floor].present += n(data.present) || n(data.presentStock);
    }
  });

  let arr=Object.values(map).filter(x=>x.previous||x.receive||x.delivery||x.present||FLOORS.includes(x.floor));

  let totalPrev=0,totalReceive=0,totalDelivery=0,totalPresent=0;

  let html="";
  arr.forEach((x,i)=>{
    totalPrev+=x.previous;
    totalReceive+=x.receive;
    totalDelivery+=x.delivery;
    totalPresent+=x.present;

    html+=`
      <tr>
        <td>${i+1}</td>
        <td>${x.floor}</td>
        <td>${fmt(x.previous)}</td>
        <td>${fmt(x.receive)}</td>
        <td>${fmt(x.delivery)}</td>
        <td>${fmt(x.present)}</td>
        <td></td>
      </tr>
    `;
  });

  document.getElementById("summaryBody").innerHTML=html;
  document.getElementById("tPrev").innerText=fmt(totalPrev);
  document.getElementById("tReceive").innerText=fmt(totalReceive);
  document.getElementById("tDelivery").innerText=fmt(totalDelivery);
  document.getElementById("tPresent").innerText=fmt(totalPresent);

  document.getElementById("kPrev").innerText=fmt(totalPrev);
  document.getElementById("kReceive").innerText=fmt(totalReceive);
  document.getElementById("kDelivery").innerText=fmt(totalDelivery);
  document.getElementById("kPresent").innerText=fmt(totalPresent);

  document.getElementById("reportTitle").innerText=`All Needle Summary From ${from} To ${to}`;

  drawChart(arr);
};

function drawChart(arr){
  let labels=arr.map(x=>x.floor);
  let data=arr.map(x=>x.present);

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("summaryChart"),{
    type:"bar",
    data:{
      labels:labels,
      datasets:[{
        label:"Present Stock",
        data:data,
        backgroundColor:[
          "#38bdf8","#22c55e","#f59e0b","#a855f7","#ef4444","#14b8a6",
          "#eab308","#6366f1","#ec4899","#84cc16","#06b6d4","#f97316"
        ],
        borderRadius:8
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{display:false}
      },
      scales:{
        y:{beginAtZero:true},
        x:{ticks:{font:{weight:"bold"}}}
      }
    }
  });
}

window.exportExcel=function(){
  let html=document.getElementById("reportBox").innerHTML;
  let file=new Blob([html],{type:"application/vnd.ms-excel"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(file);
  a.download="all-needle-summary.xls";
  a.click();
};

setDefaultDate();
loadSummary();
</script>

</body>
</html>
