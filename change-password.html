<!DOCTYPE html>
<html>
<head>
<title>Change Password</title>

<style>
:root{
  --bg:#07111f;
  --card:#101b2d;
  --card2:#14233a;
  --text:#ffffff;
  --muted:#9fb0c7;
  --border:#263855;
  --blue:#2563eb;
  --green:#22c55e;
  --red:#ef4444;
}

body{
  margin:0;
  background:linear-gradient(135deg,#07111f,#0f172a);
  font-family:Segoe UI,Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:white;
}

.box{
  width:380px;
  max-width:90%;
  background:linear-gradient(135deg,var(--card),var(--card2));
  border:1px solid var(--border);
  border-radius:22px;
  padding:28px;
  box-shadow:0 15px 35px rgba(0,0,0,.35);
}

.logo{
  text-align:center;
  margin-bottom:20px;
}

.logo img{
  width:80px;
  height:80px;
  object-fit:contain;
  margin-bottom:8px;
}

.logo h2{
  margin:0;
  font-size:24px;
}

.sub{
  color:var(--muted);
  font-size:12px;
  margin-top:5px;
}

label{
  display:block;
  margin-top:14px;
  margin-bottom:6px;
  color:#cbd5e1;
  font-size:13px;
  font-weight:800;
}

input{
  width:100%;
  padding:13px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#0b1220;
  color:white;
  font-size:15px;
  box-sizing:border-box;
}

.btn{
  width:100%;
  margin-top:18px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#2563eb,#22c55e);
  color:white;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
}

.btn.red{
  background:var(--red);
}

.msg{
  margin-top:14px;
  text-align:center;
  font-size:13px;
  font-weight:800;
}

.footer{
  text-align:center;
  margin-top:16px;
  font-size:11px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="box">

  <div class="logo">
    <img src="logo.png" onerror="this.style.display='none'">
    <h2>🔐 Change Password</h2>
    <div class="sub">GMS MCD SYSTEM</div>
  </div>

  <label>Old Password</label>
  <input type="password" id="oldPass" placeholder="Old password">

  <label>New Password</label>
  <input type="password" id="newPass" placeholder="New password">

  <label>Confirm New Password</label>
  <input type="password" id="confirmPass" placeholder="Confirm password">

  <button class="btn" onclick="changePassword()">💾 Update Password</button>
  <button class="btn red" onclick="location.href='index.html'">🏠 Back Dashboard</button>

  <div id="msg" class="msg"></div>

  <div class="footer">Powered by JOHURUL</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
  getFirestore,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
  authDomain: "gms-warehouse-tracker-7f57e.firebaseapp.com",
  projectId: "gms-warehouse-tracker-7f57e",
  storageBucket: "gms-warehouse-tracker-7f57e.firebasestorage.app",
  messagingSenderId: "992250313291",
  appId: "1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const user = JSON.parse(localStorage.getItem("gmsUser") || "null");

if(!user){
  window.location.href="login.html";
}

function msg(text,color){
  let m=document.getElementById("msg");
  m.innerText=text;
  m.style.color=color;
}

window.changePassword = async function(){

  let oldPass=document.getElementById("oldPass").value.trim();
  let newPass=document.getElementById("newPass").value.trim();
  let confirmPass=document.getElementById("confirmPass").value.trim();

  if(!oldPass || !newPass || !confirmPass){
    msg("সব field পূরণ করো ❌","#fca5a5");
    return;
  }

  if(oldPass !== user.password){
    msg("Old password ভুল ❌","#fca5a5");
    return;
  }

  if(newPass.length < 4){
    msg("New password কমপক্ষে 4 digit হওয়া লাগবে ❌","#fca5a5");
    return;
  }

  if(newPass !== confirmPass){
    msg("Confirm password match করে নাই ❌","#fca5a5");
    return;
  }

  await updateDoc(doc(db,"users",user.id),{
    password:newPass,
    updatedAt:new Date().toISOString()
  });

  user.password=newPass;
  localStorage.setItem("gmsUser",JSON.stringify(user));

  msg("Password Updated Successfully ✅","#22c55e");

  setTimeout(()=>{
    window.location.href="index.html";
  },1200);
};
</script>

</body>
</html>
