<!DOCTYPE html>
<html>
<head>
<title>Needle Daily Posting</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
*{
  box-sizing:border-box;
}

html,body{
  width:100%;
  max-width:100%;
  overflow-x:hidden;
  margin:0;
  padding:0;
  background:#0f172a;
  color:white;
  font-family:Arial, sans-serif;
  touch-action:manipulation;
}

body{
  padding:4px;
}

h2{
  text-align:center;
  font-size:17px;
  margin:6px 0 8px;
}

.topControls{
  text-align:center;
  margin-bottom:8px!important;
  font-size:12px;
}

button{
  padding:7px 9px;
  border:0;
  border-radius:6px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin:2px;
  font-size:11px;
}

.deleteBtn{background:#dc2626}
.excelBtn{background:#16a34a}
.pdfBtn{background:#7c3aed}
.homeBtn{background:#2563eb}
.saveBtn{background:green}

input,select,textarea,button{
  font-size:16px; /* mobile/app focus zoom off */
}

select,
input[type="date"]{
  padding:5px;
  border-radius:5px;
  border:1px solid #999;
  max-width:150px;
}

/* full screen fit: no side scroll */
.tableWrap{
  width:100%;
  max-width:100%;
  overflow-x:hidden;
}

#reportTable{
  width:100%;
  max-width:100%;
  margin:0 auto;
  border-collapse:collapse;
  table-layout:fixed;
  background:white;
  color:black;
}

#reportTable th,
#reportTable td{
  border:1px solid #000;
  padding:1px;
  text-align:center;
  font-size:10px;
  line-height:1.08;
  white-space:nowrap;
  overflow:hidden;
}

#reportTable thead{
  background:#1e293b;
  color:white;
}

#reportTable tfoot{
  background:#334155;
  color:white;
  font-weight:bold;
}

/* column width total 100% */
.col-sl{width:6%;font-size:9px!important}
.col-type{width:22%;font-size:10px!important}
.col-size{width:8%;font-size:10px!important}
.col-prev{width:12%}
.col-rcvd{width:11%}
.col-dvld{width:11%}
.col-present{width:14%}
.col-bn{width:10%}

.qtyInput{
  width:100%;
  height:24px;
  padding:1px;
  text-align:center;
  font-size:16px; /* focus zoom off */
  font-weight:bold;
  border:1px solid #999;
  border-radius:3px;
  background:white;
  color:black;
  -webkit-text-size-adjust:100%;
}

.summaryWrap{
  width:100%;
  max-width:100%;
  overflow-x:hidden;
}

#summaryTable{
  width:100%;
  max-width:100%;
  margin:auto;
  text-align:center;
  border-collapse:collapse;
  table-layout:fixed;
  background:white;
  color:black;
}

#summaryTable th,
#summaryTable td{
  border:1px solid #000;
  padding:2px;
  font-size:10px;
}

@media(max-width:480px){
  body{padding:2px}
  h2{font-size:15px;margin:4px 0}
  .topControls{font-size:11px}

  button{
    padding:6px 7px;
    font-size:10px;
  }

  #reportTable th,
  #reportTable td{
    font-size:9px;
    padding:1px 0;
  }

  .col-sl{width:6%;font-size:8px!important}
  .col-type{width:22%;font-size:9px!important}
  .col-size{width:8%;font-size:9px!important}
  .col-prev{width:12%}
  .col-rcvd{width:11%}
  .col-dvld{width:11%}
  .col-present{width:14%}
  .col-bn{width:10%}

  .qtyInput{
    height:22px;
    font-size:16px;
  }
}

@media print{
  html,body{
    background:white!important;
    color:black!important;
    overflow:visible!important;
  }

  button,
  input[type="date"],
  select{
    display:none!important;
  }

  .tableWrap,
  .summaryWrap{
    overflow:visible!important;
  }

  #reportTable,
  #summaryTable{
    width:100%!important;
    max-width:100%!important;
    color:black!important;
    background:white!important;
  }

  #reportTable th,
  #reportTable td{
    font-size:7px;
    padding:1px;
  }
}
</style>
</head>

<body>

<h2 style="text-align:center;">Needle Daily Posting</h2>

<div class="topControls">
Date: <input type="date" id="postDate">

Floor:
<select id="floor" onchange="loadTable(); loadData();">
<option>Kadom R</option>
<option>Kadom N</option>
<option>Shapla R</option>
<option>Shapla N</option>
<option>Poddo R</option>
<option>Poddo N</option>

<br><br>
<button class="saveBtn" onclick="saveData()">💾 Save Data</button>
<button class="deleteBtn" onclick="deleteData()">Delete Data</button>
<button class="excelBtn" onclick="exportExcel()">Export Excel</button>
<button class="pdfBtn" onclick="exportPDF()">PDF / Print</button>
<button class="homeBtn" onclick="location.href='index.html'">Back Home</button>
</div>

<div class="tableWrap">
<table id="reportTable" border="1">
<thead style="background:#1e293b;">
<tr>
<th class="col-sl">SL</th>
<th class="col-type">Needle Type</th>
<th class="col-size">Size</th>
<th class="col-prev">Previous</th>

<th class="col-dvld">Dvld</th>
<th class="col-present">Present</th>
<th class="col-bn" id="bnHeader">BNR</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

<tfoot style="background:#334155;font-weight:bold;">
<tr>
<td colspan="3">TOTAL</td>
<td id="totalPrevious">0</td>
<td id="totalReceive">0</td>
<td id="totalDelivery">0</td>
<td id="totalPresent">0</td>
<td id="totalBN">0</td>
</tr>
</tfoot>
</table>
</div>

<div style="width:98%;margin:14px auto;text-align:center;">
<h3>Monthly Summary</h3>

</div>

function getItems(){
  let floor=document.getElementById("floor").value;
  return floorData[floor] || [];
}

function getMonth(date){
  return date.slice(0,7);
}

function loadTable(customPrevious=null){
  let items=getItems();
  let floor=document.getElementById("floor").value;
  let bnName = floor.includes("N") ? "BNF" : "BNR";
  document.getElementById("bnHeader").innerText = bnName;
  document.getElementById("monthBNHeader").innerText = "Total " + bnName;
  let html="";

  items.forEach((item,i)=>{
    let previous = customPrevious && customPrevious[i] !== undefined ? customPrevious[i] : item[3];
    html+=`
    <tr>
      <td class="col-sl">${item[0]}</td>
      <td class="col-type">${item[1]}</td>
      <td class="col-size">${item[2]}</td>
      <td class="col-prev" id="p${i}">${previous}</td>
      <td class="col-rcvd"><input class="qtyInput" type="number" id="r${i}" oninput="calc(${i})"></td>
      <td class="col-dvld"><input class="qtyInput" type="number" id="d${i}" oninput="calc(${i})"></td>
      <td class="col-present" id="b${i}">${previous}</td>
      <td class="col-bn"><input class="qtyInput" type="number" id="bn${i}" oninput="updateTotal()"></td>
    </tr>`;
  });

  document.getElementById("tableBody").innerHTML=html;
  updateTotal();
}

function calc(i){
  let p=Number(document.getElementById("p"+i).innerText)||0;
  let r=Number(document.getElementById("r"+i).value)||0;
  let d=Number(document.getElementById("d"+i).value)||0;
  document.getElementById("b"+i).innerText=p+r-d;
  updateTotal();
}

function updateTotal(){
  let items=getItems();
  let tp=0,tr=0,td=0,tb=0,tbn=0;

  for(let i=0;i<items.length;i++){
    tp+=Number(document.getElementById("p"+i)?.innerText)||0;
    tr+=Number(document.getElementById("r"+i)?.value)||0;
    td+=Number(document.getElementById("d"+i)?.value)||0;
    tb+=Number(document.getElementById("b"+i)?.innerText)||0;
    tbn+=Number(document.getElementById("bn"+i)?.value)||0;
  }

  document.getElementById("totalPrevious").innerText=tp;
  document.getElementById("totalReceive").innerText=tr;
  document.getElementById("totalDelivery").innerText=td;
  document.getElementById("totalPresent").innerText=tb;
  document.getElementById("totalBN").innerText=tbn;
}

async function saveData(){
  let date=document.getElementById("postDate").value;
  let floor=document.getElementById("floor").value;
  let items=getItems();

  if(!date){
    alert("Date select koro");
    return;
  }

  let rows=[];
  for(let i=0;i<items.length;i++){
    rows.push({
      sl:items[i][0],
      needleType:items[i][1],
      size:items[i][2],
      opening:Number(items[i][3])||0,
      previous:Number(document.getElementById("p"+i).innerText)||0,
      receive:Number(document.getElementById("r"+i).value)||0,
      delivery:Number(document.getElementById("d"+i).value)||0,
      present:Number(document.getElementById("b"+i).innerText)||0,
      bn:Number(document.getElementById("bn"+i).value)||0
    });
  }

  await setDoc(doc(db,"dailyPosting",floor+"_"+date),{
    date:date,
    month:getMonth(date),
    floor:floor,
    rows:rows
  });

  await loadData();
  alert("Saved Successfully");
}

async function deleteData(){
  let date=document.getElementById("postDate").value;
  let floor=document.getElementById("floor").value;

  if(!date){
    alert("Date select koro");
    return;
  }

  if(!confirm("Ei date er data delete korba?")) return;

  await deleteDoc(doc(db,"dailyPosting",floor+"_"+date));
  await loadData();
  alert("Deleted Successfully");
}

async function loadData(){
  let date=document.getElementById("postDate").value;
  let floor=document.getElementById("floor").value;
  let items=getItems();

  if(!date){
    loadTable();
    showMonthlySummary(0,0,0,0,0);
    return;
  }

  let month=getMonth(date);
  let snap=await getDocs(collection(db,"dailyPosting"));
  let monthRows=[];

  snap.forEach(docSnap=>{
    let data=docSnap.data();
    if(data.floor===floor && data.month===month && data.date<=date){
      monthRows.push(data);
    }
  });

  monthRows.sort((a,b)=>a.date.localeCompare(b.date));

  let todayData=null;
  monthRows.forEach(row=>{
    if(row.date===date) todayData=row;
  });

  let monthlyReceive=Array(items.length).fill(0);
  let monthlyDelivery=Array(items.length).fill(0);
  let monthlyBN=Array(items.length).fill(0);

  monthRows.forEach(day=>{
    if(day.rows){
      day.rows.forEach((row,i)=>{
        monthlyReceive[i]+=Number(row.receive)||0;
        monthlyDelivery[i]+=Number(row.delivery)||0;
        monthlyBN[i]+=Number(row.bn)||0;
      });
    }
  });

  let todayReceive=Array(items.length).fill(0);
  let todayDelivery=Array(items.length).fill(0);
  let todayBN=Array(items.length).fill(0);

  if(todayData && todayData.rows){
    todayData.rows.forEach((row,i)=>{
      todayReceive[i]=Number(row.receive)||0;
      todayDelivery[i]=Number(row.delivery)||0;
      todayBN[i]=Number(row.bn)||0;
    });
  }

  let previousList=[];

  for(let i=0;i<items.length;i++){
    let opening=Number(items[i][3])||0;
    let beforeReceive=monthlyReceive[i]-todayReceive[i];
    let beforeDelivery=monthlyDelivery[i]-todayDelivery[i];
    previousList[i]=opening+beforeReceive-beforeDelivery;
  }

  loadTable(previousList);

  for(let i=0;i<items.length;i++){
    document.getElementById("r"+i).value = todayReceive[i] || "";
    document.getElementById("d"+i).value = todayDelivery[i] || "";
    document.getElementById("bn"+i).value = todayBN[i] || "";
    calc(i);
  }

  updateMonthlySummary(monthlyReceive,monthlyDelivery,monthlyBN);
}

function updateMonthlySummary(monthlyReceive,monthlyDelivery,monthlyBN){
  let items=getItems();
  let opening=0, receive=0, delivery=0, present=0, bn=0;

  for(let i=0;i<items.length;i++){
    let op=Number(items[i][3])||0;
    let r=Number(monthlyReceive[i])||0;
    let d=Number(monthlyDelivery[i])||0;
    opening+=op;
    receive+=r;
    delivery+=d;
    present+=op+r-d;
    bn+=Number(monthlyBN[i])||0;
  }

  showMonthlySummary(opening,receive,delivery,present,bn);
}

function showMonthlySummary(opening,receive,delivery,present,bn){
  document.getElementById("monthOpening").innerText=opening;
  document.getElementById("monthReceive").innerText=receive;
  document.getElementById("monthDelivery").innerText=delivery;
  document.getElementById("monthPresent").innerText=present;
  document.getElementById("monthBN").innerText=bn;
}

function exportExcel(){
  let title=`
    <h2>Needle Daily Posting</h2>
    <h3>Floor: ${document.getElementById("floor").value}</h3>
    <h3>Date: ${document.getElementById("postDate").value}</h3>
  `;

  let table1=document.getElementById("reportTable").outerHTML;
  let table2=document.getElementById("summaryTable").outerHTML;

  let file=new Blob([title+table1+"<br>"+table2],{
    type:"application/vnd.ms-excel"
  });

  let a=document.createElement("a");
  a.href=URL.createObjectURL(file);
  a.download="needle-report.xls";
  a.click();
}

function exportPDF(){
  window.print();
}

document.getElementById("postDate").addEventListener("change",loadData);

window.loadTable=loadTable;
window.calc=calc;
window.updateTotal=updateTotal;
window.saveData=saveData;
window.deleteData=deleteData;
window.loadData=loadData;
window.exportExcel=exportExcel;
window.exportPDF=exportPDF;

// Enter dile same column er nicher box e jabe, Tab dile samner box e jabe
document.addEventListener("keydown", function(e){
  if(e.target.tagName !== "INPUT") return;

  // sudhu table er Receive, Delivery, BN input box er jonno
  if(!e.target.id.match(/^(r|d|bn)\d+$/)) return;

  // Tab er default kaj: samner box e jawa
  if(e.key === "Tab"){
    return;
  }

  // Enter dile same column er next row te jawa
  if(e.key === "Enter"){
    e.preventDefault();

    let col = e.target.id.replace(/[0-9]/g, "");
    let row = Number(e.target.id.replace(/\D/g, ""));
    let next = document.getElementById(col + (row + 1));

    if(next){
      next.focus();
      next.select();
    }
  }
});
