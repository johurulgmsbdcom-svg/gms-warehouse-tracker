<!DOCTYPE html>
<html>
<head>
  <title>Needle Posting</title>
</head>

<body style="background:#0f172a; color:white; font-family:Arial;">

<h2 style="text-align:center;">Needle Daily Posting</h2>
<div style="text-align:center; margin-bottom:20px;">
  <label>Date:</label>
  <input type="date">

  <label style="margin-left:20px;">Floor:</label>
  <select>
    <option>Floor 1</option>
    <option>Floor 2</option>
    <option>Floor 3</option>
    <option>Floor 4</option>
    <option>Floor 5</option>
    <option>Floor 6</option>
  </select>
</div>
<table border="1" style="width:80%; margin:auto; text-align:center;">
  <tr style="background:#1e293b;">
    <th>Needle Type</th>
    <th>Size</th>
    <th>Previous</th>
    <th>Receive</th>
    <th>Delivery</th>
    <th>Balance</th>
  </tr>

  <tr>
    <td>DBX1</td>
    <td>7</td>
    <td>13</td>
    <td><input type="number" id="r1"></td>
    <td><input type="number" id="d1"></td>
    <td id="b1">0</td>
  </tr>

  <tr>
    <td>DBX1</td>
    <td>8</td>
    <td>3</td>
    <td><input type="number" id="r2"></td>
    <td><input type="number" id="d2"></td>
    <td id="b2">0</td>
  </tr>

</table>

<br><br>

<div style="text-align:center;">
  <button onclick="calculate()">Calculate</button>
</div>

<script>
function calculate(){
  let r1 = Number(document.getElementById("r1").value) || 0;
  let d1 = Number(document.getElementById("d1").value) || 0;
  let prev1 = 13;

  document.getElementById("b1").innerText = prev1 + r1 - d1;

  let r2 = Number(document.getElementById("r2").value) || 0;
  let d2 = Number(document.getElementById("d2").value) || 0;
  let prev2 = 3;

  document.getElementById("b2").innerText = prev2 + r2 - d2;
}
</script>

</body>
</html>
