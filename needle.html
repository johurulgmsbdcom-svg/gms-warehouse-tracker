<!DOCTYPE html>
<html>
<head>
  <title>Needle Daily Posting</title>
</head>

<body style="background:#0f172a; color:white; font-family:Arial;">

<h2 style="text-align:center;">Needle Daily Posting</h2>

<div style="text-align:center; margin-bottom:20px;">
  <label>Date:</label>
  <input type="date" id="postDate" style="padding:5px;">

  <label style="margin-left:20px;">Floor:</label>
  <select id="floor" style="padding:5px;">
    <option value="Kadom R">Kadom R</option>
    <option value="Kadom N">Kadom N</option>
    <option value="Shapla R">Shapla R</option>
    <option value="Shapla N">Shapla N</option>
    <option value="Poddo R">Poddo R</option>
    <option value="Poddo N">Poddo N</option>
    <option value="Belly R">Belly R</option>
    <option value="Belly N">Belly N</option>
    <option value="Sample R">Sample R</option>
    <option value="Sample N">Sample N</option>
    <option value="EMBROIDERY R">EMBROIDERY R</option>
    <option value="EMBROIDERY N">EMBROIDERY N</option>
  </select>
</div>

<table border="1" style="width:90%; margin:auto; text-align:center; border-collapse:collapse;">
  <tr style="background:#1e293b;">
    <th>Needle Type</th>
    <th>Size</th>
    <th>Previous</th>
    <th>Receive</th>
    <th>Delivery</th>
    <th>Balance</th>
  </tr>

  <tr>
    <td>DBX1</td>
    <td>7</td>
    <td id="p1">13</td>
    <td><input type="number" id="r1" oninput="calculate()"></td>
    <td><input type="number" id="d1" oninput="calculate()"></td>
    <td id="b1">13</td>
  </tr>

  <tr>
    <td>DBX1</td>
    <td>8</td>
    <td id="p2">3</td>
    <td><input type="number" id="r2" oninput="calculate()"></td>
    <td><input type="number" id="d2" oninput="calculate()"></td>
    <td id="b2">3</td>
  </tr>

  <tr>
    <td>DBX1</td>
    <td>9</td>
    <td id="p3">20</td>
    <td><input type="number" id="r3" oninput="calculate()"></td>
    <td><input type="number" id="d3" oninput="calculate()"></td>
    <td id="b3">20</td>
  </tr>

  <tr>
    <td>DBX1-KN</td>
    <td>9</td>
    <td id="p4">51</td>
    <td><input type="number" id="r4" oninput="calculate()"></td>
    <td><input type="number" id="d4" oninput="calculate()"></td>
    <td id="b4">51</td>
  </tr>

  <tr>
    <td>DBX1-KN</td>
    <td>09PD</td>
    <td id="p5">66</td>
    <td><input type="number" id="r5" oninput="calculate()"></td>
    <td><input type="number" id="d5" oninput="calculate()"></td>
    <td id="b5">66</td>
  </tr>
</table>

<br>

<div style="text-align:center;">
  <button onclick="calculate()" style="padding:8px 18px;">Calculate</button>

  <button onclick="submitData()" style="padding:8px 18px; background:green; color:white; margin-left:10px;">
    Submit
  </button>

  <br><br>

  <button onclick="window.location.href='index.html'" style="padding:8px 18px;">
    Back Home
  </button>
</div>

<script>
function calculate(){
  for(let i = 1; i <= 5; i++){
    let previous = Number(document.getElementById("p" + i).innerText) || 0;
    let receive = Number(document.getElementById("r" + i).value) || 0;
    let delivery = Number(document.getElementById("d" + i).value) || 0;

    let balance = previous + receive - delivery;
    document.getElementById("b" + i).innerText = balance;
  }
}

function submitData(){
  let date = document.getElementById("postDate").value;
  let floor = document.getElementById("floor").value;

  if(date === ""){
    alert("Please select date");
    return;
  }

  alert("Submitted Successfully\nDate: " + date + "\nFloor: " + floor);
}
</script>

</body>
</html>
