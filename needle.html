<!DOCTYPE html>
<html>
<head>
  <title>Needle Daily Posting</title>
</head>

<body style="background:#0f172a; color:white; font-family:Arial;">

<h2 style="text-align:center;">Needle Daily Posting</h2>

<div style="text-align:center; margin-bottom:20px;">
  <label>Date:</label>
  <input type="date" id="postDate">

  <label style="margin-left:20px;">Floor:</label>
  <select id="floor">
    <option>Kadom R</option>
    <option>Kadom N</option>
    <option>Shapla R</option>
    <option>Shapla N</option>
    <option>Poddo R</option>
    <option>Poddo N</option>
    <option>Belly R</option>
    <option>Belly N</option>
    <option>Sample R</option>
    <option>Sample N</option>
    <option>EMBROIDERY R</option>
    <option>EMBROIDERY N</option>
  </select>
</div>

<table border="1" style="width:95%; margin:auto; text-align:center;">
  <thead style="background:#1e293b;">
    <tr>
      <th>Needle Type</th>
      <th>Size</th>
      <th>Previous</th>
      <th>Receive</th>
      <th>Delivery</th>
      <th>Balance</th>
    </tr>
  </thead>

  <tbody id="tableBody"></tbody>
</table>

<br>

<div style="text-align:center;">
  <button onclick="submitData()" style="padding:10px 20px; background:green; color:white;">
    Submit
  </button>
</div>

<script>

// 🔥 ALL ITEM LIST (তোমার Excel থেকে)
const items = [
["DBX1",7,25],["DBX1",8,1],["DBX1-KN",8,0],["DBX1-NS",8,0],
["DBX1",9,32],["DBX1-KN",9,0],["DBX1-NS","8LP",0],
["DBX1-SF","9B",0],["DBXK5-KK","9B",0],["DBX1",10,8],
["DBX1-KN",10,0],["DBX1",11,1],["DBX1","12SPI",0],
["DBX1",12,12],["DBX1",14,22],["DBXK5-KK","9S",0],
["DBX1","12SPD",0],["DCX1",7,23],["DCX1",8,0],
["DCX1-KN",8,1],["DCX1",9,15],["DCX1-SF","9LP",0],
["DCX1-NS",8,0],["DCX1",10,9],["DCX1",11,34],
["DCX1",12,4],["DCX1",14,0],["UYX128",7,15],
["UYX128-KN",8,7],["UYX128",9,19],["UYX128","9SPD",0],
["UYX128-KN",9,0],["UYX128-KK-KN",9,0],["UYX128-KK",7,0],
["UYX128",10,46],["UYX128-KN","10PD",0],["UY128-NY2","10SPD",0],
["UYX128",11,2],["UYX128","11SPD",0],["UYX128-KN",11,0],
["UYX128-KN","11PD",0],["UYX128",12,1],["UY128++GAS",12,0],
["UYX128",14,35],["DPX5-NS",8,0],["UY/UOX113",9,16],
["UY/UOX113",11,21],["UY/UOX113",14,30],["DVX57",12,22],
["DPX5",9,11],["DPX5","10SPD",20],["DPX5",11,10],
["DPX5","9SLP",0],["DPX5",12,17],["DPX5","12SPD",30],
["DPX5","14SPD",0],["DPX5",14,39],["DPX17",9,8],
["DPX17",11,9]
];

// 🔥 TABLE LOAD
function loadTable(){
  let html = "";
  items.forEach((item, i)=>{
    html += `
      <tr>
        <td>${item[0]}</td>
        <td>${item[1]}</td>
        <td id="p${i}">${item[2]}</td>
        <td><input type="number" id="r${i}" oninput="calc(${i})"></td>
        <td><input type="number" id="d${i}" oninput="calc(${i})"></td>
        <td id="b${i}">${item[2]}</td>
      </tr>
    `;
  });
  document.getElementById("tableBody").innerHTML = html;
}

// 🔥 CALCULATION
function calc(i){
  let p = Number(document.getElementById("p"+i).innerText) || 0;
  let r = Number(document.getElementById("r"+i).value) || 0;
  let d = Number(document.getElementById("d"+i).value) || 0;

  document.getElementById("b"+i).innerText = p + r - d;
}

// 🔥 SUBMIT (next step Firebase)
function submitData(){
  alert("Next step: Firebase save system");
}

// LOAD ON START
loadTable();

</script>

</body>
</html>
