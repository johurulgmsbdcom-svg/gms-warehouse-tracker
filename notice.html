<!DOCTYPE html>
<html>
<head>
<title>Live Notice System</title>

<style>
:root{
  --bg:#07111f;
  --card:#101b2d;
  --card2:#14233a;
  --text:#ffffff;
  --muted:#9fb0c7;
  --border:#263855;
  --blue:#2563eb;
  --green:#22c55e;
  --red:#ef4444;
  --orange:#f59e0b;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Segoe UI,Arial,sans-serif;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 22px;
  background:var(--card);
  border-bottom:1px solid var(--border);
}

.logo{
  font-size:24px;
  font-weight:900;
}

.sub{
  font-size:12px;
  color:var(--muted);
}

.btn{
  border:none;
  border-radius:12px;
  padding:12px 18px;
  background:var(--blue);
  color:white;
  font-weight:900;
  cursor:pointer;
}

.btn.red{
  background:var(--red);
}

.page{
  padding:18px;
}

.card{
  background:linear-gradient(135deg,var(--card),var(--card2));
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
}

textarea{
  width:100%;
  height:140px;
  border-radius:14px;
  border:1px solid var(--border);
  background:#0b1220;
  color:white;
  padding:14px;
  font-size:15px;
  box-sizing:border-box;
}

.noticeItem{
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  margin-top:12px;
  background:rgba(255,255,255,.03);
}

.noticeTop{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.noticeDate{
  color:var(--muted);
  font-size:12px;
}

.noticeText{
  font-size:15px;
  line-height:1.6;
  white-space:pre-wrap;
}

.pin{
  color:#f59e0b;
  font-weight:900;
}

.empty{
  text-align:center;
  color:var(--muted);
  padding:30px;
}

@media(max-width:700px){
  .header{
    display:block;
    text-align:center;
  }

  .header div:last-child{
    margin-top:12px;
  }
}
</style>
</head>

<body>

<div class="header">

  <div>
    <div class="logo">📢 LIVE NOTICE SYSTEM</div>
    <div class="sub">Firebase Real-time Notice Board</div>
  </div>

  <div>
    <button class="btn" onclick="location.href='index.html'">
      🏠 Dashboard
    </button>

    <button class="btn red" onclick="logout()">
      🚪 Logout
    </button>
  </div>

</div>

<div class="page">

  <div class="card">

    <h2>📝 Create Notice</h2>

    <textarea id="noticeText"
      placeholder="Write live notice here..."></textarea>

    <br><br>

    <label>
      <input type="checkbox" id="pinNotice">
      📌 Pin Important Notice
    </label>

    <br><br>

    <button class="btn" onclick="saveNotice()">
      💾 Publish Notice
    </button>

  </div>

  <div class="card">

    <h2>📋 All Live Notices</h2>

    <div id="noticeList" class="empty">
      Loading...
    </div>

  </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
  authDomain: "gms-warehouse-tracker-7f57e.firebaseapp.com",
  projectId: "gms-warehouse-tracker-7f57e",
  storageBucket: "gms-warehouse-tracker-7f57e.firebasestorage.app",
  messagingSenderId: "992250313291",
  appId: "1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const user =
  JSON.parse(localStorage.getItem("gmsUser") || "null");

if(!user){
  window.location.href="login.html";
}

window.logout=function(){

  localStorage.removeItem("gmsUser");

  window.location.href="login.html";

};

window.saveNotice = async function(){

  let text =
    document.getElementById("noticeText").value.trim();

  let pin =
    document.getElementById("pinNotice").checked;

  if(!text){
    alert("Notice likho");
    return;
  }

  await addDoc(collection(db,"liveNotices"),{

    text:text,

    pin:pin,

    user:user.name || "Admin",

    role:user.role || "user",

    createdAt:new Date().toISOString()

  });

  document.getElementById("noticeText").value="";

  document.getElementById("pinNotice").checked=false;

  loadNotices();

};

window.deleteNotice = async function(id){

  if(confirm("Delete notice?")){

    await deleteDoc(doc(db,"liveNotices",id));

    loadNotices();

  }

};

async function loadNotices(){

  let snap =
    await getDocs(collection(db,"liveNotices"));

  let rows=[];

  snap.forEach(d=>{

    rows.push({
      id:d.id,
      ...d.data()
    });

  });

  rows.sort((a,b)=>
    (b.createdAt || "").localeCompare(a.createdAt || "")
  );

  let html="";

  rows.forEach(n=>{

    let date =
      new Date(n.createdAt).toLocaleString();

    html += `
      <div class="noticeItem">

        <div class="noticeTop">

          <div>
            ${n.pin ? '<span class="pin">📌 PINNED</span>' : ''}
          </div>

          <div class="noticeDate">
            ${date}
          </div>

        </div>

        <div class="noticeText">
          ${n.text}
        </div>

        <br>

        <button class="btn red"
          onclick="deleteNotice('${n.id}')">
          🗑 Delete
        </button>

      </div>
    `;

  });

  document.getElementById("noticeList").innerHTML =
    html || '<div class="empty">No notice found</div>';

}

loadNotices();

</script>

</body>
</html>
