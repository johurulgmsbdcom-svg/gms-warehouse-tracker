<!DOCTYPE html>
<html>
<head>
<title>Manpower List</title>

<style>
body{margin:0;background:#0b0f19;color:white;font-family:Arial}
.box{padding:20px}
h2{text-align:center}
input{padding:8px;margin:5px;border-radius:6px;border:none}
button{padding:8px 12px;margin:5px;border:none;border-radius:6px;cursor:pointer}
.editBtn{background:#f59e0b;color:white}
.deleteBtn{background:#dc2626;color:white}
.addBtn{background:#2563eb;color:white}
table{width:100%;margin-top:15px;border-collapse:collapse;background:white;color:black}
th,td{border:1px solid #000;padding:8px;text-align:center}
</style>

</head>

<body>

<div class="box">

<h2>Manpower System</h2>

<input id="empId" placeholder="Employee ID">
<input id="empName" placeholder="Employee Name">
<input id="designation" placeholder="Designation">
<input id="salary" type="number" placeholder="Salary">

<button class="addBtn" onclick="saveData()">Save</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Designation</th>
<th>Salary</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-wBCF5eeWMHobLFOhBzKW7aB2pagz9-w",
  authDomain: "gms-warehouse-tracker-7f57e.firebaseapp.com",
  projectId: "gms-warehouse-tracker-7f57e",
  storageBucket: "gms-warehouse-tracker-7f57e.firebasestorage.app",
  messagingSenderId: "992250313291",
  appId: "1:992250313291:web:ee3bceae76d4d53bc26bce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const user=JSON.parse(localStorage.getItem("gmsUser")||"{}");

let editMode=false;
let currentId=null;
window.allData=[];


// 🔥 Activity Log Function
async function saveLog(action,item){
  await addDoc(collection(db,"activityLogs"),{
    user: user.name || "Unknown",
    action: action,
    module: "Manpower",
    item: item,
    time: new Date().toLocaleString()
  });
}


// ➕ Save (Add + Edit)
async function saveData(){

  let empId=document.getElementById("empId").value.trim();
  let empName=document.getElementById("empName").value.trim();
  let designation=document.getElementById("designation").value.trim();
  let salary=Number(document.getElementById("salary").value)||0;

  if(!empId){
    alert("Employee ID dao");
    return;
  }

  let data={empId,empName,designation,salary};

  await setDoc(doc(db,"manpower",empId),data);

  await saveLog(editMode?"EDIT":"ADD",empId+" ("+empName+")");

  clearForm();
}


// ❌ Delete
async function deleteEmployee(empId){

  let row = window.allData.find(x=>x.empId===empId);
  let name = row?.empName || "";

  if(!confirm("⚠️ আপনি কি নিশ্চিত delete করতে চান?\nএই কাজটি লগ হবে।")){
    return;
  }

  await deleteDoc(doc(db,"manpower",empId));

  await saveLog("DELETE",empId+" ("+name+")");
}


// ✏️ Edit
function editEmployee(empId){

  let x = window.allData.find(d=>d.empId===empId);
  if(!x) return;

  document.getElementById("empId").value=x.empId;
  document.getElementById("empName").value=x.empName;
  document.getElementById("designation").value=x.designation;
  document.getElementById("salary").value=x.salary;

  editMode=true;
}


// 🔄 Realtime Load
onSnapshot(collection(db,"manpower"), snap=>{

  let html="";
  window.allData=[];

  snap.forEach(d=>{
    let x=d.data();
    window.allData.push(x);

    html+=`
    <tr>
      <td>${x.empId}</td>
      <td>${x.empName}</td>
      <td>${x.designation}</td>
      <td>${x.salary}</td>
      <td>
        <button class="editBtn" onclick="editEmployee('${x.empId}')">Edit</button>
        <button class="deleteBtn" onclick="deleteEmployee('${x.empId}')">Delete</button>
      </td>
    </tr>`;
  });

  document.getElementById("tableBody").innerHTML=html;

});


// 🔹 Clear Form
function clearForm(){
  ["empId","empName","designation","salary"].forEach(id=>{
    document.getElementById(id).value="";
  });
  editMode=false;
}


// global access
window.saveData=saveData;
window.deleteEmployee=deleteEmployee;
window.editEmployee=editEmployee;

</script>

</body>
</html>
