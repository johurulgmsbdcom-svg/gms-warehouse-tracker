<!DOCTYPE html>
<html>
<head>
<title>Manpower List</title>
<style>
body{margin:0;background:#0b0f19;color:white;font-family:Arial}
.box{padding:20px}
h2,h3{text-align:center;margin:4px}
.top{text-align:center;margin-top:10px}
table{width:100%;border-collapse:collapse;margin-top:15px;background:white;color:black}
th,td{border:1px solid #000;padding:8px;text-align:center}
input,select{padding:8px;border-radius:6px;border:1px solid #333}
button{padding:10px 18px;background:#2563eb;color:white;border:0;border-radius:8px;font-weight:bold;cursor:pointer;margin:4px}
.deleteBtn{background:#dc2626}
.editBtn{background:#f59e0b}
.summary{font-size:20px;font-weight:bold;text-align:center;margin-top:10px}
</style>
</head>

<body>

<div class="box">
<h2>Manpower List</h2>

<button onclick="showForm()">Add Manpower</button>

<div id="formBox" style="display:none">
<input id="empId" placeholder="Employee ID">
<input id="empName" placeholder="Employee Name">
<input id="designation" placeholder="Designation">
<input id="salary" type="number" placeholder="Salary">
<button onclick="saveData()">Save</button>
</div>

<div class="summary">
Total: <span id="total">0</span>
</div>

<table>
<thead>
<tr>
<th>ID</th><th>Name</th><th>Designation</th><th>Salary</th><th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD...",
  authDomain: "gms-warehouse-tracker-7f57e.firebaseapp.com",
  projectId: "gms-warehouse-tracker-7f57e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const user=JSON.parse(localStorage.getItem("gmsUser")||"{}");

let editMode=false;

// 🔥 LOG FUNCTION
async function saveLog(action,item){
  await addDoc(collection(db,"activityLogs"),{
    user: user.name || "Unknown",
    action: action,
    module: "Manpower",
    item: item,
    time: new Date().toLocaleString()
  });
}

// SHOW FORM
function showForm(){
  document.getElementById("formBox").style.display="block";
}

// SAVE (ADD + EDIT)
async function saveData(){
  let empId=document.getElementById("empId").value;
  let empName=document.getElementById("empName").value;
  let designation=document.getElementById("designation").value;
  let salary=Number(document.getElementById("salary").value)||0;

  if(!empId){
    alert("Employee ID dao");
    return;
  }

  let data={empId,empName,designation,salary};

  await setDoc(doc(db,"manpower",empId),data);

  await saveLog(editMode?"EDIT":"ADD",empId);

  clearForm();
}

// DELETE
async function deleteEmployee(empId){

  if(!confirm("⚠️ আপনি কি নিশ্চিত delete করতে চান?\nএই কাজটি লগ হবে।")){
    return;
  }

  await deleteDoc(doc(db,"manpower",empId));

  await saveLog("DELETE",empId);
}

// EDIT
function editEmployee(x){
  document.getElementById("empId").value=x.empId;
  document.getElementById("empName").value=x.empName;
  document.getElementById("designation").value=x.designation;
  document.getElementById("salary").value=x.salary;

  editMode=true;
}

// CLEAR
function clearForm(){
  ["empId","empName","designation","salary"].forEach(id=>{
    document.getElementById(id).value="";
  });
  editMode=false;
}

// REALTIME LOAD
onSnapshot(collection(db,"manpower"), snap=>{
  let html="";
  let total=0;

  snap.forEach(d=>{
    let x=d.data();
    total++;

    html+=`
    <tr>
      <td>${x.empId}</td>
      <td>${x.empName}</td>
      <td>${x.designation}</td>
      <td>${x.salary}</td>
      <td>
        <button class="editBtn" onclick='editEmployee(${JSON.stringify(x)})'>Edit</button>
        <button class="deleteBtn" onclick="deleteEmployee('${x.empId}')">Delete</button>
      </td>
    </tr>`;
  });

  document.getElementById("tableBody").innerHTML=html;
  document.getElementById("total").innerText=total;
});

window.showForm=showForm;
window.saveData=saveData;
window.deleteEmployee=deleteEmployee;
window.editEmployee=editEmployee;

</script>

</body>
</html>
